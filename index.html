    if (dist < 14 && e.attackCooldown <= 0 && player.alive) {
        damagePlayer(e.damage, e.x, e.y);
        e.attackCooldown = 1.0;
        playSound('hit');
    }
}

function updateNecromancerAI(e, dt, dist, angle) {
    e.necroSummonTimer -= dt;
    if (e.necroSummonTimer <= 0) {
        const aliveMinions = enemies.filter(o => o.alive && o.type === 'skeleton_warrior' && o !== e).length;
        if (aliveMinions < 4) {
            // Summon 2 skeletons
            for (let s = 0; s < 2; s++) {
                const sa = Math.random() * Math.PI * 2;
                spawnEnemy('skeleton_warrior', e.x + Math.cos(sa) * 30, e.y + Math.sin(sa) * 30, 1.0);
                spawnBurst('dust', e.x + Math.cos(sa) * 30, e.y + Math.sin(sa) * 30, 6, { color: '#aa55ff' });
            }
            playSound('summon');
        } else {
            // Fire bolt
            spawnProjectile(e.x, e.y, Math.cos(angle) * 60, Math.sin(angle) * 60, 2, true, '#aa55ff');
            playSound('arrow');
        }
        e.necroSummonTimer = 8;
    }
}

// --- FLOOR 3 ENEMY AI ---
function updateFlameImpAI(e, dt, dist, angle) {
    // Hover over lava, maintain distance, shoot fireballs
    const preferDist = 70;
    if (dist < 32) {
        // Retreat
        moveEnemy(e, Math.cos(angle + Math.PI) * e.speed * 1.5, Math.sin(angle + Math.PI) * e.speed * 1.5, dt);
    } else if (dist > preferDist + 20) {
        moveEnemy(e, Math.cos(angle) * e.speed, Math.sin(angle) * e.speed, dt);
    } else {
        // Strafe
        moveEnemy(e, Math.cos(angle + Math.PI/2) * e.speed * 0.5, Math.sin(angle + Math.PI/2) * e.speed * 0.5, dt);
    }
    e.state = 'walk';
    // Fireball attack
    if (e.attackCooldown <= 0 && dist < 120 && player.alive) {
        e.attackCooldown = 2.5;
        spawnProjectile(e.x, e.y, Math.cos(angle) * 80, Math.sin(angle) * 80, 2, true, '#ff6622');
        playSound('arrow');
        spawnParticle('ember', e.x, e.y);
    }
}

function updateGolemAI(e, dt, dist, angle) {
    // Golem: slow tank, ground pound when close, charge when far
    if (e.hitTimer > 0) return; // golems don't stagger but respect hitTimer

    if (e.state === 'slam') {
        e.attackTimer -= dt;
        if (e.attackTimer <= 0) {
            // SLAM impact
            triggerShake(7, 10);
            playSound('slam');
            spawnBurst('bone_shatter', e.x, e.y, 12, { color: '#555555' });
            addDecal(e.x - 8, e.y - 8, '#222222', 16);
            if (dist < 64) damagePlayer(3, e.x, e.y);
            // Damage enemies in range too (geyser interaction simulated)
            e.state = 'slam_recover';
            e.attackTimer = 2.0;
        }
        return;
    }
    if (e.state === 'slam_recover') {
        e.attackTimer -= dt;
        if (e.attackTimer <= 0) { e.state = 'idle'; e.attackCooldown = 3; }
        return;
    }
    if (e.state === 'charge') {
        e.attackTimer -= dt;
        moveEnemy(e, Math.cos(e.dir) * e.speed * 2.2, Math.sin(e.dir) * e.speed * 2.2, dt);
        // Check wall collision during charge
        const etx = Math.floor((e.x - PLAY_OFFSET_X) / TILE_SIZE);
        const ety = Math.floor((e.y - PLAY_OFFSET_Y) / TILE_SIZE);
        if (tileBlocked(etx, ety)) {
            triggerShake(6, 8);
            e.state = 'slam_recover'; e.attackTimer = 1.5;
            spawnBurst('bone_shatter', e.x, e.y, 8, { color: '#555555' });
            playSound('slam');
        }
        if (dist < 12) { damagePlayer(3, e.x, e.y); e.state = 'idle'; e.attackCooldown = 3; }
        if (e.attackTimer <= 0) { e.state = 'idle'; e.attackCooldown = 3; }
        return;
    }

    // Walk toward player
    moveEnemy(e, Math.cos(angle) * e.speed, Math.sin(angle) * e.speed, dt);
    e.state = 'walk';
    // Screen shake on footsteps
    if (Math.floor(e.animTimer * 2) % 2 === 0 && Math.floor((e.animTimer - dt) * 2) % 2 !== 0) {
        triggerShake(1, 1);
    }

    if (e.attackCooldown <= 0) {
        if (dist < 64) {
            // Ground pound
            e.state = 'slam';
            e.attackTimer = 1.2;
        } else if (dist > 96) {
            // Charge
            e.state = 'charge';
            e.attackTimer = 3;
            e.dir = angle;
            playSound('bone_break');
        }
    }
}

function checkEnemyMeleeHit(e, range) {
    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < range) {
        damagePlayer(e.damage, e.x, e.y);
    }
}

// Player attack hitting enemies
let _attackHitDone = false; // prevent multi-hit per swing
function playerAttackHitCheck() {
    if (player.state !== 'attack' || !player.swordArc) return;
    // Only register hits once per attack swing (during first half of the arc)
    if (player.swordArc.life < 0.05 || _attackHitDone) return;
    _attackHitDone = true;
    const arcAngle = dirToAngle(player.attackDir);
    const reach = 18;

    for (const e of enemies) {
        if (!e.alive || e.state === 'spawning') continue;
        // Ghost invulnerability when invisible
        if (e.type === 'ghost' && e.ghostPhase !== 'visible') continue;
        // Mimic must be active
        if (e.type === 'mimic' && !e.mimicActive) continue;
        // Necromancer shield
        if (e.type === 'necromancer' && e.necroShield > 0) {
            const ddx = e.x - player.x, ddy = e.y - player.y;
            if (ddx*ddx+ddy*ddy < reach*reach+e.size*e.size) {
                e.necroShield--;
                spawnBurst('dust', e.x, e.y, 5, { color: '#aa55ff' });
                playSound('shield');
                if (e.necroShield <= 0) spawnBurst('bone_shatter', e.x, e.y, 8, { color: '#8844cc' });
            }
            continue;
        }
        const dx = e.x - player.x, dy = e.y - player.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist > reach + e.size) continue;

        // Shield block check for skeleton warriors
        // Shield blocks if player is attacking from the FRONT of the skeleton
        // (within 90-degree cone of the direction the skeleton is walking/facing)
        if (e.type === 'skeleton_warrior' && e.shieldActive) {
            // Player attack direction as angle
            const attackAngle = arcAngle;
            // Direction FROM enemy TO player (where the hit comes from)
            const hitFromAngle = Math.atan2(-dy, -dx);
            // Enemy's "shield facing" direction — the direction the skeleton is moving toward player
            const enemyFacing = Math.atan2(player.y - e.y, player.x - e.x);
            // Block if the hit comes from roughly the front of the enemy
            const blockAngleDiff = Math.abs(normalizeAngle(hitFromAngle - enemyFacing));
            if (blockAngleDiff < Math.PI / 3) {
                // Blocked!
                spawnBurst('bone_shatter', e.x, e.y, 2, { color: '#888888' });
                playSound('shield');
                triggerShake(1, 2);
                spawnDamageNumber(e.x, e.y - 8, 'BLOCK', 'normal');
                continue;
            }
        }

        // Critical hit check (10% chance, double damage)
        const isCrit = Math.random() < 0.1;
        const dmg = isCrit ? 2 : 1;
        e.hp -= dmg;
        e.hitTimer = 0.2;
        const hitColor = e.type.startsWith('slime') ? '#44cc44' : '#cc2222';

        // Hit spark at contact point
        const contactX = (player.x + e.x) / 2;
        const contactY = (player.y + e.y) / 2;
        addHitSpark(contactX, contactY);

        // Damage number
        spawnDamageNumber(e.x, e.y - 10, dmg, isCrit ? 'crit' : 'normal');

        // Particles: burst of 6-10 mostly in knockback direction
        const burstCount = isCrit ? 10 : 6;
        for (let p = 0; p < burstCount; p++) {
            const pAngle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 1.2;
            spawnParticle('blood', contactX, contactY, {
                vx: Math.cos(pAngle) * (30 + Math.random() * 30),
                vy: Math.sin(pAngle) * (30 + Math.random() * 30),
                color: Math.random() > 0.4 ? hitColor : '#ffffff',
                size: Math.random() > 0.5 ? 2 : 1,
            });
        }

        // Hitstop + shake (bigger for crits and kills)
        const isKill = e.hp <= 0;
        triggerHitFreeze(isCrit ? 5 : (isKill ? 4 : 3));
        triggerShake(isCrit ? 5 : (isKill ? 3 : 2), isCrit ? 6 : (isKill ? 5 : 3));

        // Sound with ascending pitch for combos
        game.lastHitCombo++;
        const pitchMult = 1 + (Math.min(game.lastHitCombo, 8) - 1) * 0.05 + (Math.random() - 0.5) * 0.15;
        playSound(isCrit ? 'hit_crit' : 'hit', pitchMult);

        // Knockback (fast start, decelerate via hitTimer)
        const kbAngle = Math.atan2(dy, dx);
        const kbForce = e.type === 'golem' ? 0 : (e.type === 'goblin' ? 24 : (isCrit ? 16 : 10));
        e.x += Math.cos(kbAngle) * kbForce;
        e.y += Math.sin(kbAngle) * kbForce;
        // Wall splat bonus damage
        const etx = Math.floor((e.x - PLAY_OFFSET_X) / TILE_SIZE);
        const ety = Math.floor((e.y - PLAY_OFFSET_Y) / TILE_SIZE);
        if (tileBlocked(etx, ety)) {
            e.hp -= 1;
            spawnBurst('bone_shatter', e.x, e.y, 4, { color: '#888888' });
            triggerShake(2, 2);
        }

        // Combo
        game.combo.count++;
        game.combo.timer = 1.5;

        // Archer hit penalty
        if (e.type === 'skeleton_archer') {
            e.attackCooldown = Math.max(e.attackCooldown, 1.0);
            e.aimTimer = 0; e.aimTarget = null;
        }

        // Apply item effects
        applyItemEffectsOnHit(e);

        if (e.hp <= 0) killEnemy(e);
    }
}

function normalizeAngle(a) {
    while (a > Math.PI) a -= 2*Math.PI;
    while (a < -Math.PI) a += 2*Math.PI;
    return a;
}

function killEnemy(e) {
    e.alive = false;

    if (e.type === 'slime' || e.type === 'slime_mini') {
        // Pop effect
        spawnBurst('splash', e.x, e.y, 8, { color: '#44cc44', gravity: 20 });
        addDecal(e.x - 3, e.y - 2, '#338833', 6);
        playSound('slime_pop');
    } else if (e.type === 'slime_large') {
        // Split into 2 mini slimes
        spawnBurst('splash', e.x, e.y, 10, { color: '#44cc44', gravity: 20 });
        addDecal(e.x - 4, e.y - 3, '#338833', 8);
        spawnEnemy('slime_mini', e.x - 10, e.y, 0);
        spawnEnemy('slime_mini', e.x + 10, e.y, 0);
        playSound('slime_pop');
    } else if (e.type === 'skeleton_warrior' || e.type === 'skeleton_archer') {
        // Bone collapse
        spawnBurst('bone_shatter', e.x, e.y, 12);
        // Skull bounce particle
        spawnParticle('bone_shatter', e.x, e.y - 4, { vy: -40, gravity: 60, life: 1.2, size: 2 });
        addDecal(e.x - 4, e.y - 2, '#aaaaaa', 8); // bone pile
        playSound('bone_break');
    } else if (e.type === 'goblin') {
        // Ragdoll poof
        const kbAngle = angleTo(player, e);
        spawnBurst('dust', e.x + Math.cos(kbAngle)*15, e.y + Math.sin(kbAngle)*15, 6, { color: '#55aa44' });
        playSound('goblin_die');
    } else if (e.type === 'cave_crawler') {
        spawnBurst('dust', e.x, e.y, 4, { color: '#3a2a1a' });
        addDecal(e.x - 2, e.y - 2, '#2a1a0a', 4);
        playSound('goblin_die');
    } else if (e.type === 'mushroom_spore') {
        // Death cloud
        for (let i = 0; i < 8; i++) {
            const a = Math.random() * Math.PI * 2;
            spawnParticle('poison_cloud', e.x + Math.cos(a)*20, e.y + Math.sin(a)*20, { life: 2 });
        }
        addDecal(e.x - 4, e.y - 2, '#5a2a7a', 8);
        playSound('slime_pop');
    } else if (e.type === 'ghost') {
        spawnBurst('dust', e.x, e.y, 10, { color: '#aabbdd' });
        playSound('bone_break');
    } else if (e.type === 'mimic') {
        spawnBurst('bone_shatter', e.x, e.y, 15, { color: '#8a6a3a' });
        // Extra loot
        for (let g = 0; g < 8; g++) spawnPickup(e.x + Math.random()*16-8, e.y + Math.random()*16-8, 'gold', 1);
        playSound('chest_open');
    } else if (e.type === 'necromancer') {
        spawnBurst('dust', e.x, e.y, 12, { color: '#aa55ff' });
        spawnBurst('bone_shatter', e.x, e.y, 6, { color: '#2a1a3a' });
        // Kill all summoned skeletons
        for (const o of enemies) {
            if (o !== e && o.alive && o.type === 'skeleton_warrior') {
                o.hp = 0; o.alive = false;
                spawnBurst('bone_shatter', o.x, o.y, 6);
            }
        }
        playSound('bone_break');
    } else if (e.type === 'flame_imp') {
        spawnBurst('ember', e.x, e.y, 15);
        addDecal(e.x - 3, e.y, '#2a1a0a', 6);
        playSound('slime_pop');
    } else if (e.type === 'golem') {
        // Massive explosion
        spawnBurst('bone_shatter', e.x, e.y, 25, { color: '#555555' });
        spawnBurst('ember', e.x, e.y, 15);
        triggerShake(8, 15);
        addDecal(e.x - 8, e.y - 8, '#cc4400', 16);
        playSound('slam');
        // Lava puddle (cosmetic)
        addDecal(e.x - 6, e.y - 4, '#ff4422', 12);
    }

    // Gold drops
    const goldChance = e.type === 'goblin' ? 0.6 : 0.8;
    if (Math.random() < goldChance) {
        const goldAmt = e.type === 'slime_mini' ? 1 : e.type === 'slime_large' ? 3 : 2;
        for (let g = 0; g < goldAmt; g++) {
            spawnPickup(e.x + Math.random()*10 - 5, e.y + Math.random()*10 - 5, 'gold', 1);
        }
    }

    // Vampire fang tracking
    onPlayerKill();

    // Check room clear
    checkRoomClear();
}

function checkRoomClear() {
    const alive = enemies.filter(e => e.alive).length;
    if (alive === 0 && currentRoomData.lockedUntilClear) {
        currentRoomData.lockedUntilClear = false;
        tilesDirty = true;
        game.roomCleared = true;
        clearedRooms.add(currentRoomData.id);
        playSound('door_unlock');
        // Magnetize all remaining pickups toward player
        for (const p of pickups) { p.life = Math.max(p.life, 5); }
        // Check for wave spawns
        if (currentRoomData._waveIndex !== undefined && currentRoomData._waves && currentRoomData._waveIndex < currentRoomData._waves.length) {
            const wave = currentRoomData._waves[currentRoomData._waveIndex];
            currentRoomData._waveTimer = wave.delay || 0;
            currentRoomData._waveIndex++;
            currentRoomData.lockedUntilClear = true;
            tilesDirty = true;
        }
    }
}

// --- ENEMY DRAWING ---
function drawEnemies(ctx, time) {
    for (const e of enemies) {
        if (!e.alive) continue;
        if (e.state === 'spawning') {
            // Spawn effect: swirling particles
            const t = e.spawnDelay;
            ctx.globalAlpha = 0.3 + Math.sin(time * 10) * 0.2;
            ctx.fillStyle = ENEMY_TYPES[e.type].color;
            ctx.fillRect(Math.round(e.x - 3), Math.round(e.y - 3), 6, 6);
            ctx.globalAlpha = 1;
            continue;
        }

        // Hit flash
        if (e.hitTimer > 0.08) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(Math.round(e.x - e.size), Math.round(e.y - e.size), e.size * 2, e.size * 2);
            continue;
        }

        // Frozen overlay
        if (e._frozen > 0) {
            ctx.save();
            ctx.globalAlpha = 0.5;
        }

        const def = ENEMY_TYPES[e.type];
        switch (e.type) {
            case 'slime': case 'slime_large': case 'slime_mini':
                drawSlime(ctx, e, def, time);
                break;
            case 'skeleton_warrior':
                drawSkeletonWarrior(ctx, e, def, time);
                break;
            case 'skeleton_archer':
                drawSkeletonArcher(ctx, e, def, time);
                break;
            case 'goblin':
                drawGoblin(ctx, e, def, time);
                break;
            case 'cave_crawler':
                drawCaveCrawler(ctx, e, def, time);
                break;
            case 'mushroom_spore':
                drawMushroomSpore(ctx, e, def, time);
                break;
            case 'ghost':
                drawGhost(ctx, e, def, time);
                break;
            case 'mimic':
                drawMimic(ctx, e, def, time);
                break;
            case 'necromancer':
                drawNecromancer(ctx, e, def, time);
                break;
            case 'flame_imp':
                drawFlameImp(ctx, e, def, time);
                break;
            case 'golem':
                drawGolem(ctx, e, def, time);
                break;
        }

        // Frozen overlay + restore
        if (e._frozen > 0) {
            ctx.restore();
            ctx.fillStyle = rgbStr(100, 150, 255, 0.3);
            ctx.fillRect(Math.round(e.x - e.size - 1), Math.round(e.y - e.size - 1), e.size * 2 + 2, e.size * 2 + 2);
            // Ice crystal particles
            if (Math.random() < 0.05) spawnParticle('gold_sparkle', e.x + Math.random()*8-4, e.y - e.size, { color: '#aaddff' });
        }
        // Burning overlay
        if (e._burning > 0) {
            ctx.fillStyle = rgbStr(255, 100, 20, 0.2 + Math.sin(time * 10) * 0.1);
            ctx.fillRect(Math.round(e.x - e.size), Math.round(e.y - e.size), e.size * 2, e.size * 2);
        }
    }
}

function drawSlime(ctx, e, def, time) {
    const s = e.size;
    const squishY = e.squish * s;
    const squishX = -squishY * 0.5;
    const hop = e.hopping ? Math.sin((0.35 - e.hopTimer) / 0.35 * Math.PI) * 4 : 0;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(Math.round(e.x), Math.round(e.y + s + 1), s, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    const bx = Math.round(e.x - s - squishX);
    const by = Math.round(e.y - s + squishY - hop);
    const bw = s * 2 + squishX * 2;
    const bh = s * 2 - squishY;

    ctx.fillStyle = def.colorDark;
    ctx.fillRect(bx, by + bh * 0.5, bw, bh * 0.5);
    ctx.fillStyle = def.color;
    ctx.fillRect(bx, by, bw, bh * 0.6);
    // Highlight
    ctx.fillStyle = brighten(def.color, 30);
    ctx.fillRect(bx + 1, by + 1, bw * 0.4, 2);

    // Eyes
    const eyeY = by + s * 0.4;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(Math.round(e.x - s * 0.4), Math.round(eyeY), 2, 2);
    ctx.fillRect(Math.round(e.x + s * 0.2), Math.round(eyeY), 2, 2);
    ctx.fillStyle = '#111111';
    ctx.fillRect(Math.round(e.x - s * 0.3), Math.round(eyeY + 1), 1, 1);
    ctx.fillRect(Math.round(e.x + s * 0.3), Math.round(eyeY + 1), 1, 1);
}

function drawSkeletonWarrior(ctx, e, def, time) {
    const s = 7;
    const jawBob = Math.sin(time * 5 + e.animTimer) > 0.7 ? 1 : 0;
    const sway = Math.sin(e.animTimer * 2) * (e.state === 'walk' ? 1 : 0);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(Math.round(e.x), Math.round(e.y + s + 1), 5, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    const bx = Math.round(e.x + sway);
    const by = Math.round(e.y);

    // Legs (thin bones)
    ctx.fillStyle = '#bbbbaa';
    ctx.fillRect(bx - 3, by + 4, 1, 5);
    ctx.fillRect(bx + 2, by + 4, 1, 5);
    // Ribcage
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 4, by - 2, 8, 6);
    ctx.fillStyle = def.colorDark;
    ctx.fillRect(bx - 3, by - 1, 6, 1);
    ctx.fillRect(bx - 3, by + 1, 6, 1);
    ctx.fillRect(bx - 3, by + 3, 6, 1);
    // Skull
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 3, by - 7, 6, 5);
    ctx.fillRect(bx - 2, by - 8, 4, 1);
    // Eye sockets with red glow
    const eyeGlow = Math.sin(time * 3) * 0.3 + 0.7;
    ctx.fillStyle = rgbStr(255, 68, 68, eyeGlow);
    ctx.fillRect(bx - 2, by - 6, 2, 2);
    ctx.fillRect(bx + 1, by - 6, 2, 2);
    ctx.fillStyle = '#111111';
    ctx.fillRect(bx - 2, by - 6, 1, 1);
    ctx.fillRect(bx + 2, by - 6, 1, 1);
    // Jaw
    ctx.fillStyle = '#ccccbb';
    ctx.fillRect(bx - 2, by - 2 + jawBob, 4, 1);
    // Shield (left side)
    ctx.fillStyle = '#666677';
    ctx.fillRect(bx - 7, by - 4, 4, 6);
    ctx.fillStyle = '#555566';
    ctx.fillRect(bx - 6, by - 3, 2, 4);
    // Sword (right side)
    if (e.state === 'attack') {
        const swingAngle = e.comboStage === 2 ? -0.5 : 0.3;
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(bx + 4, by - 6 + e.comboStage * 3, 2, 8);
        ctx.fillStyle = '#cccccc';
        ctx.fillRect(bx + 4, by - 8 + e.comboStage * 3, 2, 3);
    } else {
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(bx + 4, by - 3, 1, 6);
        ctx.fillStyle = '#8a6a3a';
        ctx.fillRect(bx + 3, by - 1, 3, 2);
    }
}

function drawSkeletonArcher(ctx, e, def, time) {
    const s = 7;
    const sway = Math.sin(e.animTimer * 2) * (e.fleeing ? 1.5 : 0.5);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(Math.round(e.x), Math.round(e.y + s + 1), 4, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    const bx = Math.round(e.x + sway);
    const by = Math.round(e.y);

    // Legs
    ctx.fillStyle = '#bbbbaa';
    ctx.fillRect(bx - 2, by + 4, 1, 5);
    ctx.fillRect(bx + 1, by + 4, 1, 5);
    // Thinner body
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 3, by - 2, 6, 6);
    ctx.fillStyle = def.colorDark;
    ctx.fillRect(bx - 2, by, 4, 1);
    ctx.fillRect(bx - 2, by + 2, 4, 1);
    // Skull
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 3, by - 7, 6, 5);
    ctx.fillStyle = '#111111';
    ctx.fillRect(bx - 2, by - 6, 1, 1);
    ctx.fillRect(bx + 1, by - 6, 1, 1);
    // Bow
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(bx + 4, by - 5, 1, 8);
    ctx.fillStyle = '#aa8844';
    ctx.fillRect(bx + 5, by - 4, 1, 1);
    ctx.fillRect(bx + 5, by + 2, 1, 1);
    // Bowstring
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(bx + 3, by - 4, 1, 7);
    // Quiver on back
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(bx - 5, by - 4, 2, 6);

    // Aim indicator
    if (e.aimTimer > 0 && e.aimTarget) {
        ctx.fillStyle = rgbStr(255, 80, 80, 0.3 + Math.sin(time * 20) * 0.15);
        const dx = e.aimTarget.x - e.x, dy = e.aimTarget.y - e.y;
        const len = Math.sqrt(dx*dx+dy*dy);
        for (let d = 8; d < len; d += 4) {
            ctx.fillRect(Math.round(e.x + dx/len*d), Math.round(e.y + dy/len*d), 1, 1);
        }
    }
}

function drawGoblin(ctx, e, def, time) {
    const s = 5;
    const jitter = e.state === 'walk' ? Math.sin(e.animTimer * 12) * 1 : Math.sin(e.animTimer * 4) * 0.5;
    const eyeShift = Math.sin(e.animTimer * 2) > 0.5 ? 1 : 0;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(Math.round(e.x), Math.round(e.y + s), 4, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();

    const bx = Math.round(e.x + jitter);
    const by = Math.round(e.y);

    // Legs (fast scurry)
    const legPhase = Math.floor(e.animTimer * 8) % 2;
    ctx.fillStyle = def.colorDark;
    ctx.fillRect(bx - 2, by + 3, 1, 2 + legPhase);
    ctx.fillRect(bx + 1, by + 3, 1, 2 + (1 - legPhase));
    // Hunched body
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 3, by - 1, 6, 4);
    ctx.fillStyle = def.colorDark;
    ctx.fillRect(bx - 2, by + 2, 4, 1);
    // Head (big)
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 3, by - 5, 6, 4);
    // Pointed ears
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 4, by - 5, 1, 2);
    ctx.fillRect(bx + 3, by - 5, 1, 2);
    ctx.fillStyle = brighten(def.color, 20);
    ctx.fillRect(bx - 4, by - 4, 1, 1);
    ctx.fillRect(bx + 3, by - 4, 1, 1);
    // Big yellow eyes
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(bx - 2 + eyeShift, by - 4, 2, 2);
    ctx.fillRect(bx + 1 + eyeShift, by - 4, 2, 2);
    ctx.fillStyle = '#111111';
    ctx.fillRect(bx - 1 + eyeShift, by - 3, 1, 1);
    ctx.fillRect(bx + 2 + eyeShift, by - 3, 1, 1);
    // Mouth with fang
    ctx.fillStyle = '#333322';
    ctx.fillRect(bx - 1, by - 1, 3, 1);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(bx + 1, by - 1, 1, 1);
    // Dagger
    if (e.state === 'attack') {
        ctx.fillStyle = '#cccccc';
        ctx.fillRect(bx + 4, by - 2, 1, 3);
    } else {
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(bx + 3, by, 1, 2);
    }
}

// --- FLOOR 2 ENEMY DRAWING ---
function drawCaveCrawler(ctx, e, def, time) {
    const bx = Math.round(e.x), by = Math.round(e.y);
    const legPhase = Math.floor(e.animTimer * 10) % 2;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(bx - 4, by + 3, 8, 2);
    // Body
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 4, by - 2, 8, 4);
    ctx.fillStyle = def.colorDark;
    ctx.fillRect(bx - 3, by, 6, 2);
    // Legs
    ctx.fillStyle = '#4a3a2a';
    for (let side = -1; side <= 1; side += 2) {
        for (let l = 0; l < 3; l++) {
            const loff = legPhase === l % 2 ? 1 : 0;
            ctx.fillRect(bx + side * (4 + loff), by - 1 + l * 2, 1, 1);
        }
    }
    // Red eyes
    ctx.fillStyle = '#ff4433';
    ctx.fillRect(bx - 2, by - 2, 1, 1);
    ctx.fillRect(bx, by - 2, 1, 1);
    // Mandibles
    ctx.fillStyle = '#ccbbaa';
    ctx.fillRect(bx - 1, by + 2, 1, 1);
    ctx.fillRect(bx + 1, by + 2, 1, 1);
}

function drawMushroomSpore(ctx, e, def, time) {
    const bx = Math.round(e.x), by = Math.round(e.y);
    const sway = Math.sin(e.animTimer * 1.5) * 1;
    const chargeScale = e.sporeCharging ? (1 + (1 - e.sporeTimer) * 0.15) : 1;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(bx - 5, by + 5, 10, 3);
    // Stem
    ctx.fillStyle = '#aa8866';
    ctx.fillRect(bx - 2 + sway, by, 4, 6);
    // Roots
    ctx.fillStyle = '#886644';
    ctx.fillRect(bx - 3 + sway, by + 5, 1, 2);
    ctx.fillRect(bx + 3 + sway, by + 5, 1, 2);
    // Cap
    const cw = Math.round(8 * chargeScale);
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - cw/2 + sway, by - 5, cw, 5);
    ctx.fillRect(bx - cw/2 + 1 + sway, by - 6, cw - 2, 1);
    // Spots
    ctx.fillStyle = C.f2cPoisonLight;
    ctx.fillRect(bx - 2 + sway, by - 4, 2, 2);
    ctx.fillRect(bx + 2 + sway, by - 3, 1, 1);
    // Pulse glow
    ctx.fillStyle = rgbStr(122, 58, 154, 0.1 + Math.sin(time * 2) * 0.05);
    ctx.fillRect(bx - 6, by - 7, 12, 14);
}

function drawGhost(ctx, e, def, time) {
    const bx = Math.round(e.x), by = Math.round(e.y);
    const bob = Math.sin(time * 2.5 + e.animTimer) * 2;
    ctx.save();
    ctx.globalAlpha = e.ghostOpacity;
    // Body (tapered)
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 4, by - 5 + bob, 8, 8);
    ctx.fillRect(bx - 3, by - 6 + bob, 6, 1);
    // Wispy tail
    ctx.fillStyle = def.colorDark;
    for (let t = 0; t < 3; t++) {
        const tw = Math.sin(time * 3 + t) * 1;
        ctx.fillRect(bx - 2 + t * 2 + tw, by + 3 + t + bob, 1, 2);
    }
    // Eyes
    const eyeGlow = e.ghostPhase === 'visible' ? 1 : 0.3;
    ctx.fillStyle = rgbStr(221, 238, 255, eyeGlow);
    ctx.fillRect(bx - 3, by - 3 + bob, 2, 2);
    ctx.fillRect(bx + 1, by - 3 + bob, 2, 2);
    // Mouth
    if (Math.sin(time * 4) > 0) {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(bx - 1, by + bob, 2, 1);
    }
    // Aura particles (when visible)
    if (e.ghostPhase === 'visible') {
        ctx.fillStyle = rgbStr(170, 187, 221, 0.3);
        const pa = time * 2;
        ctx.fillRect(bx + Math.cos(pa) * 6, by + Math.sin(pa) * 6 + bob, 1, 1);
        ctx.fillRect(bx + Math.cos(pa + 2) * 6, by + Math.sin(pa + 2) * 6 + bob, 1, 1);
    }
    ctx.restore();
}

function drawMimic(ctx, e, def, time) {
    const bx = Math.round(e.x), by = Math.round(e.y);
    if (!e.mimicActive) {
        // Draw as normal chest
        renderProp(ctx, T.PROP_CHEST, bx - 8, by - 8, new SeededRNG(e.x * 100 + e.y), time, null);
        return;
    }
    // Active mimic — chomping chest with legs
    const chomp = Math.sin(time * 8) > 0 ? 3 : 0;
    const hop = Math.abs(Math.sin(time * 6)) * 2;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(bx - 6, by + 5 - hop, 12, 3);
    // Legs
    ctx.fillStyle = '#6a4a2a';
    const legP = Math.floor(time * 8) % 2;
    ctx.fillRect(bx - 5, by + 3 - hop + legP, 2, 3);
    ctx.fillRect(bx + 3, by + 3 - hop + (1-legP), 2, 3);
    // Body (lower jaw)
    ctx.fillStyle = '#7a5a2a';
    ctx.fillRect(bx - 6, by - 1 - hop, 12, 6);
    // Teeth (lower)
    ctx.fillStyle = '#ffffff';
    for (let t = -4; t <= 3; t += 2) ctx.fillRect(bx + t, by - 2 - hop, 1, 2);
    // Upper jaw (lid)
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(bx - 6, by - 5 - hop - chomp, 12, 4);
    // Teeth (upper)
    ctx.fillStyle = '#ffffff';
    for (let t = -4; t <= 3; t += 2) ctx.fillRect(bx + t, by - 1 - hop - chomp, 1, 2);
    // Inner mouth
    ctx.fillStyle = '#661122';
    ctx.fillRect(bx - 4, by - 1 - hop, 8, chomp > 0 ? 1 : 3);
    // Eyes
    ctx.fillStyle = '#ff2222';
    ctx.fillRect(bx - 4, by - 4 - hop, 2, 2);
    ctx.fillRect(bx + 2, by - 4 - hop, 2, 2);
}

function drawNecromancer(ctx, e, def, time) {
    const bx = Math.round(e.x), by = Math.round(e.y);
    const sway = Math.sin(time * 1.5) * 1;
    // Shadow/float glow
    ctx.fillStyle = rgbStr(100, 50, 200, 0.15);
    ctx.fillRect(bx - 5, by + 7, 10, 3);
    // Robe
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 5 + sway, by - 2, 10, 10);
    ctx.fillStyle = '#3a2a4a';
    ctx.fillRect(bx - 4 + sway, by, 8, 8);
    // Tattered edge
    for (let t = -4; t <= 3; t++) {
        ctx.fillRect(bx + t + sway, by + 7 + (t % 2), 1, 1 + (t % 3));
    }
    // Hood/head
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 4 + sway, by - 7, 8, 6);
    ctx.fillRect(bx - 3 + sway, by - 8, 6, 1);
    // Purple glowing eyes
    const eyePulse = Math.sin(time * 3) * 0.2 + 0.8;
    ctx.fillStyle = rgbStr(170, 85, 255, eyePulse);
    ctx.fillRect(bx - 2 + sway, by - 5, 2, 2);
    ctx.fillRect(bx + 1 + sway, by - 5, 2, 2);
    // Summoning orb (right hand)
    const orbPulse = Math.sin(time * 4) * 1 + 3;
    ctx.fillStyle = rgbStr(187, 102, 255, 0.6);
    ctx.fillRect(bx + 5 + sway, by - 2, orbPulse, orbPulse);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(bx + 6 + sway, by - 1, 1, 1);
    // Staff (left hand)
    ctx.fillStyle = '#6a5a3a';
    ctx.fillRect(bx - 7 + sway, by - 6, 2, 12);
    ctx.fillStyle = '#aa66ff';
    ctx.fillRect(bx - 7 + sway, by - 7, 2, 2);
    // Shield visual
    if (e.necroShield > 0) {
        ctx.fillStyle = rgbStr(150, 80, 255, 0.12 + Math.sin(time * 5) * 0.04);
        ctx.beginPath();
        ctx.arc(bx + sway, by, 12, 0, Math.PI * 2);
        ctx.fill();
    }
}

// --- FLOOR 3 ENEMY DRAWING ---
function drawFlameImp(ctx, e, def, time) {
    const bx = Math.round(e.x), by = Math.round(e.y);
    const hover = Math.sin(time * 3 + e.animTimer) * 2;
    const wingPhase = Math.sin(time * 6) > 0 ? 1 : -1;
    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(bx, by + 6, 4, 1.5, 0, 0, Math.PI*2); ctx.fill();
    // Wings
    ctx.fillStyle = '#881111';
    ctx.fillRect(bx - 6, by - 2 + hover + wingPhase, 3, 2);
    ctx.fillRect(bx + 3, by - 2 + hover - wingPhase, 3, 2);
    // Body
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 4, by - 3 + hover, 8, 6);
    ctx.fillStyle = def.colorDark;
    ctx.fillRect(bx - 3, by + 1 + hover, 6, 2);
    // Head (big)
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 3, by - 6 + hover, 6, 4);
    // Horns
    ctx.fillStyle = '#881111';
    ctx.fillRect(bx - 3, by - 7 + hover, 1, 2);
    ctx.fillRect(bx + 2, by - 7 + hover, 1, 2);
    // Eyes
    ctx.fillStyle = '#ffdd22';
    ctx.fillRect(bx - 2, by - 5 + hover, 2, 1);
    ctx.fillRect(bx + 1, by - 5 + hover, 2, 1);
    // Grin
    ctx.fillStyle = '#ffaa22';
    ctx.fillRect(bx - 2, by - 3 + hover, 4, 1);
}

function drawGolem(ctx, e, def, time) {
    const bx = Math.round(e.x), by = Math.round(e.y);
    const sway = e.state === 'walk' ? Math.sin(e.animTimer * 2) * 1.5 : 0;
    const isSlam = e.state === 'slam';
    const isRecover = e.state === 'slam_recover';
    // Lava vein pulse
    const veinGlow = Math.sin(time * 2) * 0.3 + 0.7;
    const veinColor = rgbStr(255, 100, 50, isSlam ? 1 : veinGlow * 0.6);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(bx - 8, by + 9, 16, 4);
    // Legs
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 5 + sway, by + 5, 4, 6);
    ctx.fillRect(bx + 1 + sway, by + 5, 4, 6);
    // Body (massive)
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 7 + sway, by - 6, 14, 12);
    ctx.fillStyle = def.colorDark;
    ctx.fillRect(bx - 6 + sway, by - 5, 12, 10);
    // Lava veins on body
    ctx.fillStyle = veinColor;
    ctx.fillRect(bx - 4 + sway, by - 3, 1, 6);
    ctx.fillRect(bx + 3 + sway, by - 2, 1, 5);
    ctx.fillRect(bx - 2 + sway, by + 2, 5, 1);
    // Arms
    const armY = isSlam ? by - 12 : (isRecover ? by + 2 : by - 2);
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 10 + sway, armY, 4, 8);
    ctx.fillRect(bx + 6 + sway, armY, 4, 8);
    // Fists
    ctx.fillStyle = isSlam ? '#ff6633' : '#4a4a4a';
    ctx.fillRect(bx - 11 + sway, armY + 6, 5, 4);
    ctx.fillRect(bx + 6 + sway, armY + 6, 5, 4);
    // Head
    ctx.fillStyle = def.color;
    ctx.fillRect(bx - 3 + sway, by - 10, 6, 5);
    // Visor eyes
    ctx.fillStyle = rgbStr(255, 102, 51, veinGlow);
    ctx.fillRect(bx - 2 + sway, by - 8, 2, 1);
    ctx.fillRect(bx + 1 + sway, by - 8, 2, 1);
    // Mouth crack
    ctx.fillStyle = rgbStr(255, 80, 30, veinGlow * 0.5);
    ctx.fillRect(bx - 1 + sway, by - 6, 3, 1);
}

// Ghost damage immunity when invisible
const _origPlayerAttackHitCheck = playerAttackHitCheck;
// Override handled inline in the hit check

// --- HAZARD SYSTEM ---
const SPIKE = 20; // tile type for spikes
const CRUMBLE = 21; // tile type for crumbling floor
T.SPIKE = SPIKE;
T.CRUMBLE = CRUMBLE;
const crumbleTiles = []; // track crumbling state per tile

function initRoomHazards() {
    crumbleTiles.length = 0;
    if (!currentRoomData) return;
    for (let y = 0; y < GRID_ROWS; y++) {
        for (let x = 0; x < GRID_COLS; x++) {
            if (currentRoomData.tileMap[y][x] === T.CRUMBLE) {
                crumbleTiles.push({ x, y, state: 'solid', timer: 0, warned: false });
            }
        }
    }
}

function updateHazards(dt, time) {
    if (!currentRoomData) return;

    // Poison mushroom patches (contact damage)
    if (!player.items.includes('poison_ward')) {
        const ptx = Math.floor((player.x - PLAY_OFFSET_X) / TILE_SIZE);
        const pty = Math.floor((player.y - PLAY_OFFSET_Y) / TILE_SIZE);
        if (ptx >= 0 && ptx < GRID_COLS && pty >= 0 && pty < GRID_ROWS) {
            if (currentRoomData.tileMap[pty][ptx] === T.POISON_MUSH) {
                if (!game._poisonTick) game._poisonTick = 0;
                game._poisonTick += dt;
                if (game._poisonTick >= 1.0) {
                    game._poisonTick -= 1.0;
                    damagePlayer(1, player.x, player.y);
                    spawnBurst('poison_cloud', player.x, player.y, 4);
                }
            } else {
                game._poisonTick = 0;
            }
        }
    }

    // Spike traps
    for (let y = 0; y < GRID_ROWS; y++) {
        for (let x = 0; x < GRID_COLS; x++) {
            if (currentRoomData.tileMap[y][x] === T.SPIKE) {
                const cycle = 3.0;
                const phase = ((time + x * 0.1 + y * 0.1) % cycle) / cycle;
                // Spikes up from 0.67-1.0
                if (phase > 0.67) {
                    const tx = PLAY_OFFSET_X + x * TILE_SIZE + TILE_SIZE/2;
                    const ty = PLAY_OFFSET_Y + y * TILE_SIZE + TILE_SIZE/2;
                    const dx = player.x - tx, dy = player.y - ty;
                    if (dx*dx + dy*dy < 64) {
                        damagePlayer(1, tx, ty);
                    }
                }
            }
        }
    }

    // Crumble tiles
    for (const ct of crumbleTiles) {
        if (ct.state === 'collapsed') continue;
        const tx = PLAY_OFFSET_X + ct.x * TILE_SIZE + TILE_SIZE/2;
        const ty = PLAY_OFFSET_Y + ct.y * TILE_SIZE + TILE_SIZE/2;
        const dx = player.x - tx, dy = player.y - ty;
        const onTile = Math.abs(dx) < 8 && Math.abs(dy) < 8;

        if (ct.state === 'solid' && onTile) {
            ct.state = 'cracking';
            ct.timer = 0.5;
            playSound('crack');
        }
        if (ct.state === 'cracking') {
            ct.timer -= dt;
            if (ct.timer <= 0) {
                ct.state = 'collapsed';
                currentRoomData.tileMap[ct.y][ct.x] = T.PIT;
                tilesDirty = true;
                spawnBurst('bone_shatter', tx, ty, 8, { color: '#555555', gravity: 40 });
                playSound('collapse');
                // Damage if still on it
                if (onTile) damagePlayer(2, tx, ty);
            }
        }
    }

    // Geyser hazards
    if (currentRoomData.hazards) {
        for (const hazard of currentRoomData.hazards) {
            if (hazard.type === 'geyser') {
                const phase = (time % hazard.timing) / hazard.timing;
                if (phase > 0.8) {
                    for (const pos of hazard.positions) {
                        const gx = PLAY_OFFSET_X + pos.x * TILE_SIZE + TILE_SIZE/2;
                        const gy = PLAY_OFFSET_Y + pos.y * TILE_SIZE + TILE_SIZE/2;
                        const dx = player.x - gx, dy = player.y - gy;
                        if (dx*dx + dy*dy < 100) damagePlayer(1, gx, gy);
                    }
                }
            }
        }
    }

    // Wave timer for multi-wave rooms
    if (currentRoomData._waveTimer !== undefined && currentRoomData._waveTimer > 0) {
        currentRoomData._waveTimer -= dt;
        if (currentRoomData._waveTimer <= 0) {
            const wIdx = currentRoomData._waveIndex - 1;
            if (currentRoomData._waves && currentRoomData._waves[wIdx]) {
                for (const spawn of currentRoomData._waves[wIdx].enemies) {
                    spawnEnemy(spawn.type, PLAY_OFFSET_X + spawn.x * TILE_SIZE + 8, PLAY_OFFSET_Y + spawn.y * TILE_SIZE + 8, 0.3);
                    spawnBurst('dust', PLAY_OFFSET_X + spawn.x * TILE_SIZE + 8, PLAY_OFFSET_Y + spawn.y * TILE_SIZE + 8, 4, { color: '#55aa44' });
                }
            }
            currentRoomData._waveTimer = undefined;
        }
    }
}

function renderSpikeTile(ctx, x, y, time) {
    const ts = TILE_SIZE;
    // Metal grate base
    ctx.fillStyle = '#3a3a44';
    ctx.fillRect(x, y, ts, ts);
    ctx.fillStyle = '#2a2a34';
    // Grate holes
    for (let gy = 0; gy < 3; gy++) {
        for (let gx = 0; gx < 3; gx++) {
            ctx.fillRect(x + 2 + gx * 5, y + 2 + gy * 5, 3, 3);
        }
    }

    const cycle = 3.0;
    const phase = ((time + x * 0.006 + y * 0.006) % cycle) / cycle;

    if (phase > 0.5 && phase <= 0.67) {
        // Warning glow
        const warn = (phase - 0.5) / 0.17;
        ctx.fillStyle = rgbStr(255, 60, 30, warn * 0.3);
        ctx.fillRect(x, y, ts, ts);
    } else if (phase > 0.67) {
        // Spikes extended
        const ext = Math.min(1, (phase - 0.67) / 0.1);
        ctx.fillStyle = '#aaaaaa';
        for (let sy = 0; sy < 3; sy++) {
            for (let sx = 0; sx < 3; sx++) {
                const spikeH = ext * 5;
                ctx.fillRect(x + 3 + sx * 5, y + 3 + sy * 5 - spikeH, 1, spikeH);
            }
        }
        ctx.fillStyle = '#cccccc'; // spike tips
        for (let sy = 0; sy < 3; sy++) {
            for (let sx = 0; sx < 3; sx++) {
                ctx.fillRect(x + 3 + sx * 5, y + 3 + sy * 5 - ext * 5, 1, 1);
            }
        }
    }
}

function renderCrumbleTile(ctx, x, y, time) {
    const ts = TILE_SIZE;
    const theme = floorThemes[currentRoomData.floor];

    // Find crumble state
    const tileX = Math.round((x - PLAY_OFFSET_X) / TILE_SIZE);
    const tileY = Math.round((y - PLAY_OFFSET_Y) / TILE_SIZE);
    const ct = crumbleTiles.find(c => c.x === tileX && c.y === tileY);

    if (ct && ct.state === 'collapsed') {
        // Dark pit
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(x, y, ts, ts);
        ctx.fillStyle = '#151520';
        ctx.fillRect(x + 1, y + 1, ts - 2, ts - 2);
        return;
    }

    // Lighter than normal floor (hint)
    ctx.fillStyle = brighten(theme.floorBase, 12);
    ctx.fillRect(x, y, ts, ts);
    // Heavy cracks
    ctx.fillStyle = darken(theme.floorBase, 20);
    ctx.fillRect(x + 3, y + 2, 1, 8);
    ctx.fillRect(x + 4, y + 10, 1, 4);
    ctx.fillRect(x + 7, y + 1, 1, 6);
    ctx.fillRect(x + 11, y + 5, 1, 7);
    ctx.fillRect(x + 8, y + 7, 4, 1);
    // Warning triangle etched
    ctx.fillStyle = rgbStr(200, 100, 50, 0.25);
    ctx.fillRect(x + 6, y + 11, 4, 1);
    ctx.fillRect(x + 7, y + 10, 2, 1);
    ctx.fillRect(x + 7, y + 9, 1, 1);

    // Wobble when player is adjacent
    if (ct && ct.state === 'cracking') {
        const wobble = Math.sin(time * 30) * 1;
        ctx.fillStyle = rgbStr(200, 80, 40, 0.3);
        ctx.fillRect(x + wobble, y, ts, ts);
    }
}

// --- INTERACT PROMPT ---
function drawInteractPrompt(ctx) {
    if (!currentRoomData || !player.alive) return;
    // Check if player is near an unopened chest
    for (const prop of currentRoomData.props) {
        if (prop.type !== T.PROP_CHEST || prop.opened) continue;
        const px = PLAY_OFFSET_X + prop.x * TILE_SIZE + 8;
        const py = PLAY_OFFSET_Y + prop.y * TILE_SIZE;
        const dx = player.x - px, dy = player.y - (py + 8);
        if (dx * dx + dy * dy < 20 * 20) {
            // Draw "E" prompt above chest
            const bobY = Math.sin(game.time * 4) * 1.5;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(Math.round(px - 6), Math.round(py - 10 + bobY), 12, 8);
            queueText('E', Math.round(px), Math.round(py - 4 + bobY), 6, '#ffffff', 'center');
            return; // Only show one prompt
        }
    }
    // Also check room-level chests
    if (currentRoomData.chests) {
        for (const chest of currentRoomData.chests) {
            const key = currentRoomData.id + '_' + chest.x + '_' + chest.y;
            if (openedChests.has(key)) continue;
            const px = PLAY_OFFSET_X + chest.x * TILE_SIZE + 8;
            const py = PLAY_OFFSET_Y + chest.y * TILE_SIZE;
            const dx = player.x - px, dy = player.y - (py + 8);
            if (dx * dx + dy * dy < 20 * 20) {
                const bobY = Math.sin(game.time * 4) * 1.5;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(Math.round(px - 6), Math.round(py - 10 + bobY), 12, 8);
                queueText('E', Math.round(px), Math.round(py - 4 + bobY), 6, '#ffffff', 'center');
                return;
            }
        }
    }
}

// --- TUTORIAL OVERLAY ---
let tutorialTimer = 0;
let tutorialShown = false;
let tutorialDismissed = false;

function drawTutorial(ctx) {
    if (tutorialDismissed || game.currentRoom !== 1) return;
    if (!tutorialShown) { tutorialShown = true; tutorialTimer = 3.5; }
    if (tutorialTimer <= 0) { tutorialDismissed = true; return; }

    const alpha = tutorialTimer < 0.5 ? tutorialTimer / 0.5 : Math.min(1, tutorialTimer / 0.5);
    ctx.globalAlpha = alpha * 0.8;

    const ta = alpha * 0.8;
    // Left side: move hint
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(15, INTERNAL_H / 2 - 18, 55, 36);
    queueText('WASD', 42, INTERNAL_H / 2 - 8, 5, '#ffffff', 'center', ta);
    queueText('MOVE', 42, INTERNAL_H / 2 + 2, 5, '#ffffff', 'center', ta);
    queueText('Q = DASH', 42, INTERNAL_H / 2 + 12, 5, '#aaaaaa', 'center', ta);

    // Right side: attack hint
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(INTERNAL_W - 75, INTERNAL_H / 2 - 18, 60, 36);
    queueText('L-CLICK', INTERNAL_W - 45, INTERNAL_H / 2 - 8, 5, '#ffffff', 'center', ta);
    queueText('ATTACK', INTERNAL_W - 45, INTERNAL_H / 2 + 2, 5, '#ffffff', 'center', ta);
    queueText('E = OPEN', INTERNAL_W - 45, INTERNAL_H / 2 + 12, 5, '#aaaaaa', 'center', ta);

    ctx.globalAlpha = 1;
}

function makeBaseMap() {
    const m = [];
    for (let y = 0; y < GRID_ROWS; y++) {
        m[y] = [];
        for (let x = 0; x < GRID_COLS; x++) {
            m[y][x] = (y === 0 || y === GRID_ROWS-1 || x === 0 || x === GRID_COLS-1) ? T.WALL : T.FLOOR;
        }
    }
    return m;
}
