// --- BOSS STATE ---
const boss = {
    alive: false, hp: 30, maxHp: 30, x: 0, y: 0,
    phase: 1, state: 'idle', dir: 0,
    animTimer: 0, attackTimer: 4, attackType: null,
    slamTarget: null, slamWarning: 0,
    spinTimer: 0, summonTimer: 12, summonCount: 0,
    hitTimer: 0, deathTimer: 0, activated: false,
    roarTimer: 0, stepTimer: 0,
    bossType: 'bone_lord', // 'bone_lord' or 'infernal_smith'
    beamAngle: 0, beamActive: false, beamTimer: 0, beamSweepDir: 1,
    fissureCount: 0, slamCount: 0,
    lavaFloodLevel: 0, // Phase 3 arena shrink
};

function activateBoss() {
    const isFinal = game.currentRoom === 30;
    boss.bossType = isFinal ? 'infernal_smith' : 'bone_lord';
    boss.alive = true;
    boss.hp = isFinal ? 80 : 30;
    boss.maxHp = boss.hp;
    boss.x = PLAY_OFFSET_X + PLAY_W/2;
    boss.y = PLAY_OFFSET_Y + (isFinal ? 40 : 50);
    boss.phase = 1; boss.state = 'idle'; boss.activated = true;
    boss.attackTimer = 2; boss.summonTimer = 12; boss.summonCount = 0;
    boss.deathTimer = 0; boss.roarTimer = 0;
    boss.beamActive = false; boss.beamTimer = 0;
    boss.fissureCount = 0; boss.slamCount = 0; boss.lavaFloodLevel = 0;
    currentRoomData.lockedUntilClear = true;
    tilesDirty = true;
    triggerShake(isFinal ? 5 : 3, isFinal ? 15 : 10);
    if (isFinal) playSound('boss_roar');
}

function updateBoss(dt) {
    if (!boss.alive || !boss.activated) return;
    if (boss.bossType === 'infernal_smith') { updateInfernalSmith(dt); return; }
    boss.animTimer += dt;
    boss.stepTimer += dt;

    if (boss.hitTimer > 0) { boss.hitTimer -= dt; return; }

    if (boss.state === 'dying') {
        boss.deathTimer += dt;
        if (boss.deathTimer > 0.3 && boss.deathTimer - dt <= 0.3) {
            spawnBurst('bone_shatter', boss.x, boss.y, 25);
            spawnBurst('bone_shatter', boss.x, boss.y, 10, { color: '#8866aa' });
            triggerShake(6, 15);
            playSound('bone_break');
            // Gold fountain
            for (let i = 0; i < 20; i++) {
                spawnPickup(boss.x + Math.random()*30-15, boss.y + Math.random()*30-15, 'gold', 1);
            }
            // Kill summoned skeletons
            for (const e of enemies) { if (e.alive) { e.hp = 0; killEnemy(e); } }
        }
        if (boss.deathTimer > 2.0) {
            boss.alive = false;
            currentRoomData.lockedUntilClear = false;
            tilesDirty = true;
            // Spawn power-up
            const bossItems = ['boots_of_speed','fire_sword','throwing_daggers','ice_ring','vampire_fang','shadow_cloak'];
            const available = bossItems.filter(i => !player.items.includes(i));
            const pick = available.length > 0 ? available[Math.floor(Math.random()*available.length)] : 'boots_of_speed';
            spawnPickup(boss.x, boss.y, 'item', 0);
            pickups[pickups.length-1]._itemId = pick;
            // Floor clear
            game.floorClear = { timer: 0, shown: false, floor: 1 };
        }
        return;
    }

    // Roar transition to phase 2
    if (boss.roarTimer > 0) {
        boss.roarTimer -= dt;
        if (boss.roarTimer <= 0) boss.state = 'idle';
        return;
    }

    const dx = player.x - boss.x, dy = player.y - boss.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    boss.dir = Math.atan2(dy, dx);
    const spd = boss.phase === 1 ? player.speed * 0.6 : player.speed * 0.8;

    // Phase check
    if (boss.phase === 1 && boss.hp <= 15) {
        boss.phase = 2;
        boss.roarTimer = 1.5;
        boss.state = 'roar';
        triggerShake(5, 20);
        spawnBurst('dust', boss.x, boss.y, 15, { color: '#8866aa' });
        playSound('boss_roar');
        return;
    }

    // Summoning (phase 2)
    if (boss.phase === 2) {
        boss.summonTimer -= dt;
        if (boss.summonTimer <= 0 && boss.summonCount < 4) {
            const aliveSum = enemies.filter(e => e.alive).length;
            if (aliveSum < 4) {
                spawnEnemy('skeleton_warrior', boss.x - 30, boss.y + 20, 1.0);
                spawnEnemy('skeleton_warrior', boss.x + 30, boss.y + 20, 1.0);
                boss.summonCount += 2;
                spawnBurst('dust', boss.x, boss.y, 8, { color: '#8866aa' });
                playSound('summon');
            }
            boss.summonTimer = 12;
        }
    }

    // Attack cycle
    boss.attackTimer -= dt;
    if (boss.state === 'slam_telegraph') {
        boss.slamWarning -= dt;
        if (boss.slamWarning <= 0) {
            // SLAM!
            boss.state = 'slam';
            const tx = boss.slamTarget.x, ty = boss.slamTarget.y;
            const pdx = player.x - tx, pdy = player.y - ty;
            if (pdx*pdx + pdy*pdy < 48*48) damagePlayer(2, tx, ty);
            triggerShake(6, 8); playSound('slam');
            spawnBurst('bone_shatter', tx, ty, 12);
            addDecal(tx - 6, ty - 6, '#333333', 12);
            boss.attackTimer = boss.phase === 1 ? 4 : 3;
            boss.state = 'idle';
        }
        return;
    }

    if (boss.state === 'spin') {
        boss.spinTimer -= dt;
        // Spinning slash hitbox
        const spinR = 50;
        if (dist < spinR) damagePlayer(2, boss.x, boss.y);
        if (boss.spinTimer <= 0) {
            boss.state = 'idle';
            boss.attackTimer = boss.phase === 1 ? 4 : 3;
        }
        return;
    }

    // Move toward player
    if (dist > 25) {
        boss.x += Math.cos(boss.dir) * spd * dt;
        boss.y += Math.sin(boss.dir) * spd * dt;
        boss.x = Math.max(PLAY_OFFSET_X+16, Math.min(PLAY_OFFSET_X+PLAY_W-16, boss.x));
        boss.y = Math.max(PLAY_OFFSET_Y+16, Math.min(PLAY_OFFSET_Y+PLAY_H-16, boss.y));
        // Step shake
        if (boss.stepTimer > 0.5) {
            boss.stepTimer = 0;
            triggerShake(1, 2);
        }
    }

    if (boss.attackTimer <= 0) {
        // Choose attack
        if (boss.phase === 2 && Math.random() < 0.4) {
            // Spinning slash
            boss.state = 'spin';
            boss.spinTimer = 1.0;
            playSound('sword');
        } else {
            // Sword slam
            boss.state = 'slam_telegraph';
            boss.slamWarning = 1.0;
            boss.slamTarget = { x: player.x, y: player.y };
        }
    }
}

function damageBoss(amount) {
    if (!boss.alive || boss.state === 'dying') return;
    boss.hp -= amount;
    boss.hitTimer = 0.12;
    const isKill = boss.hp <= 0;
    spawnDamageNumber(boss.x, boss.y - 16, amount, isKill ? 'crit' : 'normal');
    spawnBurst('bone_shatter', boss.x, boss.y, isKill ? 10 : 4);
    addHitSpark((player.x + boss.x)/2, (player.y + boss.y)/2);
    triggerHitFreeze(isKill ? 15 : 4);
    triggerShake(isKill ? 8 : 3, isKill ? 20 : 4);
    if (isKill) {
        boss.hp = 0;
        boss.state = 'dying';
        boss.deathTimer = 0;
        playSound('boss_roar');
    }
}

function drawBoss(ctx, time) {
    if (!boss.activated) return;
    if (boss.bossType === 'infernal_smith') { drawInfernalSmith(ctx, time); return; }

    if (boss.state === 'dying') {
        if (boss.deathTimer > 2.0) return;
        const t = boss.deathTimer / 2.0;
        ctx.globalAlpha = 1 - t;
        // Shrinking collapse
        const scale = 1 - t * 0.8;
        const bx = Math.round(boss.x - 12 * scale);
        const by = Math.round(boss.y - 14 * scale + t * 10);
        drawBossSprite(ctx, bx, by, scale, time);
        ctx.globalAlpha = 1;
        return;
    }

    if (!boss.alive) return;

    // Hit flash
    if (boss.hitTimer > 0.05) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(Math.round(boss.x - 12), Math.round(boss.y - 14), 24, 28);
        return;
    }

    // Slam warning zone
    if (boss.state === 'slam_telegraph' && boss.slamTarget) {
        const warn = 1 - boss.slamWarning;
        ctx.fillStyle = rgbStr(255, 40, 20, 0.15 + warn * 0.2);
        ctx.beginPath();
        ctx.arc(boss.slamTarget.x, boss.slamTarget.y, 48 * warn, 0, Math.PI * 2);
        ctx.fill();
    }

    // Spin arc
    if (boss.state === 'spin') {
        ctx.fillStyle = rgbStr(255, 200, 150, 0.4);
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, 50, 0, Math.PI * 2);
        ctx.fill();
    }

    const bx = Math.round(boss.x - 12);
    const by = Math.round(boss.y - 14);
    drawBossSprite(ctx, bx, by, 1, time);

    // HP bar
    const barW = 40, barH = 3;
    const hpX = boss.x - barW/2, hpY = boss.y - 20;
    ctx.fillStyle = '#333333';
    ctx.fillRect(Math.round(hpX), Math.round(hpY), barW, barH);
    ctx.fillStyle = boss.phase === 2 ? '#aa44cc' : '#cc3333';
    ctx.fillRect(Math.round(hpX), Math.round(hpY), barW * (boss.hp / boss.maxHp), barH);
}

function drawBossSprite(ctx, bx, by, s, time) {
    const robeFlutter = Math.sin(time * 3) * 1;
    // Dark aura
    ctx.fillStyle = rgbStr(80, 40, 120, 0.15 + Math.sin(time * 5) * 0.05);
    ctx.fillRect(bx - 2, by - 2, 28 * s, 32 * s);
    // Tattered robe
    ctx.fillStyle = '#3a2a4a';
    ctx.fillRect(bx + 4*s, (by + 16*s)|0, 16*s, (12 + robeFlutter)*s);
    ctx.fillStyle = '#2a1a3a';
    ctx.fillRect(bx + 6*s, (by + 18*s)|0, 12*s, (10 + robeFlutter)*s);
    // Ribcage
    ctx.fillStyle = '#ddddcc';
    ctx.fillRect(bx + 5*s, (by + 8*s)|0, 14*s, 8*s);
    ctx.fillStyle = '#222222';
    for (let r = 0; r < 3; r++) ctx.fillRect(bx + 6*s, (by + (9+r*3)*s)|0, 12*s, 1);
    // Shoulder pauldrons
    ctx.fillStyle = '#ccccbb';
    ctx.fillRect(bx + 1*s, (by + 7*s)|0, 5*s, 4*s);
    ctx.fillRect(bx + 18*s, (by + 7*s)|0, 5*s, 4*s);
    // Skull
    ctx.fillStyle = '#eeeedd';
    ctx.fillRect(bx + 6*s, (by + 1*s)|0, 12*s, 7*s);
    ctx.fillRect(bx + 7*s, by|0, 10*s, 1);
    // Crown
    ctx.fillStyle = '#aa8822';
    ctx.fillRect(bx + 6*s, (by - 1)|0, 12*s, 2*s);
    ctx.fillStyle = '#ccaa33';
    ctx.fillRect(bx + 7*s, (by - 3)|0, 2*s, 3*s);
    ctx.fillRect(bx + 11*s, (by - 3)|0, 2*s, 3*s);
    ctx.fillRect(bx + 15*s, (by - 3)|0, 2*s, 3*s);
    // Glowing red eyes
    const eyePulse = Math.sin(time * 4) * 0.2 + 0.8;
    ctx.fillStyle = rgbStr(255, 50, 50, eyePulse);
    ctx.fillRect(bx + 8*s, (by + 3*s)|0, 3*s, 3*s);
    ctx.fillRect(bx + 14*s, (by + 3*s)|0, 3*s, 3*s);
    // Greatsword (right)
    if (boss.state === 'slam_telegraph') {
        // Raised high
        ctx.fillStyle = '#bbbbbb';
        ctx.fillRect(bx + 20*s, (by - 10)|0, 3*s, 14*s);
        ctx.fillStyle = '#cc4444';
        ctx.fillRect(bx + 21*s, (by - 8)|0, 1, 10*s);
    } else if (boss.state === 'spin') {
        const a = boss.animTimer * 8;
        ctx.fillStyle = '#bbbbbb';
        const sx = boss.x + Math.cos(a) * 18;
        const sy = boss.y + Math.sin(a) * 18;
        ctx.fillRect(Math.round(sx-1), Math.round(sy-6), 3, 12);
    } else {
        ctx.fillStyle = '#bbbbbb';
        ctx.fillRect(bx + 22*s, (by + 4*s)|0, 3*s, 16*s);
        ctx.fillStyle = '#cc4444';
        ctx.fillRect(bx + 23*s, (by + 6*s)|0, 1, 12*s);
        ctx.fillStyle = '#8a6a3a';
        ctx.fillRect(bx + 21*s, (by + 14*s)|0, 5*s, 2*s);
    }
    // Summoning hand glow (phase 2)
    if (boss.phase === 2) {
        const glow = Math.sin(time * 3) * 0.2 + 0.4;
        ctx.fillStyle = rgbStr(120, 60, 200, glow);
        ctx.fillRect(bx - 2*s, (by + 10*s)|0, 5*s, 5*s);
    }
}

// Boss hit check from player
function checkBossHit() {
    if (!boss.alive || boss.state === 'dying' || player.state !== 'attack') return;
    if (!player.swordArc || player.swordArc.life < 0.15) return;
    const hitRange = boss.bossType === 'infernal_smith' ? 30 : 25;
    const dx = boss.x - player.x, dy = boss.y - player.y;
    if (dx*dx + dy*dy < hitRange*hitRange) {
        // Smith vulnerable only during recovery states
        if (boss.bossType === 'infernal_smith' && boss.state !== 'slam_recover' && boss.state !== 'idle') return;
        let dmg = 1;
        if (player.fireSword || player.infernalBlade) dmg = 2;
        if (player.infernalBlade) dmg = 3;
        damageBoss(dmg);
        triggerHitFreeze(4);
        playSound('hit');
        game.combo.count++; game.combo.timer = 1.5;
    }
}

// ================================================================
// --- INFERNAL SMITH BOSS ---
// ================================================================
function updateInfernalSmith(dt) {
    boss.animTimer += dt;
    boss.stepTimer += dt;
    if (boss.hitTimer > 0) { boss.hitTimer -= dt; return; }

    const dx = player.x - boss.x, dy = player.y - boss.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    boss.dir = Math.atan2(dy, dx);
    const spd = boss.phase === 1 ? player.speed * 0.3 : (boss.phase === 2 ? player.speed * 0.4 : player.speed * 0.6);

    // Death
    if (boss.state === 'dying') {
        boss.deathTimer += dt;
        if (boss.deathTimer > 0.5 && boss.deathTimer - dt <= 0.5) {
            spawnBurst('bone_shatter', boss.x, boss.y, 30, { color: '#555555' });
            triggerShake(10, 20);
        }
        if (boss.deathTimer > 2 && boss.deathTimer - dt <= 2) {
            // Arm explosion
            spawnBurst('ember', boss.x - 10, boss.y, 25);
            triggerShake(8, 10);
            playSound('slam');
        }
        if (boss.deathTimer > 3 && boss.deathTimer - dt <= 3) {
            // Fall impact
            spawnBurst('bone_shatter', boss.x, boss.y + 10, 20);
            triggerShake(10, 15);
            playSound('slam');
        }
        if (boss.deathTimer > 5) {
            // Forge dies — lava cools
            boss.alive = false;
            currentRoomData.lockedUntilClear = false;
            // Gold fountain
            for (let i = 0; i < 30; i++) {
                spawnPickup(boss.x + Math.random()*40-20, boss.y + Math.random()*40-20, 'gold', 1);
            }
            // Trigger victory
            game.victory = { timer: 0, phase: 'stats' };
        }
        return;
    }

    // Phase transitions
    if (boss.phase === 1 && boss.hp <= 54) {
        boss.phase = 2;
        boss.roarTimer = 1.5;
        boss.state = 'roar';
        triggerShake(5, 20);
        playSound('boss_roar');
        spawnBurst('ember', boss.x, boss.y, 20);
        return;
    }
    if (boss.phase === 2 && boss.hp <= 24) {
        boss.phase = 3;
        boss.roarTimer = 1.5;
        boss.state = 'roar';
        triggerShake(8, 25);
        playSound('boss_roar');
        spawnBurst('ember', boss.x, boss.y, 30);
        return;
    }

    // Roar
    if (boss.roarTimer > 0) {
        boss.roarTimer -= dt;
        if (boss.roarTimer <= 0) boss.state = 'idle';
        return;
    }

    // Phase 3 lava flooding
    if (boss.phase === 3) {
        boss.lavaFloodLevel += dt * 0.02; // Very slow flood
    }

    // Beam attack (Phase 2+)
    if (boss.beamActive) {
        boss.beamTimer -= dt;
        boss.beamAngle += boss.beamSweepDir * (Math.PI * 0.7) * dt / (boss.phase === 3 ? 2 : 3);
        // Beam damage
        for (let r = 10; r < 150; r += 8) {
            const bx = boss.x + Math.cos(boss.beamAngle) * r;
            const by = boss.y + Math.sin(boss.beamAngle) * r;
            const pdx = player.x - bx, pdy = player.y - by;
            if (pdx*pdx + pdy*pdy < 100) {
                damagePlayer(3, boss.x, boss.y);
                break;
            }
        }
        if (boss.beamTimer <= 0) {
            boss.beamActive = false;
            boss.state = 'slam_recover'; // brief vulnerable window
            boss.attackTimer = 1;
        }
        return;
    }

    // Slam telegraph
    if (boss.state === 'slam_telegraph') {
        boss.slamWarning -= dt;
        if (boss.slamWarning <= 0) {
            // SLAM!
            const tx = boss.slamTarget.x, ty = boss.slamTarget.y;
            const pdx = player.x - tx, pdy = player.y - ty;
            if (pdx*pdx + pdy*pdy < 48*48) damagePlayer(3, tx, ty);
            triggerShake(8, 12);
            playSound('slam');
            spawnBurst('bone_shatter', tx, ty, 15);
            addDecal(tx - 6, ty - 6, '#222222', 12);
            boss.slamCount++;
            // Lava fissure every 4th slam (Phase 1) or 3rd slam (Phase 3)
            const fissureInterval = boss.phase === 3 ? 3 : 4;
            if (boss.slamCount % fissureInterval === 0) {
                addDecal(tx - 8, ty - 2, '#ff4422', 16);
                boss.fissureCount++;
            }
            boss.state = 'slam_recover';
            boss.attackTimer = boss.phase === 3 ? 1 : (boss.phase === 2 ? 1.5 : 2);
        }
        return;
    }

    // Recovery (vulnerable)
    if (boss.state === 'slam_recover') {
        boss.attackTimer -= dt;
        if (boss.attackTimer <= 0) {
            boss.state = 'idle';
            boss.attackTimer = boss.phase === 3 ? 2 : (boss.phase === 2 ? 3 : 5);
        }
        return;
    }

    // Move toward player
    if (boss.state === 'idle' || boss.state === 'walk') {
        if (dist > 20) {
            boss.x += Math.cos(boss.dir) * spd * dt;
            boss.y += Math.sin(boss.dir) * spd * dt;
            boss.x = Math.max(PLAY_OFFSET_X+16, Math.min(PLAY_OFFSET_X+PLAY_W-16, boss.x));
            boss.y = Math.max(PLAY_OFFSET_Y+16, Math.min(PLAY_OFFSET_Y+PLAY_H-16, boss.y));
            boss.state = 'walk';
            // Footstep shake
            if (boss.stepTimer > 0.6) { boss.stepTimer = 0; triggerShake(1, 2); }
        }
    }

    // Attack cycle
    boss.attackTimer -= dt;
    if (boss.attackTimer <= 0 && boss.state !== 'slam_recover') {
        // Choose attack
        if (boss.phase >= 2 && !boss.beamActive && Math.random() < 0.35) {
            // Lava beam
            boss.beamActive = true;
            boss.beamTimer = boss.phase === 3 ? 2 : 3;
            boss.beamAngle = boss.dir - (boss.beamSweepDir * Math.PI * 0.35);
            boss.beamSweepDir *= -1;
            boss.state = 'beam';
            playSound('boss_roar');
        } else if (boss.phase >= 2 && boss.summonTimer <= 0 && boss.phase < 3) {
            // Forge strike — summon imps
            boss.summonTimer = 30;
            for (let i = 0; i < 4; i++) {
                const sa = (Math.PI/2) * i;
                spawnEnemy('flame_imp', boss.x + Math.cos(sa)*40, boss.y + Math.sin(sa)*40, 0.5);
                spawnBurst('ember', boss.x + Math.cos(sa)*40, boss.y + Math.sin(sa)*40, 6);
            }
            playSound('summon');
            boss.attackTimer = 3;
        } else {
            // Hammer slam
            boss.state = 'slam_telegraph';
            boss.slamWarning = boss.phase === 3 ? 1.0 : 1.5;
            boss.slamTarget = { x: player.x, y: player.y };
        }
    }
    if (boss.summonTimer > 0) boss.summonTimer -= dt;
}

function drawInfernalSmith(ctx, time) {
    if (!boss.activated) return;
    const bx = Math.round(boss.x), by = Math.round(boss.y);

    if (boss.state === 'dying') {
        if (boss.deathTimer > 5) return;
        const t = Math.min(1, boss.deathTimer / 5);
        ctx.globalAlpha = 1 - t * 0.5;
        const collapse = Math.min(1, boss.deathTimer / 3);
        const dy = collapse * 15;
        drawSmithSprite(ctx, bx, by + dy, 1 - collapse * 0.3, time);
        ctx.globalAlpha = 1;
        return;
    }
    if (!boss.alive) return;

    // Hit flash
    if (boss.hitTimer > 0.06) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(bx - 12, by - 15, 24, 30);
        return;
    }

    // Slam warning
    if (boss.state === 'slam_telegraph' && boss.slamTarget) {
        const warn = 1 - boss.slamWarning / 1.5;
        ctx.fillStyle = rgbStr(255, 40, 20, 0.15 + warn * 0.2);
        ctx.beginPath();
        ctx.arc(boss.slamTarget.x, boss.slamTarget.y, 48 * warn, 0, Math.PI * 2);
        ctx.fill();
    }

    // Lava beam
    if (boss.beamActive) {
        for (let r = 10; r < 180; r += 2) {
            const bpx = boss.x + Math.cos(boss.beamAngle) * r;
            const bpy = boss.y + Math.sin(boss.beamAngle) * r;
            const alpha = 0.6 - (r / 300);
            ctx.fillStyle = rgbStr(255, 200, 100, Math.max(0.1, alpha));
            ctx.fillRect(Math.round(bpx) - 2, Math.round(bpy) - 2, 4, 4);
            ctx.fillStyle = rgbStr(255, 100, 30, Math.max(0.05, alpha * 0.5));
            ctx.fillRect(Math.round(bpx) - 3, Math.round(bpy) - 3, 6, 6);
            if (Math.random() < 0.1) spawnParticle('ember', bpx, bpy, { life: 0.2 });
        }
    }

    drawSmithSprite(ctx, bx, by, 1, time);

    // HP bar
    const barW = 60, barH = 4;
    const hpX = boss.x - barW/2, hpY = boss.y - 22;
    ctx.fillStyle = '#222222';
    ctx.fillRect(Math.round(hpX), Math.round(hpY), barW, barH);
    const hpCol = boss.phase === 3 ? '#ff4422' : (boss.phase === 2 ? '#ff8844' : '#cc3333');
    ctx.fillRect(Math.round(hpX), Math.round(hpY), barW * (boss.hp / boss.maxHp), barH);
    ctx.fillStyle = hpCol;
    ctx.fillRect(Math.round(hpX), Math.round(hpY), barW * (boss.hp / boss.maxHp), barH);
    queueText('THE INFERNAL SMITH', boss.x, boss.y - 26, 4, '#ff8844', 'center');
}

function drawSmithSprite(ctx, bx, by, s, time) {
    const veinGlow = Math.sin(time * 2) * 0.3 + 0.7;
    const isSlam = boss.state === 'slam_telegraph';
    const sway = boss.state === 'walk' ? Math.sin(boss.animTimer * 1.5) * 2 : 0;
    const armGlow = boss.beamActive ? 1 : veinGlow * 0.7;

    // Cape
    ctx.fillStyle = '#4a2a1a';
    ctx.fillRect(bx - 8 + sway, (by + 2)*s|0, 16*s, (12+Math.sin(time*2))*s);
    ctx.fillStyle = '#3a1a0a';
    ctx.fillRect(bx - 7 + sway, (by + 4)*s|0, 14*s, 8*s);

    // Legs
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(bx - 5 + sway, (by + 8)*s|0, 4*s, 7*s);
    ctx.fillRect(bx + 1 + sway, (by + 8)*s|0, 4*s, 7*s);

    // Body
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(bx - 9 + sway, (by - 6)*s|0, 18*s, 14*s);
    // Armor seams
    ctx.fillStyle = rgbStr(255, 85, 51, veinGlow * (boss.phase === 3 ? 0.8 : 0.4));
    ctx.fillRect(bx - 7 + sway, (by - 4)*s|0, 14*s, 1);
    ctx.fillRect(bx - 7 + sway, (by)*s|0, 14*s, 1);
    ctx.fillRect(bx - 7 + sway, (by + 4)*s|0, 14*s, 1);
    // Anvil emblem
    ctx.fillStyle = '#555555';
    ctx.fillRect(bx - 3 + sway, (by - 2)*s|0, 6*s, 3*s);

    // Hammer arm (right)
    const hammerY = isSlam ? by - 18 : by;
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(bx + 8 + sway, (hammerY)*s|0, 5*s, 10*s);
    // Hammer
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(bx + 7 + sway, (hammerY + 8)*s|0, 7*s, 5*s);
    ctx.fillStyle = rgbStr(255, 100, 50, veinGlow * 0.6);
    ctx.fillRect(bx + 8 + sway, (hammerY + 9)*s|0, 5*s, 3*s);

    // Molten arm (left) — THE defining feature
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(bx - 13 + sway, (by - 3)*s|0, 5*s, 5*s);
    ctx.fillStyle = rgbStr(255, 170, 34, armGlow);
    ctx.fillRect(bx - 14 + sway, (by + 1)*s|0, 5*s, 7*s);
    ctx.fillStyle = rgbStr(255, 220, 100, armGlow * 0.8);
    ctx.fillRect(bx - 13 + sway, (by + 2)*s|0, 3*s, 5*s);
    // Dripping
    if (Math.random() < 0.06) spawnParticle('ember', bx - 12, by + 8, { vy: 10, gravity: 30, life: 0.3, color: '#ffaa22' });

    // Helmet
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(bx - 5 + sway, (by - 13)*s|0, 10*s, 8*s);
    ctx.fillRect(bx - 6 + sway, (by - 12)*s|0, 12*s, 6*s);
    // Visor slit with orange eyes
    ctx.fillStyle = rgbStr(255, 100, 50, veinGlow);
    ctx.fillRect(bx - 4 + sway, (by - 10)*s|0, 8*s, 2*s);
    ctx.fillStyle = rgbStr(255, 50, 20, veinGlow);
    ctx.fillRect(bx - 3 + sway, (by - 10)*s|0, 2*s, 2*s);
    ctx.fillRect(bx + 2 + sway, (by - 10)*s|0, 2*s, 2*s);
    // Horns
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(bx - 4 + sway, (by - 15)*s|0, 2*s, 3*s);
    ctx.fillRect(bx + 3 + sway, (by - 15)*s|0, 2*s, 3*s);
}

// ================================================================
// --- ABYSSAL LEVIATHAN BOSS ---
// ================================================================
const leviathan = {
    alive: false, hp: 50, maxHp: 50,
    x: 0, y: 0, // head position
    phase: 1, state: 'inactive', // inactive, cinematic, idle, lunge_telegraph, lunge_strike, lunge_rest, body_arc, poison_spit, roar, dying, dead
    headBaseX: 0, headBaseY: 0, // resting position at water edge
    animTimer: 0, attackTimer: 5, attackCycle: 0,
    // Lunge
    lungeTarget: null, lungeShadow: 0,
    lungeRestTimer: 0,
    // Body arc
    bodyArc: null, // {startSide, progress, y}
    bodyArcTimer: 0,
    // Poison spit
    spitTimer: 0,
    // Phase 2
    crawlerSummonTimer: 15,
    // Cinematic
    cinematicTimer: 0, cinematicPhase: 0,
    // Death
    deathTimer: 0, drainProgress: 0,
    // Hit
    hitTimer: 0,
    // Visual
    headSway: 0, eyeTrackX: 0, eyeTrackY: 0,
    mouthOpen: 0, waterDrips: [],
    floorCracks: [], // permanent crack decals
    activated: false,
    introPlayed: false,
    hpBarFill: 0, // 0-1 for dramatic fill
};

function activateLeviathan() {
    leviathan.alive = true;
    leviathan.hp = 50; leviathan.maxHp = 50;
    leviathan.headBaseX = PLAY_OFFSET_X + PLAY_W / 2;
    leviathan.headBaseY = PLAY_OFFSET_Y + 6.5 * TILE_SIZE; // water edge
    leviathan.x = leviathan.headBaseX;
    leviathan.y = leviathan.headBaseY;
    leviathan.phase = 1;
    leviathan.state = 'cinematic';
    leviathan.cinematicTimer = 0;
    leviathan.cinematicPhase = 0;
    leviathan.activated = true;
    leviathan.introPlayed = false;
    leviathan.attackTimer = 3;
    leviathan.bodyArcTimer = 8;
    leviathan.spitTimer = 6;
    leviathan.crawlerSummonTimer = 15;
    leviathan.deathTimer = 0;
    leviathan.drainProgress = 0;
    leviathan.hpBarFill = 0;
    leviathan.floorCracks = [];
    leviathan.hitTimer = 0;
    currentRoomData.lockedUntilClear = true;
    currentRoomData._poisonPuddles = [];
    tilesDirty = true;
    playSound('door_lock');
    triggerShake(3, 10);
}

function updateLeviathan(dt) {
    if (!leviathan.activated || !leviathan.alive) return;
    leviathan.animTimer += dt;
    leviathan.headSway = Math.sin(leviathan.animTimer * 0.8) * 2;

    // Eye tracking
    const edx = player.x - leviathan.x, edy = player.y - leviathan.y;
    leviathan.eyeTrackX += (Math.sign(edx) - leviathan.eyeTrackX) * dt * 3;
    leviathan.eyeTrackY += (Math.sign(edy) - leviathan.eyeTrackY) * dt * 3;

    // Mouth idle
    leviathan.mouthOpen = Math.sin(leviathan.animTimer * 1.5) > 0.7 ? 1 : 0;

    // Water drips from head
    if (Math.random() < 0.05) {
        leviathan.waterDrips.push({ x: leviathan.x + Math.random()*12-6, y: leviathan.y - 4, vy: 0, life: 0.5 });
    }
    for (let i = leviathan.waterDrips.length - 1; i >= 0; i--) {
        const d = leviathan.waterDrips[i];
        d.vy += 80 * dt; d.y += d.vy * dt; d.life -= dt;
        if (d.life <= 0 || d.y > leviathan.headBaseY + 20) leviathan.waterDrips.splice(i, 1);
    }

    if (leviathan.hitTimer > 0) { leviathan.hitTimer -= dt; }

    // Update poison puddles
    const puddles = currentRoomData._poisonPuddles;
    for (let i = puddles.length - 1; i >= 0; i--) {
        puddles[i].life -= dt;
        if (puddles[i].life <= 0) puddles.splice(i, 1);
        else {
            // Damage player in puddle
            const pdx = player.x - puddles[i].x, pdy = player.y - puddles[i].y;
            if (pdx*pdx + pdy*pdy < (puddles[i].radius * TILE_SIZE) * (puddles[i].radius * TILE_SIZE)) {
                if (!player.poisonWard && player.alive && player.invincible <= 0) {
                    if (Math.floor(leviathan.animTimer * 2) !== Math.floor((leviathan.animTimer - dt) * 2)) {
                        damagePlayer(1, puddles[i].x, puddles[i].y);
                    }
                }
            }
        }
    }

    // BOSS_WATER damage to player
    if (player.alive) {
        const ptx = Math.floor((player.x - PLAY_OFFSET_X) / TILE_SIZE);
        const pty = Math.floor((player.y - PLAY_OFFSET_Y) / TILE_SIZE);
        if (ptx >= 0 && ptx < GRID_COLS && pty >= 0 && pty < GRID_ROWS) {
            if (currentRoomData.tileMap[pty][ptx] === T.BOSS_WATER && leviathan.state !== 'dead') {
                if (Math.floor(leviathan.animTimer * 2) !== Math.floor((leviathan.animTimer - dt) * 2)) {
                    damagePlayer(2, player.x, player.y + 8);
                }
            }
        }
    }

    // --- STATE MACHINE ---
    if (leviathan.state === 'cinematic') {
        updateLeviathanCinematic(dt);
        return;
    }
    if (leviathan.state === 'dying') {
        updateLeviathanDeath(dt);
        return;
    }
    if (leviathan.state === 'roar') {
        leviathan.cinematicTimer -= dt;
        if (leviathan.cinematicTimer <= 0) leviathan.state = 'idle';
        return;
    }

    // Phase transition check
    if (leviathan.phase === 1 && leviathan.hp <= 25) {
        leviathan.phase = 2;
        leviathan.state = 'roar';
        leviathan.cinematicTimer = 1.5;
        leviathan.mouthOpen = 3;
        triggerShake(6, 20);
        playSound('leviathan_roar');
        spawnBurst('splash', leviathan.x, leviathan.y, 20, { color: '#2a5a5a' });
        return;
    }

    // Lunge telegraph
    if (leviathan.state === 'lunge_telegraph') {
        leviathan.lungeShadow += dt / (leviathan.phase === 2 ? 0.6 : 0.8);
        // Head retracts toward water
        leviathan.y = leviathan.headBaseY + leviathan.lungeShadow * 12;
        if (leviathan.lungeShadow >= 1) {
            // STRIKE!
            leviathan.state = 'lunge_strike';
            leviathan.lungeTarget = { x: player.x, y: player.y };
            playSound('leviathan_impact');
            triggerShake(5, 6);
        }
        return;
    }

    if (leviathan.state === 'lunge_strike') {
        // Snap head to target
        const tx = leviathan.lungeTarget.x, ty = leviathan.lungeTarget.y;
        leviathan.x += (tx - leviathan.x) * 0.4;
        leviathan.y += (ty - leviathan.y) * 0.4;
        const ddx = player.x - tx, ddy = player.y - ty;
        if (ddx*ddx + ddy*ddy < 48*48) damagePlayer(3, tx, ty);
        // Add floor crack
        leviathan.floorCracks.push({ x: tx, y: ty });
        spawnBurst('bone_shatter', tx, ty, 8, { color: '#555555' });
        spawnBurst('splash', tx, ty, 6, { color: '#2a5a5a' });
        leviathan.state = 'lunge_rest';
        leviathan.lungeRestTimer = leviathan.phase === 2 ? 1.5 : 2.5;
        leviathan.mouthOpen = 2;
        return;
    }

    if (leviathan.state === 'lunge_rest') {
        // Head on ground - VULNERABLE
        leviathan.lungeRestTimer -= dt;
        if (leviathan.lungeRestTimer <= 0) {
            // Retract to water
            leviathan.state = 'idle';
            leviathan.x = leviathan.headBaseX;
            leviathan.y = leviathan.headBaseY;
            leviathan.mouthOpen = 0;
            playSound('leviathan_slide');
            spawnBurst('splash', leviathan.headBaseX, leviathan.headBaseY, 6, { color: '#1a3a6a' });
        }
        return;
    }

    if (leviathan.state === 'body_arc') {
        if (!leviathan.bodyArc) { leviathan.state = 'idle'; return; }
        leviathan.bodyArc.progress += dt / 1.5;
        if (leviathan.bodyArc.progress >= 1) {
            leviathan.bodyArc = null;
            leviathan.state = 'idle';
            spawnBurst('splash', leviathan.headBaseX, leviathan.headBaseY + 10, 4, { color: '#1a3a6a' });
            return;
        }
        // Check body collision with player
        const arcProg = leviathan.bodyArc.progress;
        const arcX = leviathan.bodyArc.startSide === 'left' ?
            PLAY_OFFSET_X + arcProg * PLAY_W :
            PLAY_OFFSET_X + (1 - arcProg) * PLAY_W;
        const arcY = PLAY_OFFSET_Y + leviathan.bodyArc.y * TILE_SIZE + Math.sin(arcProg * Math.PI) * -30;
        const adx = player.x - arcX, ady = player.y - arcY;
        if (adx*adx + ady*ady < 24*24 && player.alive) {
            damagePlayer(2, arcX, arcY);
        }
        return;
    }

    if (leviathan.state === 'poison_spit') {
        leviathan.spitTimer -= dt;
        if (leviathan.spitTimer <= 0) {
            // Spit 3 poison globs
            const baseAngle = Math.atan2(player.y - leviathan.y, player.x - leviathan.x);
            for (let i = -1; i <= 1; i++) {
                const a = baseAngle + i * 0.35;
                const tx = leviathan.x + Math.cos(a) * 100;
                const ty = leviathan.y + Math.sin(a) * 100;
                // Landing position (clamped to arena)
                const lx = Math.max(PLAY_OFFSET_X + 16, Math.min(PLAY_OFFSET_X + PLAY_W - 16, player.x + Math.cos(a) * 30 + Math.random()*40-20));
                const ly = Math.max(PLAY_OFFSET_Y + 16, Math.min(PLAY_OFFSET_Y + 6 * TILE_SIZE, player.y + Math.sin(a) * 30 + Math.random()*30-15));
                // Check if it hits a stalagmite
                let hitStalag = false;
                for (const st of currentRoomData._stalagmites) {
                    if (st.alive) {
                        const sx = PLAY_OFFSET_X + st.x * TILE_SIZE + 8;
                        const sy = PLAY_OFFSET_Y + st.y * TILE_SIZE + 8;
                        if (Math.abs(lx - sx) < 20 && Math.abs(ly - sy) < 20) {
                            st.hp--;
                            if (st.hp <= 0) {
                                st.alive = false;
                                currentRoomData.tileMap[st.y][st.x] = T.FLOOR;
                                tilesDirty = true;
                                spawnBurst('bone_shatter', sx, sy, 15, { color: '#555555' });
                                playSound('crack');
                            } else {
                                spawnBurst('splash', sx, sy, 6, { color: '#44aa44' });
                            }
                            hitStalag = true;
                            break;
                        }
                    }
                }
                if (!hitStalag) {
                    currentRoomData._poisonPuddles.push({ x: lx, y: ly, radius: 2, life: 8 });
                }
                spawnParticle('poison_cloud', lx, ly, { life: 1, size: 3, color: '#44cc33' });
            }
            playSound('leviathan_spit');
            leviathan.mouthOpen = 0;
            leviathan.state = 'idle';
        }
        return;
    }

    // IDLE — choose attacks
    if (leviathan.state === 'idle') {
        leviathan.x += (leviathan.headBaseX + leviathan.headSway - leviathan.x) * dt * 2;
        leviathan.y += (leviathan.headBaseY - leviathan.y) * dt * 2;

        leviathan.attackTimer -= dt;
        leviathan.bodyArcTimer -= dt;

        // Phase 2: poison spit
        if (leviathan.phase === 2) {
            leviathan.spitTimer -= dt;
            leviathan.crawlerSummonTimer -= dt;
            if (leviathan.crawlerSummonTimer <= 0) {
                // Summon cave crawlers
                for (let c = 0; c < 2; c++) {
                    const sx = PLAY_OFFSET_X + (c === 0 ? 3 : 17) * TILE_SIZE;
                    const sy = PLAY_OFFSET_Y + 6.5 * TILE_SIZE;
                    spawnEnemy('cave_crawler', sx, sy, 0.5);
                    spawnBurst('splash', sx, sy, 4, { color: '#1a3a6a' });
                }
                leviathan.crawlerSummonTimer = 15;
                playSound('leviathan_splash');
            }
            if (leviathan.spitTimer <= 0 && leviathan.attackTimer > 1) {
                leviathan.state = 'poison_spit';
                leviathan.spitTimer = 0.6;
                leviathan.mouthOpen = 3;
                return;
            }
        }

        // Body arc
        if (leviathan.bodyArcTimer <= 0) {
            leviathan.state = 'body_arc';
            leviathan.bodyArc = {
                startSide: Math.random() < 0.5 ? 'left' : 'right',
                progress: 0,
                y: 3 + Math.random() * 2
            };
            leviathan.bodyArcTimer = 8 + Math.random() * 2;
            playSound('leviathan_slide');
            const splashX = leviathan.bodyArc.startSide === 'left' ? PLAY_OFFSET_X + 10 : PLAY_OFFSET_X + PLAY_W - 10;
            spawnBurst('splash', splashX, PLAY_OFFSET_Y + leviathan.bodyArc.y * TILE_SIZE, 6, { color: '#1a3a6a' });
            return;
        }

        // Lunge attack
        if (leviathan.attackTimer <= 0) {
            leviathan.state = 'lunge_telegraph';
            leviathan.lungeShadow = 0;
            leviathan.attackTimer = leviathan.phase === 2 ? 4 : 5;
            if (leviathan.phase === 2) leviathan.spitTimer = 6;
            playSound('leviathan_hiss');
            return;
        }
    }
}

function updateLeviathanCinematic(dt) {
    leviathan.cinematicTimer += dt;
    const t = leviathan.cinematicTimer;

    if (t < 0.5) {
        // Room darkens
    } else if (t < 1.5) {
        // Water churns
        if (Math.random() < 0.3) {
            const wx = leviathan.headBaseX + Math.random() * 80 - 40;
            spawnParticle('splash', wx, leviathan.headBaseY + 20, { color: '#1a3a6a', vy: -20 });
        }
    } else if (t < 2.0 && leviathan.cinematicPhase === 0) {
        // Shadow under water
        leviathan.cinematicPhase = 1;
    } else if (t < 2.5 && leviathan.cinematicPhase === 1) {
        // Head erupts
        leviathan.cinematicPhase = 2;
        leviathan.y = leviathan.headBaseY;
        spawnBurst('splash', leviathan.headBaseX, leviathan.headBaseY, 25, { color: '#2a5a5a' });
        triggerShake(6, 10);
        playSound('leviathan_roar');
    } else if (t < 3.5 && leviathan.cinematicPhase === 2) {
        // Head rises and roars
        leviathan.y += (leviathan.headBaseY - 10 - leviathan.y) * dt * 3;
        leviathan.mouthOpen = 3;
    } else if (t < 4.0 && leviathan.cinematicPhase === 2) {
        leviathan.cinematicPhase = 3;
        leviathan.mouthOpen = 0;
        leviathan.y = leviathan.headBaseY;
    } else if (t >= 4.0) {
        // Fight begins
        leviathan.state = 'idle';
        leviathan.introPlayed = true;
    }
}

function updateLeviathanDeath(dt) {
    leviathan.deathTimer += dt;
    const t = leviathan.deathTimer;

    if (t < 1.5) {
        // Thrashing
        leviathan.x = leviathan.headBaseX + Math.sin(t * 12) * 15;
        leviathan.mouthOpen = 3;
        if (Math.random() < 0.3) spawnBurst('splash', leviathan.x, leviathan.y, 4, { color: '#2a5a5a' });
        triggerShake(3, 2);
    } else if (t < 2.5) {
        // Sinking
        leviathan.y += dt * 20;
        leviathan.mouthOpen = 1;
    } else if (t < 3.5) {
        // Silence, then drain
        leviathan.alive = false;
    } else if (t < 5.5) {
        // Drain water
        leviathan.drainProgress = Math.min(1, (t - 3.5) / 2);
        if (t > 3.6 && t - dt <= 3.6) playSound('leviathan_drain');
        // Convert boss water tiles to floor progressively
        const drainRow = 9 - Math.floor(leviathan.drainProgress * 3);
        for (let y = 9; y >= Math.max(7, drainRow); y--) {
            for (let x = 1; x < GRID_COLS - 1; x++) {
                if (currentRoomData.tileMap[y][x] === T.BOSS_WATER) {
                    currentRoomData.tileMap[y][x] = T.FLOOR;
                    tilesDirty = true;
                }
            }
        }
    } else if (t < 6.5) {
        // Spawn loot on drained floor
        if (t > 5.6 && t - dt <= 5.6) {
            for (let i = 0; i < 25; i++) {
                spawnPickup(
                    PLAY_OFFSET_X + 5 * TILE_SIZE + Math.random() * 10 * TILE_SIZE,
                    PLAY_OFFSET_Y + 8 * TILE_SIZE + Math.random() * TILE_SIZE,
                    'gold', 1);
            }
            // Power-up item
            const bossItems = ['boots_of_speed','fire_sword','throwing_daggers','ice_ring','vampire_fang','shadow_cloak'];
            const available = bossItems.filter(i => !player.items.includes(i));
            const pick = available.length > 0 ? available[Math.floor(Math.random()*available.length)] : 'boots_of_speed';
            spawnPickup(PLAY_OFFSET_X + PLAY_W/2, PLAY_OFFSET_Y + 8 * TILE_SIZE, 'item', 0);
            pickups[pickups.length-1]._itemId = pick;
            // Kill remaining crawlers
            for (const e of enemies) { if (e.alive) { e.hp = 0; killEnemy(e); } }
            // Clear poison
            currentRoomData._poisonPuddles = [];
            playSound('leviathan_victory');
        }
    } else if (t < 7.0) {
        // Floor clear text
        if (t > 6.6 && t - dt <= 6.6) {
            game.floorClear = { timer: 0, shown: false, floor: 2 };
        }
    } else {
        // Done
        leviathan.state = 'dead';
        currentRoomData.lockedUntilClear = false;
        tilesDirty = true;
        clearedRooms.add(20);
    }
}

function damageLeviathan(amount) {
    if (!leviathan.alive || leviathan.state === 'dying' || leviathan.state === 'cinematic') return;
    // Only hittable during lunge_rest
    if (leviathan.state !== 'lunge_rest') return;
    leviathan.hp -= amount;
    leviathan.hitTimer = 0.12;
    const isKill = leviathan.hp <= 0;
    spawnDamageNumber(leviathan.x, leviathan.y - 12, amount, isKill ? 'crit' : 'normal');
    spawnBurst('splash', leviathan.x, leviathan.y, isKill ? 15 : 5, { color: '#2a5a5a' });
    addHitSpark((player.x + leviathan.x)/2, (player.y + leviathan.y)/2);
    triggerHitFreeze(isKill ? 10 : 4);
    triggerShake(isKill ? 8 : 3, isKill ? 20 : 4);
    if (isKill) {
        leviathan.hp = 0;
        leviathan.state = 'dying';
        leviathan.deathTimer = 0;
        playSound('leviathan_roar');
    }
}

function checkLeviathanHit() {
    if (!leviathan.alive || leviathan.state !== 'lunge_rest') return;
    if (player.state !== 'attack' || !player.swordArc || player.swordArc.life < 0.15) return;
    const dx = leviathan.x - player.x, dy = leviathan.y - player.y;
    if (dx*dx + dy*dy < 30*30) {
        let dmg = 1;
        if (player.fireSword || player.infernalBlade) dmg = 2;
        if (player.infernalBlade) dmg = 3;
        damageLeviathan(dmg);
        playSound('hit');
        game.combo.count++; game.combo.timer = 1.5;
    }
}

function drawLeviathan(ctx, time) {
    if (!leviathan.activated) return;
    const room = currentRoomData;

    // Draw poison puddles
    if (room._poisonPuddles) {
        for (const p of room._poisonPuddles) {
            const alpha = Math.min(1, p.life / 2) * 0.4;
            ctx.fillStyle = rgbStr(68, 170, 51, alpha);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius * TILE_SIZE, 0, Math.PI * 2);
            ctx.fill();
            // Animated haze
            ctx.fillStyle = rgbStr(68, 204, 51, alpha * 0.5 + Math.sin(time * 3 + p.x) * 0.1);
            ctx.beginPath();
            ctx.arc(p.x + Math.sin(time * 2) * 3, p.y + Math.cos(time * 2.5) * 3, p.radius * TILE_SIZE * 0.7, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Draw floor cracks
    for (const c of leviathan.floorCracks) {
        ctx.fillStyle = 'rgba(40,40,40,0.5)';
        ctx.fillRect(c.x - 4, c.y - 1, 8, 2);
        ctx.fillRect(c.x - 1, c.y - 4, 2, 8);
        ctx.fillRect(c.x - 3, c.y - 3, 2, 2);
    }

    // Body arc
    if (leviathan.state === 'body_arc' && leviathan.bodyArc) {
        const arc = leviathan.bodyArc;
        const prog = arc.progress;
        ctx.fillStyle = '#1a3a3a';
        for (let seg = -3; seg <= 3; seg++) {
            const segProg = Math.max(0, Math.min(1, prog + seg * 0.05));
            const sx = arc.startSide === 'left' ?
                PLAY_OFFSET_X + segProg * PLAY_W :
                PLAY_OFFSET_X + (1 - segProg) * PLAY_W;
            const sy = PLAY_OFFSET_Y + arc.y * TILE_SIZE + Math.sin(segProg * Math.PI) * -30;
            // Body segment
            ctx.fillStyle = '#1a3a3a';
            ctx.fillRect(Math.round(sx - 6), Math.round(sy - 5), 12, 10);
            ctx.fillStyle = '#2a5a5a';
            ctx.fillRect(Math.round(sx - 5), Math.round(sy + 2), 10, 3);
            // Dorsal ridge
            ctx.fillStyle = '#2a4a4a';
            ctx.fillRect(Math.round(sx - 1), Math.round(sy - 7), 2, 3);
        }
    }

    // Lunge shadow on ground
    if (leviathan.state === 'lunge_telegraph') {
        const shadowR = leviathan.lungeShadow * 24;
        ctx.fillStyle = rgbStr(0, 0, 0, 0.15 + leviathan.lungeShadow * 0.2);
        ctx.beginPath();
        ctx.arc(player.x, player.y, shadowR, 0, Math.PI * 2);
        ctx.fill();
    }

    // Cinematic shadow under water
    if (leviathan.state === 'cinematic' && leviathan.cinematicPhase === 1) {
        const shadowX = leviathan.headBaseX + Math.sin(leviathan.cinematicTimer * 4) * 40;
        ctx.fillStyle = 'rgba(0,20,20,0.4)';
        ctx.beginPath();
        ctx.ellipse(shadowX, leviathan.headBaseY + 20, 30, 8, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    // Don't draw head if fully sunk in death
    if (leviathan.state === 'dying' && leviathan.deathTimer > 2.5) return;
    if (leviathan.state === 'dead') return;
    if (leviathan.state === 'cinematic' && leviathan.cinematicPhase < 2) return;

    // Hit flash
    if (leviathan.hitTimer > 0.06) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(Math.round(leviathan.x - 10), Math.round(leviathan.y - 12), 20, 24);
        return;
    }

    // Death fade
    if (leviathan.state === 'dying') {
        ctx.globalAlpha = Math.max(0, 1 - (leviathan.deathTimer - 1.5));
    }

    drawLeviathanHead(ctx, leviathan.x + leviathan.headSway, leviathan.y, time);

    ctx.globalAlpha = 1;

    // Water drips
    for (const d of leviathan.waterDrips) {
        ctx.fillStyle = rgbStr(26, 58, 106, 0.6);
        ctx.fillRect(Math.round(d.x), Math.round(d.y), 1, 2);
    }

    // HP bar (bottom of screen)
    if (leviathan.introPlayed && leviathan.alive) {
        leviathan.hpBarFill = Math.min(1, leviathan.hpBarFill + 0.02);
        const barW = 100, barH = 4;
        const barX = INTERNAL_W / 2 - barW / 2;
        const barY = INTERNAL_H - 12;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(barX - 2, barY - 8, barW + 4, barH + 12);
        ctx.fillStyle = '#222222';
        ctx.fillRect(barX, barY, barW, barH);
        const hpFrac = (leviathan.hp / leviathan.maxHp) * leviathan.hpBarFill;
        const hpCol = leviathan.phase === 2 ? '#44cc88' : '#2288aa';
        ctx.fillStyle = hpCol;
        ctx.fillRect(barX, barY, barW * hpFrac, barH);
        queueText('THE ABYSSAL LEVIATHAN', INTERNAL_W / 2, barY - 2, 4, '#66ddcc', 'center');
    }

    // Cinematic darkening
    if (leviathan.state === 'cinematic' && leviathan.cinematicTimer < 2) {
        const darkAlpha = Math.min(0.4, leviathan.cinematicTimer * 0.3);
        ctx.fillStyle = rgbStr(0, 0, 0, darkAlpha);
        ctx.fillRect(0, 0, INTERNAL_W, INTERNAL_H);
    }
}

function drawLeviathanHead(ctx, hx, hy, time) {
    const mx = Math.round(hx), my = Math.round(hy);
    const mouthGap = leviathan.mouthOpen * 2;

    // Neck emerging from water
    ctx.fillStyle = '#1a3a3a';
    ctx.fillRect(mx - 5, my + 4, 10, 16);
    ctx.fillStyle = '#2a5a5a';
    ctx.fillRect(mx - 4, my + 6, 8, 12);

    // Head body (elongated serpentine)
    ctx.fillStyle = '#1a3a3a';
    ctx.fillRect(mx - 10, my - 12, 20, 16 + mouthGap);
    ctx.fillRect(mx - 9, my - 13, 18, 1);
    // Underbelly
    ctx.fillStyle = '#2a5a5a';
    ctx.fillRect(mx - 8, my + 1, 16, 3 + mouthGap);
    // Scale texture
    ctx.fillStyle = '#224444';
    for (let sy = -10; sy < 2; sy += 3) {
        for (let sx = -8; sx < 8; sx += 4) {
            ctx.fillRect(mx + sx, my + sy, 2, 1);
        }
    }

    // Eyes (glowing yellow-green)
    const eyeColor = leviathan.phase === 2 ? '#dddd44' : '#aaddaa';
    const eyeGlow = Math.sin(time * 2) * 0.15 + 0.85;
    ctx.fillStyle = rgbStr(...hexToRgb(eyeColor), eyeGlow);
    ctx.fillRect(mx - 7, my - 9, 3, 3);
    ctx.fillRect(mx + 4, my - 9, 3, 3);
    // Slit pupils
    ctx.fillStyle = '#111111';
    const pupilOff = Math.round(leviathan.eyeTrackX);
    ctx.fillRect(mx - 6 + pupilOff, my - 9, 1, 3);
    ctx.fillRect(mx + 5 + pupilOff, my - 9, 1, 3);

    // Bioluminescent spots
    ctx.fillStyle = rgbStr(68, 255, 204, 0.5 + Math.sin(time * 1.5) * 0.2);
    ctx.fillRect(mx - 2, my - 11, 1, 1);
    ctx.fillRect(mx + 1, my - 11, 1, 1);
    ctx.fillRect(mx, my - 12, 1, 1);

    // Mouth
    if (mouthGap > 0) {
        // Open mouth
        ctx.fillStyle = '#4a1a1a';
        ctx.fillRect(mx - 8, my + 1, 16, mouthGap + 2);
        // Teeth
        ctx.fillStyle = '#ffffff';
        for (let t = -6; t <= 5; t += 2) {
            ctx.fillRect(mx + t, my, 1, 2);
            ctx.fillRect(mx + t, my + mouthGap + 1, 1, 2);
        }
    } else {
        // Closed mouth line
        ctx.fillStyle = '#0a2a2a';
        ctx.fillRect(mx - 8, my + 2, 16, 1);
    }
}

// --- PUSH BLOCK MECHANICS ---
function updatePushBlock(dt) {
    if (!currentRoomData._pushBlock || puzzleState.plateSolved) return;
    const pb = currentRoomData._pushBlock;
    const bx = PLAY_OFFSET_X + pb.x * TILE_SIZE + 8;
    const by = PLAY_OFFSET_Y + pb.y * TILE_SIZE + 8;
    const dx = player.x - bx, dy = player.y - by;
    const dist = Math.sqrt(dx*dx+dy*dy);

    if (dist < 14 && (input.left || input.right || input.up || input.down)) {
        let pushDir = null;
        if (Math.abs(dx) > Math.abs(dy)) {
            pushDir = dx > 0 ? 'left' : 'right';
        } else {
            pushDir = dy > 0 ? 'up' : 'down';
        }
        const pushSpeed = 15 * dt;
        let nx = pb.x, ny = pb.y;
        if (pushDir === 'right') nx += pushSpeed;
        if (pushDir === 'left') nx -= pushSpeed;
        if (pushDir === 'down') ny += pushSpeed;
        if (pushDir === 'up') ny -= pushSpeed;

        const tx = Math.floor(nx), ty = Math.floor(ny);
        if (tx >= 1 && tx < GRID_COLS-1 && ty >= 1 && ty < GRID_ROWS-1) {
            const tile = currentRoomData.tileMap[ty][tx];
            if (tile === T.FLOOR || tile === T.PLATE) {
                pb.x = nx; pb.y = ny;
            }
        }
    }

    // Check if block is on pressure plate
    if (currentRoomData._platePos) {
        const pp = currentRoomData._platePos;
        if (Math.abs(pb.x - pp.x - 0.5) < 1 && Math.abs(pb.y - pp.y) < 0.8) {
            if (!puzzleState.plateSolved) {
                puzzleState.plateSolved = true;
                puzzleState.gateOpen = true;
                // Open gate
                currentRoomData.tileMap[1][9] = T.FLOOR;
                currentRoomData.tileMap[1][10] = T.FLOOR;
                tilesDirty = true;
                playSound('gate_open');
                triggerShake(2, 5);
                spawnBurst('dust', PLAY_OFFSET_X + 9.5 * TILE_SIZE, PLAY_OFFSET_Y + 1 * TILE_SIZE + 8, 10);
            }
        }
    }
}

function drawPushBlock(ctx) {
    if (!currentRoomData._pushBlock) return;
    const pb = currentRoomData._pushBlock;
    const bx = PLAY_OFFSET_X + pb.x * TILE_SIZE;
    const by = PLAY_OFFSET_Y + pb.y * TILE_SIZE;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(bx + 1, by + 13, 14, 3);
    // Stone block
    ctx.fillStyle = '#777788';
    ctx.fillRect(bx, by, 16, 16);
    ctx.fillStyle = '#888899';
    ctx.fillRect(bx + 1, by + 1, 14, 14);
    ctx.fillStyle = '#666677';
    ctx.fillRect(bx + 1, by + 14, 14, 1);
    ctx.fillRect(bx + 14, by + 1, 1, 14);
    // Arrow symbols
    ctx.fillStyle = '#555566';
    ctx.fillRect(bx + 7, by + 3, 2, 4); // up arrow
    ctx.fillRect(bx + 6, by + 5, 4, 1);
    ctx.fillRect(bx + 7, by + 9, 2, 4); // down arrow
    ctx.fillRect(bx + 6, by + 10, 4, 1);
}

// --- CAMPFIRE + REST HEALING ---
let campfireHealTimer = 0;

function updateCampfire(dt) {
    if (!currentRoomData._campfire || !player.alive) return;
    const cf = currentRoomData._campfire;
    const cx = PLAY_OFFSET_X + cf.x * TILE_SIZE + 8;
    const cy = PLAY_OFFSET_Y + cf.y * TILE_SIZE + 8;
    const dx = player.x - cx, dy = player.y - cy;
    if (dx*dx + dy*dy < 48*48 && player.health < player.maxHealth) {
        campfireHealTimer += dt;
        if (campfireHealTimer >= 4) {
            campfireHealTimer -= 4;
            player.health = Math.min(player.maxHealth, player.health + 2);
            spawnParticle('gold_sparkle', player.x, player.y - 10, { color: '#44ff44', vy: -15 });
            playSound('heal');
        }
    } else {
        campfireHealTimer = 0;
    }
}

function drawCampfire(ctx, time) {
    if (!currentRoomData._campfire) return;
    const cf = currentRoomData._campfire;
    const cx = PLAY_OFFSET_X + cf.x * TILE_SIZE;
    const cy = PLAY_OFFSET_Y + cf.y * TILE_SIZE;
    // Stone ring
    ctx.fillStyle = '#666666';
    ctx.fillRect(cx + 3, cy + 10, 10, 4);
    ctx.fillRect(cx + 2, cy + 11, 12, 2);
    // Logs
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(cx + 4, cy + 9, 8, 3);
    ctx.fillStyle = '#4a2a0a';
    ctx.fillRect(cx + 5, cy + 8, 6, 2);
    // Flames
    const flicker = Math.sin(time * 8);
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(cx + 5, cy + 4 + flicker, 6, 5);
    ctx.fillStyle = '#ff8822';
    ctx.fillRect(cx + 6, cy + 3 + flicker, 4, 4);
    ctx.fillStyle = '#ffcc44';
    ctx.fillRect(cx + 7, cy + 2 + flicker, 2, 3);
    ctx.fillStyle = '#ffffff';
    if (Math.sin(time * 12) > 0.3) ctx.fillRect(cx + 7, cy + 3 + flicker, 1, 1);
}

// --- SECRET WALL ---
function checkSecretWallHit() {
    if (!currentRoomData._secretWall || player.state !== 'attack') return;
    if (!player.swordArc || player.swordArc.life < 0.15) return;
    const sw = currentRoomData._secretWall;
    const wx = PLAY_OFFSET_X + sw.x * TILE_SIZE + 8;
    const wy = PLAY_OFFSET_Y + sw.y * TILE_SIZE + 8;
    const dx = player.x - wx, dy = player.y - wy;
    if (dx*dx + dy*dy < 20*20) {
        sw.hp--;
        spawnBurst('bone_shatter', wx, wy, 3, { color: '#666666' });
        triggerShake(1, 2);
        if (sw.hp <= 0) {
            // Break wall
            currentRoomData.tileMap[sw.y][sw.x] = T.FLOOR;
            tilesDirty = true;
            spawnBurst('bone_shatter', wx, wy, 15, { color: '#555555' });
            playSound('collapse');
            // Add chest prop
            const sc = currentRoomData._secretChest;
            currentRoomData.props.push({ type: T.PROP_CHEST, x: sc.x, y: sc.y });
            currentRoomData.chests.push(sc);
            currentRoomData._secretWall = null;
        }
    }
}

// --- AMBUSH TRIGGER (Room 7) ---
function checkAmbushTrigger() {
    if (!currentRoomData._ambushTriggered === undefined || currentRoomData._ambushTriggered) return;
    if (currentRoomData.id !== 7 && currentRoomData.id !== 27) return;
    // Center zone check
    const cx = player.x - PLAY_OFFSET_X, cy = player.y - PLAY_OFFSET_Y;
    if (cx > 6*TILE_SIZE && cx < 14*TILE_SIZE && cy > 3*TILE_SIZE && cy < 8*TILE_SIZE) {
        currentRoomData._ambushTriggered = true;
        currentRoomData.lockedUntilClear = true;
        tilesDirty = true;
        playSound('door_lock');
        // Spawn skeletons from coffin positions
        for (const e of currentRoomData._ambushEnemies) {
            spawnEnemy(e.type, PLAY_OFFSET_X + e.x * TILE_SIZE + 8, PLAY_OFFSET_Y + e.y * TILE_SIZE + 8, 0.3);
            spawnBurst('dust', PLAY_OFFSET_X + e.x * TILE_SIZE + 8, PLAY_OFFSET_Y + e.y * TILE_SIZE + 8, 8);
        }
        triggerShake(4, 8);
        playSound('bone_break');
        // Wave 2 after delay
        setTimeout(() => {
            if (!currentRoomData || (currentRoomData.id !== 7 && currentRoomData.id !== 27)) return;
            for (const e of currentRoomData._ambushWave2) {
                // Shadow appears first
                spawnEnemy(e.type, PLAY_OFFSET_X + e.x * TILE_SIZE + 8, PLAY_OFFSET_Y + e.y * TILE_SIZE + 8, 0.5);
                addDecal(PLAY_OFFSET_X + e.x * TILE_SIZE + 4, PLAY_OFFSET_Y + e.y * TILE_SIZE + 4, '#222222', 8);
            }
        }, 500);
    }
}

// --- MIMIC ROOM LOGIC ---
function updateMimicRoom(dt) {
    const room = currentRoomData;
    if (!room._mimicRoom) return;
    const realIndices = room._mimicRealChests || [];

    // Check if first mimic was killed — activate all remaining
    if (!room._mimicAllActivated) {
        let anyMimicDead = false;
        let anyMimicActive = false;
        for (let i = 0; i < enemies.length; i++) {
            const e = enemies[i];
            if (e.type !== 'mimic') continue;
            if (realIndices.includes(i)) continue; // skip real chests
            if (!e.alive && e.mimicActive) anyMimicDead = true;
            if (e.mimicActive) anyMimicActive = true;
        }
        // If any mimic died, activate all remaining dormant mimics
        if (anyMimicDead && !room._mimicFirstKilled) {
            room._mimicFirstKilled = true;
        }
        if (room._mimicFirstKilled && !room._mimicAllActivated) {
            let anyActivated = false;
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (e.type !== 'mimic') continue;
                if (realIndices.includes(i)) continue;
                if (e.alive && !e.mimicActive) {
                    e.mimicActive = true;
                    triggerShake(3, 4);
                    spawnDamageNumber(e.x, e.y - 10, '!', 'crit');
                    anyActivated = true;
                }
            }
            if (anyActivated) {
                playSound('door_lock');
                currentRoomData.lockedUntilClear = true;
                tilesDirty = true;
            }
            room._mimicAllActivated = true;
        }
        // Lock doors when first mimic activates
        if (anyMimicActive && !currentRoomData.lockedUntilClear) {
            currentRoomData.lockedUntilClear = true;
            tilesDirty = true;
            playSound('door_lock');
        }
    }

    // Handle "real chest" mimics — they give loot when player approaches instead of attacking
    for (const idx of realIndices) {
        if (idx >= enemies.length) continue;
        const e = enemies[idx];
        if (!e.alive || e.mimicActive) continue;
        const dx = player.x - e.x, dy = player.y - e.y;
        if (dx*dx + dy*dy < 24*24 && player.alive) {
            // "Open" as real chest - give loot and remove
            e.alive = false;
            const lootKey = room._mimicChestLoot[idx];
            if (lootKey === 'gold_15') {
                for (let g = 0; g < 15; g++) spawnPickup(e.x + Math.random()*16-8, e.y + Math.random()*16-8, 'gold', 1);
            } else if (lootKey === 'powerup') {
                const items = ['boots_of_speed','fire_sword','throwing_daggers','ice_ring','vampire_fang','shadow_cloak','aqua_boots','poison_ward'];
                const avail = items.filter(i => !player.items.includes(i));
                const pick = avail.length > 0 ? avail[Math.floor(Math.random()*avail.length)] : 'boots_of_speed';
                spawnPickup(e.x, e.y, 'item', 0);
                pickups[pickups.length-1]._itemId = pick;
            }
            playSound('chest_open');
            spawnBurst('gold_sparkle', e.x, e.y, 10);
        }
    }
}

// --- HEALING SPRING ---
let healSpringTimer = 0;
function updateHealSpring(dt) {
    const spring = currentRoomData._healSpring;
    if (!spring || spring.healsUsed >= spring.maxHeals) return;
    // Check if player is in the healing pool
    const px = Math.floor((player.x - PLAY_OFFSET_X) / TILE_SIZE);
    const py = Math.floor((player.y - PLAY_OFFSET_Y) / TILE_SIZE);
    if (px >= spring.x && px < spring.x + spring.w && py >= spring.y && py < spring.y + spring.h) {
        healSpringTimer += dt;
        if (healSpringTimer >= 3 && player.health < player.maxHealth) {
            healSpringTimer = 0;
            spring.healsUsed++;
            player.health = Math.min(player.maxHealth, player.health + 2);
            spawnDamageNumber(player.x, player.y - 10, '+1', 'heal');
            spawnBurst('gold_sparkle', player.x, player.y, 6, { color: '#44ffcc' });
            playSound('heal');
        }
    } else {
        healSpringTimer = 0;
    }
}

// --- THROWING DAGGER ---
function updateDagger(dt) {
    if (!player.throwDaggers) return;
    if (player.daggerCooldown > 0) player.daggerCooldown -= dt;
}

function throwDagger() {
    if (!player.throwDaggers || player.daggerCooldown > 0) return;
    player.daggerCooldown = 1.0;
    const angles = [Math.PI/2, -Math.PI/2, Math.PI, 0];
    const a = angles[player.dir];
    spawnProjectile(player.x, player.y, Math.cos(a) * 120, Math.sin(a) * 120, 1, false, '#cccccc');
    playSound('arrow');
}

// --- ITEM EFFECTS IN COMBAT ---
function applyItemEffectsOnHit(enemy) {
    if (player.fireSword && enemy.alive) {
        enemy._burning = 2.0;
    }
    if (player.iceRing && Math.random() < 0.25 && enemy.alive) {
        enemy._frozen = 1.5;
    }
}

function updateItemEffectsOnEnemies(dt) {
    for (const e of enemies) {
        if (!e.alive) continue;
        if (e._burning > 0) {
            e._burning -= dt;
            if (Math.random() < dt * 2) {
                spawnParticle('ember', e.x + Math.random()*6-3, e.y - 2);
            }
            // Tick damage
            if (Math.floor((e._burning + dt) * 2) !== Math.floor(e._burning * 2)) {
                e.hp -= 1;
                spawnDamageNumber(e.x, e.y - 6, 1, 'crit');
                if (e.hp <= 0) killEnemy(e);
            }
        }
        if (e._frozen > 0) {
            e._frozen -= dt;
            e.hitTimer = Math.max(e.hitTimer, dt + 0.01); // keep stunned
        }
    }
}

function updateShieldAmulet(dt) {
    if (!player.shieldAmulet) return;
    if (player.shieldTimer > 0) player.shieldTimer -= dt;
    if (player.shieldTimer <= 0) player.shieldActive = true;
}

function onPlayerKill() {
    stats.kills++;
    stats.combo = Math.max(stats.combo, game.combo.count);
    if (player.vampireFang) {
        player.killCount++;
        if (player.killCount >= 12) {
            player.killCount = 0;
            player.health = Math.min(player.maxHealth, player.health + 2);
            spawnBurst('blood', player.x, player.y, 4, { color: '#cc2244' });
            playSound('heal');
        }
    }
}

// --- FLOOR CLEAR SCREEN ---
function drawFloorClear(ctx) {
    if (!game.floorClear) return;
    game.floorClear.timer += game.dt;
    const t = game.floorClear.timer;
    if (t > 6) { game.floorClear = null; return; }
    const alpha = t < 0.5 ? t / 0.5 : (t > 5 ? (6 - t) : 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, INTERNAL_H/2 - 25, INTERNAL_W, 50);
    ctx.globalAlpha = 1;
    const floorNum = (game.floorClear && game.floorClear.floor) || 1;
    const floorNames = { 1: 'The Forgotten Catacombs', 2: 'The Sunken Caves', 3: 'The Infernal Forge' };
    const floorColors = { 1: '#ffd700', 2: '#44ffcc', 3: '#ff6622' };
    queueText(`FLOOR ${floorNum} CLEARED`, INTERNAL_W/2, INTERNAL_H/2 - 8, 9, floorColors[floorNum] || '#ffd700', 'center', alpha);
    queueText(floorNames[floorNum] || '', INTERNAL_W/2, INTERNAL_H/2 + 2, 5, '#aaaaaa', 'center', alpha);
    ctx.fillStyle = '#888888';
    queueText(`Gold: ${player.gold}  Items: ${player.items.length}`, INTERNAL_W/2, INTERNAL_H/2 + 14, 4, '#888888', 'center', alpha);
}

// --- GATE RENDERING ---
function renderGateTile(ctx, x, y, time) {
    const ts = TILE_SIZE;
    if (puzzleState.gateOpen) {
        // Open — just floor
        const theme = floorThemes[1];
        ctx.fillStyle = theme.floorBase;
        ctx.fillRect(x, y, ts, ts);
        // Gate recess at top
        ctx.fillStyle = '#2a2a35';
        ctx.fillRect(x + 2, y, ts - 4, 3);
        return;
    }
    // Iron bars
    ctx.fillStyle = '#3a3a45';
    ctx.fillRect(x, y, ts, ts);
    ctx.fillStyle = '#666677';
    for (let i = 2; i < ts; i += 3) {
        ctx.fillRect(x + i, y, 2, ts);
    }
    ctx.fillStyle = '#555566';
    ctx.fillRect(x, y + 4, ts, 2);
    ctx.fillRect(x, y + 10, ts, 2);
    // Red glow when locked
    ctx.fillStyle = rgbStr(255, 40, 30, 0.15 + Math.sin(time * 3) * 0.05);
    ctx.fillRect(x, y, ts, ts);
}

function renderPlateTile(ctx, x, y) {
    const ts = TILE_SIZE;
    const theme = floorThemes[1];
    ctx.fillStyle = darken(theme.floorBase, 10);
    ctx.fillRect(x, y, ts, ts);
    // Circular indent
    ctx.fillStyle = darken(theme.floorBase, 25);
    ctx.beginPath();
    ctx.arc(x + ts/2, y + ts/2, 5, 0, Math.PI * 2);
    ctx.fill();
    // Symbol
    ctx.fillStyle = rgbStr(150, 120, 80, 0.4);
    ctx.fillRect(x + 6, y + 6, 4, 4);
    if (puzzleState.plateSolved) {
        ctx.fillStyle = rgbStr(100, 200, 100, 0.3);
        ctx.fillRect(x, y, ts, ts);
    }
}

// --- VICTORY SCREEN ---
// ================================================================
game.victory = null; // { timer, phase }
game.runStartTime = 0;

function drawVictoryScreen(ctx, dt) {
    if (!game.victory) return;
    game.victory.timer += dt;
    const t = game.victory.timer;

    // White flash then dark
    if (t < 1) {
        ctx.fillStyle = rgbStr(255, 255, 255, Math.min(1, t * 3));
        ctx.fillRect(0, 0, INTERNAL_W, INTERNAL_H);
        return;
    }

    // Dark backdrop
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(0, 0, INTERNAL_W, INTERNAL_H);

    // Title
    const titleA = Math.min(1, (t - 1) / 0.5);
    queueText('THE DUNGEON IS CONQUERED', INTERNAL_W/2, 20, 8, rgbStr(255, 215, 0, titleA), 'center', titleA);

    // Stats (appear one by one)
    const statsStart = 1.5;
    const statsGap = 0.4;
    const statLines = [
        `Rooms Explored: ${visitedRooms.size} / 30`,
        `Enemies Slain: ${stats.kills}`,
        `Gold Collected: ${player.gold}`,
        `Best Combo: x${stats.combo}`,
        `Items Found: ${player.items.length}`,
    ];
    for (let i = 0; i < statLines.length; i++) {
        const st = t - statsStart - i * statsGap;
        if (st > 0) {
            const sa = Math.min(1, st * 3);
            queueText(statLines[i], INTERNAL_W/2, 40 + i * 10, 5, rgbStr(200, 200, 220, sa), 'center', sa);
        }
    }

    // Score
    const scoreStart = statsStart + statLines.length * statsGap + 0.5;
    if (t > scoreStart) {
        const score = stats.kills * 10 + player.gold + visitedRooms.size * 100 + stats.combo * 50;
        const sa = Math.min(1, (t - scoreStart) * 2);
        queueText(`SCORE: ${score}`, INTERNAL_W/2, 105, 8, rgbStr(255, 215, 0, sa), 'center', sa);

        // Save high score
        if (score > (stats.highScore || 0)) {
            stats.highScore = score;
            saveStats(stats);
            if (t > scoreStart + 0.5) {
                queueText('NEW HIGH SCORE!', INTERNAL_W/2, 118, 5,
                    `hsl(${(t*60)%360},100%,60%)`, 'center');
            }
        }
    }

    // Buttons
    if (t > scoreStart + 1.5) {
        const ba = Math.min(1, (t - scoreStart - 1.5) * 2);
        ctx.globalAlpha = ba;
        // New Journey button
        ctx.fillStyle = '#4a3a2a';
        ctx.fillRect(INTERNAL_W/2 - 40, 135, 80, 14);
        ctx.fillStyle = '#6a5a3a';
        ctx.fillRect(INTERNAL_W/2 - 40, 135, 80, 1);
        queueText('NEW JOURNEY', INTERNAL_W/2, 144, 5, '#ffddaa', 'center', ba);
        // Return button
        ctx.fillStyle = '#3a3a4a';
        ctx.fillRect(INTERNAL_W/2 - 40, 155, 80, 14);
        queueText('RETURN TO SURFACE', INTERNAL_W/2, 164, 4, '#ccccdd', 'center', ba);
        ctx.globalAlpha = 1;

        // Click handling (check in game loop)
        game.victory._buttonsActive = true;
    }
}

function handleVictoryClick(ix, iy) {
    if (!game.victory || !game.victory._buttonsActive) return;
    if (ix > INTERNAL_W/2 - 40 && ix < INTERNAL_W/2 + 40) {
        if (iy > 135 && iy < 149) { game.victory = null; startNewGame(); }
        if (iy > 155 && iy < 169) { game.victory = null; returnToTitle(); }
    }
}

    6: room6, 7: room7, 8: room8, 9: room9, 10: room10,
