const INTERNAL_H = 180;

let offsetX = 0, offsetY = 0;

// Offscreen buffer for pixel-perfect rendering
const buf = document.createElement('canvas');
buf.width = INTERNAL_W;
buf.height = INTERNAL_H;
const bctx = buf.getContext('2d');
bctx.imageSmoothingEnabled = false;

// Tile pre-render buffer

const tctx = tileBuf.getContext('2d');
tctx.imageSmoothingEnabled = false;

// Light overlay buffer
const lightBuf = document.createElement('canvas');
lightBuf.width = INTERNAL_W;
lightBuf.height = INTERNAL_H;
const lctx = lightBuf.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    scale = Math.min(canvas.width / INTERNAL_W, canvas.height / INTERNAL_H);
    if (scale >= 2) scale = Math.floor(scale);
    offsetX = (canvas.width - INTERNAL_W * scale) / 2;
    offsetY = (canvas.height - INTERNAL_H * scale) / 2;
    ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);
resize();

// --- HIGH-RES TEXT OVERLAY SYSTEM ---
// Text is queued during frame rendering, then drawn at full screen resolution
// on the main canvas AFTER the pixel art buffer is blitted. This keeps text crisp.
const textQueue = [];
function queueText(text, x, y, size, color, align, alpha) {
    textQueue.push({ text, x, y, size, color, align: align || 'center', alpha: alpha !== undefined ? alpha : 1 });
}
function flushTextQueue() {
    if (textQueue.length === 0) return;
    ctx.save();
    ctx.textBaseline = 'alphabetic';
    for (const t of textQueue) {
        const sx = offsetX + t.x * scale;
        const sy = offsetY + t.y * scale;
        const fontSize = Math.max(8, Math.round(t.size * scale));
        ctx.globalAlpha = t.alpha;
        ctx.font = `${fontSize}px monospace`;
        ctx.textAlign = t.align;
        // Shadow for readability
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillText(t.text, sx + scale * 0.3, sy + scale * 0.3);
        ctx.fillStyle = t.color;
        ctx.fillText(t.text, sx, sy);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    textQueue.length = 0;
}

// --- SEEDED RNG ---
function SeededRNG(seed) {
    this.seed = seed;
    this.next = function() {
        this.seed = (this.seed * 16807 + 0) % 2147483647;
        return (this.seed - 1) / 2147483646;
    };
    this.nextInt = function(min, max) {
        return Math.floor(this.next() * (max - min + 1)) + min;
    };
    this.nextFloat = function(min, max) {
        return this.next() * (max - min) + min;
    };
    this.nextBool = function(chance) {
        return this.next() < (chance || 0.5);
    };
}

// --- HELPER: parse hex to rgb ---
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return [r, g, b];
}

function rgbStr(r, g, b, a) {
    if (a !== undefined) return `rgba(${r|0},${g|0},${b|0},${a})`;
    return `rgb(${r|0},${g|0},${b|0})`;
}

function lerpColor(c1, c2, t) {
    return [c1[0]+(c2[0]-c1[0])*t, c1[1]+(c2[1]-c1[1])*t, c1[2]+(c2[2]-c1[2])*t];
}

function brighten(hex, amt) {
    const [r,g,b] = hexToRgb(hex);
    return rgbStr(Math.min(255,r+amt), Math.min(255,g+amt), Math.min(255,b+amt));
}

function darken(hex, amt) {
    const [r,g,b] = hexToRgb(hex);
    return rgbStr(Math.max(0,r-amt), Math.max(0,g-amt), Math.max(0,b-amt));
}

const keyMap = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
    a:'left', d:'right', w:'up', s:'down', KeyA:'left', KeyD:'right', KeyW:'up', KeyS:'down',
    z:'attack', ' ':'attack', j:'attack',

document.addEventListener('keydown', e => {

            if (title.phase === 'ready' && title.startTransition <= 0) {

            }

    if (k) { input[k] = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {

});

// Left click = attack

    if (game.scene !== 'playing') return;
    if (game.victory) {
        const [ix, iy] = screenToInternal(e.clientX, e.clientY);
        handleVictoryClick(ix, iy);
        return;
    }

});

    if (game.scene !== 'playing') return;
    if (e.button === 0) input.attack = false;
});
// Prevent context menu on right click
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch controls
let touches = {};
const JOYSTICK_RADIUS = 30;
const JOYSTICK_DEAD = 8;
const BTN_SIZE = 28;

function screenToInternal(sx, sy) {
    return [(sx - offsetX) / scale, (sy - offsetY) / scale];
}

canvas.addEventListener('touchstart', e => {
    if (game.scene !== 'playing') return;
    e.preventDefault();
    for (const t of e.changedTouches) {
        const [ix, iy] = screenToInternal(t.clientX, t.clientY);
        touches[t.identifier] = { ix, iy, startIx: ix, startIy: iy };
        // Left half = joystick
        if (ix < INTERNAL_W / 2) {
            input.touchJoystick = { startX: ix, startY: iy, currentX: ix, currentY: iy, id: t.identifier };
            input.joystickActive = true;
        }
        // Right side buttons
        if (ix >= INTERNAL_W - 70 && iy >= INTERNAL_H - 60) {
            // Attack button area (lower right)
            if (ix < INTERNAL_W - 35) {
                input.touchDash = true;
                touches[t.identifier].action = 'dash';
            } else {
                input.touchAttack = true;
                touches[t.identifier].action = 'attack';
            }
        }
    }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    if (game.scene !== 'playing') return;
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (touches[t.identifier]) {
            const [ix, iy] = screenToInternal(t.clientX, t.clientY);
            touches[t.identifier].ix = ix;
            touches[t.identifier].iy = iy;
            if (input.touchJoystick && input.touchJoystick.id === t.identifier) {
                input.touchJoystick.currentX = ix;
                input.touchJoystick.currentY = iy;
            }
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    if (game.scene !== 'playing') return;
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (touches[t.identifier]) {
            if (touches[t.identifier].action === 'attack') input.touchAttack = false;
            if (touches[t.identifier].action === 'dash') input.touchDash = false;
            if (input.touchJoystick && input.touchJoystick.id === t.identifier) {
                input.touchJoystick = null;
                input.joystickActive = false;
                input.left = input.right = input.up = input.down = false;
            }
            delete touches[t.identifier];
        }
    }
}, { passive: false });

function processTouch() {
    if (input.touchJoystick) {
        const dx = input.touchJoystick.currentX - input.touchJoystick.startX;
        const dy = input.touchJoystick.currentY - input.touchJoystick.startY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        input.left = input.right = input.up = input.down = false;
        if (dist > JOYSTICK_DEAD) {
            const angle = Math.atan2(dy, dx);
            if (angle > -2.36 && angle < -0.79) input.up = true;
            if (angle > 0.79 && angle < 2.36) input.down = true;
            if (Math.abs(angle) > 1.57) input.left = true;
            if (Math.abs(angle) < 1.57) input.right = true;
        }
    }
    if (input.touchAttack) { input.attack = true; input.touchAttack = false; }
    if (input.touchDash) { input.dash = true; input.touchDash = false; }
}

// --- PARTICLE SYSTEM ---
const particles = [];
const MAX_PARTICLES = 300;

function spawnParticle(preset, x, y, overrides) {
    if (particles.length >= MAX_PARTICLES) return;
    const presets = {
        dust: { vx: ()=>Math.random()*10-5, vy: ()=>-Math.random()*5-2, life: 1.2, color: '#888888', size: 1, gravity: 0, fadeOut: true },
        ember: { vx: ()=>Math.random()*8-4, vy: ()=>-Math.random()*15-10, life: 1.5, color: '#ff8844', size: 1, gravity: -3, fadeOut: true, colorEnd: '#cc2200' },
        splash: { vx: ()=>Math.random()*40-20, vy: ()=>-Math.random()*30-10, life: 0.4, color: '#4488cc', size: 1, gravity: 40, fadeOut: true },
        blood: { vx: ()=>Math.random()*30-15, vy: ()=>-Math.random()*20-5, life: 0.5, color: '#cc2222', size: 1, gravity: 30, fadeOut: true },
        gold_sparkle: { vx: ()=>Math.random()*20-10, vy: ()=>-Math.random()*25-15, life: 0.8, color: '#ffd700', size: 1, gravity: 10, fadeOut: true, colorEnd: '#ffffff' },
        poison_cloud: { vx: ()=>Math.random()*6-3, vy: ()=>-Math.random()*4-1, life: 2.0, color: '#44aa44', size: 2, gravity: -1, fadeOut: true },
        bone_shatter: { vx: ()=>Math.random()*40-20, vy: ()=>-Math.random()*30-10, life: 0.8, color: '#c8c0b0', size: ()=>Math.random()>0.5?2:1, gravity: 35, fadeOut: true },
        sword_trail: { vx: ()=>0, vy: ()=>0, life: 0.2, color: '#ffffff', size: 1, gravity: 0, fadeOut: true, colorEnd: '#ffff44' },
        walk_dust: { vx: ()=>Math.random()*4-2, vy: ()=>-Math.random()*3, life: 0.4, color: '#777766', size: 1, gravity: 0, fadeOut: true },
    };
    const p = presets[preset] || presets.dust;
    const particle = {
        x, y,
        vx: typeof p.vx === 'function' ? p.vx() : p.vx,
        vy: typeof p.vy === 'function' ? p.vy() : p.vy,
        life: p.life,
        maxLife: p.life,
        color: p.color,
        colorEnd: p.colorEnd || null,
        size: typeof p.size === 'function' ? p.size() : p.size,
        gravity: p.gravity || 0,
        fadeOut: p.fadeOut !== false,
        ...overrides
    };
    particles.push(particle);
}

function spawnBurst(preset, x, y, count, overrides) {
    for (let i = 0; i < count; i++) spawnParticle(preset, x, y, overrides);
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.vy += p.gravity * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) { particles.splice(i, 1); }
    }
}

function drawParticles(ctx) {
    for (const p of particles) {
        const alpha = p.fadeOut ? Math.max(0, p.life / p.maxLife) : 1;
        let col;
        if (p.colorEnd) {
            const t = 1 - p.life / p.maxLife;
            const c1 = hexToRgb(p.color), c2 = hexToRgb(p.colorEnd);
            const c = lerpColor(c1, c2, t);
            col = rgbStr(c[0], c[1], c[2], alpha);
        } else {
            const c = hexToRgb(p.color);
            col = rgbStr(c[0], c[1], c[2], alpha);
        }
        ctx.fillStyle = col;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
    }
}

// --- DAMAGE NUMBERS ---
const damageNumbers = [];

function spawnDamageNumber(x, y, value, type) {
    const isCrit = type === 'crit';
    const isHeal = type === 'heal';
    const isPlayer = type === 'player';
    damageNumbers.push({
        x: x + (Math.random() - 0.5) * 8, y,
        value: String(value) + (isCrit ? '!' : ''),
        type: type || 'normal',
        life: 0.9, maxLife: 0.9,
        vy: isPlayer ? 12 : (isHeal ? -10 : -25 - (isCrit ? 10 : 0)),
        vx: isHeal ? Math.sin(game.time * 5) * 8 : 0,
        scale: isCrit ? 1.5 : 1,
    });
}

function updateDamageNumbers(dt) {
    for (let i = damageNumbers.length - 1; i >= 0; i--) {
        const d = damageNumbers[i];
        d.y += d.vy * dt;
        d.x += (d.vx || 0) * dt;
        d.vy *= 0.92; // decelerate
        d.life -= dt;
        if (d.scale > 1) d.scale = Math.max(1, d.scale - dt * 3);
        if (d.life <= 0) damageNumbers.splice(i, 1);
    }
}

function drawDamageNumbers(ctx) {
    for (const d of damageNumbers) {
        const alpha = Math.max(0, d.life / d.maxLife);
        const size = Math.round(5 * (d.scale || 1));
        let col;
        if (d.type === 'crit') col = rgbStr(255, 255, 50, alpha);
        else if (d.type === 'player') col = rgbStr(255, 60, 60, alpha);
        else if (d.type === 'heal') col = rgbStr(60, 255, 60, alpha);
        else col = rgbStr(255, 255, 255, alpha);
        queueText(d.value, Math.round(d.x), Math.round(d.y), size, col, 'center', alpha);
    }
}

// --- TILE RENDERING ---
function renderWallTile(ctx, x, y, theme, rng) {
    const ts = TILE_SIZE;
    // Base wall fill
    ctx.fillStyle = theme.wallBase;
    ctx.fillRect(x, y, ts, ts);

    // Draw bricks with varied sizes
    const brickRows = rng.nextInt(3, 4);
    const rowH = ts / brickRows;
    for (let row = 0; row < brickRows; row++) {
        const by = y + row * rowH;
        let bx = x;
        const offset = row % 2 === 0 ? 0 : rng.nextInt(2, 5);
        bx += offset;
        while (bx < x + ts) {
            const bw = rng.nextInt(4, 8);
            const actualW = Math.min(bw, x + ts - bx);
            if (actualW < 2) break;

            // Brick color variation
            const shade = rng.nextInt(-10, 10);
            ctx.fillStyle = brighten(theme.wallBase, shade);
            ctx.fillRect(Math.floor(bx), Math.floor(by), Math.ceil(actualW) - 1, Math.ceil(rowH) - 1);

            // Brick highlight (top edge)
            ctx.fillStyle = theme.wallLight;
            ctx.fillRect(Math.floor(bx), Math.floor(by), Math.ceil(actualW) - 1, 1);

            // Brick shadow (bottom edge)
            ctx.fillStyle = theme.wallDark;
            ctx.fillRect(Math.floor(bx), Math.floor(by + rowH - 1), Math.ceil(actualW) - 1, 1);

            // Mortar gap
            ctx.fillStyle = theme.mortar;
            ctx.fillRect(Math.floor(bx + actualW - 1), Math.floor(by), 1, Math.ceil(rowH));

            bx += actualW;
        }
        // Horizontal mortar line
        ctx.fillStyle = theme.mortar;
        ctx.fillRect(x, Math.floor(by + rowH - 1), ts, 1);
    }

    // Theme-specific details
    if (theme.details === 'catacombs') {
        // Cracks
        if (rng.nextBool(0.4)) {
            ctx.fillStyle = C.f1crack;
            const cx = x + rng.nextInt(2, 12);
            const cy = y + rng.nextInt(2, 12);
            ctx.fillRect(cx, cy, 1, rng.nextInt(2, 4));
            ctx.fillRect(cx + 1, cy + 1, 1, rng.nextInt(1, 2));
        }
        // Moss
        if (rng.nextBool(0.25)) {
            ctx.fillStyle = C.f1moss;
            const mx = x + rng.nextInt(1, 13);
            const my = y + rng.nextInt(10, 14);
            ctx.fillRect(mx, my, rng.nextInt(2, 4), rng.nextInt(1, 2));
        }
        // Skull detail
        if (rng.nextBool(0.08)) {
            ctx.fillStyle = C.f1bone;
            const sx = x + rng.nextInt(3, 10);
            const sy = y + rng.nextInt(3, 10);
            ctx.fillRect(sx, sy, 3, 2);
            ctx.fillRect(sx, sy + 2, 3, 1);
            ctx.fillStyle = '#222';
            ctx.fillRect(sx, sy + 1, 1, 1);
            ctx.fillRect(sx + 2, sy + 1, 1, 1);
        }
    } else if (theme.details === 'caves') {
        // Irregular edges
        if (rng.nextBool(0.5)) {
            ctx.fillStyle = theme.wallDark;
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(x + rng.nextInt(0, 14), y + rng.nextInt(0, 14), rng.nextInt(1, 3), rng.nextInt(1, 3));
            }
        }
        // Fungus dots (glowing)
        if (rng.nextBool(0.2)) {
            ctx.fillStyle = C.f2fungus;
            const fx = x + rng.nextInt(2, 12);
            const fy = y + rng.nextInt(2, 12);
            ctx.fillRect(fx, fy, 1, 1);
            ctx.fillStyle = rgbStr(64, 232, 208, 0.3);
            ctx.fillRect(fx - 1, fy - 1, 3, 3);
        }
        // Wet highlight
        if (rng.nextBool(0.15)) {
            ctx.fillStyle = 'rgba(100,150,200,0.15)';
            ctx.fillRect(x + rng.nextInt(1, 10), y + rng.nextInt(0, 2), rng.nextInt(3, 6), 1);
        }
    } else if (theme.details === 'forge') {
        // Rivet dots
        ctx.fillStyle = C.f3rivet;
        ctx.fillRect(x + 1, y + 1, 1, 1);
        ctx.fillRect(x + ts - 2, y + 1, 1, 1);
        ctx.fillRect(x + 1, y + ts - 2, 1, 1);
        ctx.fillRect(x + ts - 2, y + ts - 2, 1, 1);
        // Metal plate lines
        if (rng.nextBool(0.3)) {
            ctx.fillStyle = C.f3metal;
            ctx.fillRect(x + rng.nextInt(3, 12), y, 1, ts);
        }
        // Glowing crack
        if (rng.nextBool(0.15)) {
            ctx.fillStyle = C.f3lava;
            const gcx = x + rng.nextInt(3, 12);
            const gcy = y + rng.nextInt(2, 8);
            ctx.fillRect(gcx, gcy, 1, rng.nextInt(3, 6));
            ctx.fillStyle = rgbStr(255, 106, 32, 0.3);
            ctx.fillRect(gcx - 1, gcy, 3, rng.nextInt(3, 6));
        }
    } else if (theme.details === 'sunken_caves') {
        // Rough natural cave walls — jagged edges, no bricks
        ctx.fillStyle = theme.wallDark;
        // Random bumps on wall surface
        for (let i = 0; i < 4; i++) {
            ctx.fillRect(x + rng.nextInt(0, 13), y + rng.nextInt(0, 13), rng.nextInt(2, 4), rng.nextInt(2, 4));
        }
        // Bioluminescent fungus patches
        if (rng.nextBool(0.25)) {
            ctx.fillStyle = C.f2cGlow;
            const fx = x + rng.nextInt(2, 11);
            const fy = y + rng.nextInt(2, 11);
            ctx.fillRect(fx, fy, 2, 2);
            ctx.fillRect(fx + rng.nextInt(-1, 2), fy + rng.nextInt(-1, 2), 1, 1);
            ctx.fillStyle = rgbStr(68, 255, 204, 0.2);
            ctx.fillRect(fx - 1, fy - 1, 4, 4);
        }
        // Wet sheen
        if (rng.nextBool(0.2)) {
            ctx.fillStyle = 'rgba(150,200,255,0.12)';
            ctx.fillRect(x + rng.nextInt(1, 12), y + rng.nextInt(1, 4), rng.nextInt(2, 5), 1);
        }
        // Root/vine intrusions
        if (rng.nextBool(0.12)) {
            ctx.fillStyle = '#4a5a3a';
            const rx = x + rng.nextInt(2, 12);
            ctx.fillRect(rx, y + rng.nextInt(0, 6), 1, rng.nextInt(4, 10));
            ctx.fillRect(rx + 1, y + rng.nextInt(4, 10), 1, rng.nextInt(2, 4));
        }
        // Crystal formations on some walls
        if (rng.nextBool(0.08)) {
            ctx.fillStyle = C.f2cCrystal;
            const cx = x + rng.nextInt(3, 10);
            const cy = y + rng.nextInt(3, 10);
            ctx.fillRect(cx, cy, 2, 4);
            ctx.fillRect(cx + 1, cy - 1, 1, 2);
            ctx.fillStyle = rgbStr(170, 187, 221, 0.15);
            ctx.fillRect(cx - 1, cy - 1, 4, 6);
        }
        // Stalactite points on top walls
        if (rng.nextBool(0.3)) {
            ctx.fillStyle = theme.wallLight;
            const sx = x + rng.nextInt(2, 12);
            const sh = rng.nextInt(3, 7);
            ctx.fillRect(sx, y + ts - sh, 2, sh);
            ctx.fillRect(sx, y + ts - 1, 1, 1);
        }
    }
}

function renderFloorTile(ctx, x, y, theme, rng) {
    const ts = TILE_SIZE;
    // Base with brightness variation
    const bv = rng.nextInt(-8, 8);
    ctx.fillStyle = brighten(theme.floorBase, bv);
    ctx.fillRect(x, y, ts, ts);

    if (theme.details === 'catacombs') {
        // Stone tile mortar grid
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(x, y, ts, 1);
        ctx.fillRect(x, y, 1, ts);
        // Crack lines
        if (rng.nextBool(0.15)) {
            ctx.fillStyle = C.f1crack;
            const cx = x + rng.nextInt(2, 10);
            ctx.fillRect(cx, y + rng.nextInt(1, 6), 1, rng.nextInt(3, 8));
        }
        // Dirt specks
        if (rng.nextBool(0.2)) {
            ctx.fillStyle = darken(theme.floorBase, 15);
            ctx.fillRect(x + rng.nextInt(2, 13), y + rng.nextInt(2, 13), 1, 1);
        }
        // Bone fragments
        if (rng.nextBool(0.06)) {
            ctx.fillStyle = C.f1bone;
            ctx.fillRect(x + rng.nextInt(3, 11), y + rng.nextInt(3, 11), 2, 1);
        }
        // Dried stains
        if (rng.nextBool(0.08)) {
            ctx.fillStyle = C.f1stain;
            ctx.fillRect(x + rng.nextInt(2, 10), y + rng.nextInt(2, 10), rng.nextInt(2, 4), rng.nextInt(2, 3));
        }
    } else if (theme.details === 'caves') {
        // Organic color blobs (no grid)
        if (rng.nextBool(0.3)) {
            ctx.fillStyle = brighten(theme.floorBase, rng.nextInt(5, 15));
            ctx.fillRect(x + rng.nextInt(1, 10), y + rng.nextInt(1, 10), rng.nextInt(3, 6), rng.nextInt(3, 6));
        }
        // Mineral veins
        if (rng.nextBool(0.1)) {
            ctx.fillStyle = C.f2mineral;
            ctx.globalAlpha = 0.3;
            const mx = x + rng.nextInt(1, 8);
            const my = y + rng.nextInt(1, 12);
            ctx.fillRect(mx, my, rng.nextInt(4, 8), 1);
            ctx.globalAlpha = 1;
        }
        // Moss patches
        if (rng.nextBool(0.12)) {
            ctx.fillStyle = C.f2moss;
            ctx.fillRect(x + rng.nextInt(2, 10), y + rng.nextInt(2, 10), rng.nextInt(2, 4), rng.nextInt(2, 3));
        }
        // Small mushroom dots
        if (rng.nextBool(0.05)) {
            ctx.fillStyle = '#aa6644';
            const mx = x + rng.nextInt(3, 12);
            const my = y + rng.nextInt(3, 12);
            ctx.fillRect(mx, my, 2, 1);
            ctx.fillStyle = '#cc8866';
            ctx.fillRect(mx, my - 1, 2, 1);
        }
        // Wet spots
        if (rng.nextBool(0.1)) {
            ctx.fillStyle = 'rgba(60,100,140,0.2)';
            ctx.fillRect(x + rng.nextInt(2, 8), y + rng.nextInt(2, 8), rng.nextInt(3, 6), rng.nextInt(3, 6));
        }
    } else if (theme.details === 'forge') {
        // Metal plate edges with bolt dots
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        ctx.fillRect(x, y, ts, 1);
        ctx.fillRect(x, y, 1, ts);
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(x + 1, y + 1, ts - 1, 1);
        // Corner bolts
        ctx.fillStyle = C.f3rivet;
        ctx.fillRect(x + 2, y + 2, 1, 1);
        ctx.fillRect(x + ts - 3, y + 2, 1, 1);
        ctx.fillRect(x + 2, y + ts - 3, 1, 1);
        ctx.fillRect(x + ts - 3, y + ts - 3, 1, 1);
        // Ash specks
        if (rng.nextBool(0.2)) {
            ctx.fillStyle = '#888888';
            ctx.fillRect(x + rng.nextInt(3, 12), y + rng.nextInt(3, 12), 1, 1);
        }
        // Ember dots
        if (rng.nextBool(0.08)) {
            ctx.fillStyle = C.f3ember;
            ctx.fillRect(x + rng.nextInt(3, 12), y + rng.nextInt(3, 12), 1, 1);
        }
        // Scorch marks
        if (rng.nextBool(0.1)) {
            ctx.fillStyle = 'rgba(20,10,5,0.4)';
            ctx.fillRect(x + rng.nextInt(2, 8), y + rng.nextInt(2, 8), rng.nextInt(2, 5), rng.nextInt(2, 4));
        }
    } else if (theme.details === 'sunken_caves') {
        // Organic cave floor — no grid, blotchy color variation
        if (rng.nextBool(0.35)) {
            ctx.fillStyle = brighten(theme.floorBase, rng.nextInt(3, 12));
            ctx.fillRect(x + rng.nextInt(0, 8), y + rng.nextInt(0, 8), rng.nextInt(4, 10), rng.nextInt(4, 10));
        }
        // Wet patches
        if (rng.nextBool(0.2)) {
            ctx.fillStyle = 'rgba(40,80,120,0.15)';
            ctx.fillRect(x + rng.nextInt(1, 8), y + rng.nextInt(1, 8), rng.nextInt(3, 7), rng.nextInt(3, 6));
            ctx.fillStyle = 'rgba(150,200,255,0.08)';
            ctx.fillRect(x + rng.nextInt(2, 10), y + rng.nextInt(2, 6), 1, 1);
        }
        // Mineral veins
        if (rng.nextBool(0.12)) {
            ctx.fillStyle = rgbStr(68, 255, 204, 0.15);
            const mx = x + rng.nextInt(0, 6);
            const my = y + rng.nextInt(0, 12);
            for (let v = 0; v < rng.nextInt(4, 10); v++) {
                ctx.fillRect(mx + v, my + Math.round(Math.sin(v * 0.8) * 1.5), 1, 1);
            }
        }
        // Small mushroom dots
        if (rng.nextBool(0.08)) {
            ctx.fillStyle = rng.nextBool(0.5) ? C.f2cMushSafe : C.f2cMushDanger;
            ctx.fillRect(x + rng.nextInt(3, 12), y + rng.nextInt(3, 12), 1, 1);
        }
        // Fossil impressions
        if (rng.nextBool(0.04)) {
            ctx.fillStyle = brighten(theme.floorBase, 15);
            const fx = x + rng.nextInt(3, 9);
            const fy = y + rng.nextInt(3, 9);
            for (let a = 0; a < 5; a++) {
                ctx.fillRect(fx + Math.round(Math.cos(a*1.2)*2), fy + Math.round(Math.sin(a*1.2)*2), 1, 1);
            }
        }
        // Pebble scatter near edges
        if (rng.nextBool(0.15)) {
            ctx.fillStyle = brighten(theme.floorBase, 8);
            ctx.fillRect(x + rng.nextInt(1, 14), y + rng.nextInt(10, 14), 1, 1);
            ctx.fillRect(x + rng.nextInt(1, 14), y + rng.nextInt(10, 14), 1, 1);
        }
    }
}

// Shallow water for cave floor (reuses water rendering but with cave palette)
function renderCaveWater(ctx, x, y, rng, time, hasCurrentDir) {
    const ts = TILE_SIZE;
    ctx.fillStyle = C.f2cShallow;
    ctx.fillRect(x, y, ts, ts);
    // Floor faintly visible beneath
    ctx.fillStyle = rgbStr(34, 34, 51, 0.3);
    ctx.fillRect(x + rng.nextInt(1, 8), y + rng.nextInt(1, 8), rng.nextInt(3, 8), rng.nextInt(3, 8));
    // Ripple animation
    const ripple = Math.sin(time * 2 + x * 0.2 + y * 0.3) * 0.5 + 0.5;
    ctx.fillStyle = rgbStr(60, 120, 160, 0.1 + ripple * 0.08);
    ctx.fillRect(x + 2, y + Math.floor(ripple * 8), ts - 4, 2);
    // Water edge highlight
    ctx.fillStyle = 'rgba(100,180,220,0.1)';
    ctx.fillRect(x, y, ts, 1);
    // Current flow lines
    if (hasCurrentDir) {
        ctx.fillStyle = rgbStr(120, 200, 240, 0.15);
        const off = (time * 20 + x + y) % 16;
        for (let i = 0; i < 2; i++) {
            const lx = x + rng.nextInt(2, 10);
            const ly = (y + off + i * 8) % (y + ts);
            ctx.fillRect(lx, ly, rng.nextInt(3, 6), 1);
        }
    }
}

// Deep water (damage zone)
function renderDeepWater(ctx, x, y, rng, time) {
    const ts = TILE_SIZE;
    ctx.fillStyle = C.f2cDeep;
    ctx.fillRect(x, y, ts, ts);
    // Undulating dark pattern
    const wave = Math.sin(time * 0.8 + x * 0.1 + y * 0.15) * 0.5 + 0.5;
    ctx.fillStyle = rgbStr(15, 30, 55, 0.3 + wave * 0.15);
    ctx.fillRect(x + 1, y + Math.floor(wave * 6), ts - 2, 4);
    // Edge glow
    ctx.fillStyle = 'rgba(40,80,120,0.15)';
    ctx.fillRect(x, y, ts, 1); ctx.fillRect(x, y, 1, ts);
}

function renderWaterTile(ctx, x, y, rng, time) {
    const ts = TILE_SIZE;
    ctx.fillStyle = C.f2water;
    ctx.fillRect(x, y, ts, ts);
    // Animated ripple highlight
    const waveOffset = Math.sin(time * 2 + x * 0.3 + y * 0.2) * 0.5 + 0.5;
    ctx.fillStyle = rgbStr(42, 74, 122, 0.15 + waveOffset * 0.15);
    ctx.fillRect(x + 2, y + Math.floor(waveOffset * 6), ts - 4, 2);
    ctx.fillStyle = rgbStr(80, 140, 200, 0.1 + waveOffset * 0.1);
    ctx.fillRect(x + rng.nextInt(1, 8), y + rng.nextInt(1, 8), rng.nextInt(2, 5), 1);
    // Specular highlight
    if (Math.sin(time * 3 + x + y) > 0.7) {
        ctx.fillStyle = 'rgba(180,220,255,0.2)';
        ctx.fillRect(x + ((time * 5 + x) % 12) | 0, y + 4, 2, 1);
    }
}

function renderLavaTile(ctx, x, y, rng, time) {
    const ts = TILE_SIZE;
    ctx.fillStyle = C.f3lavaDark;
    ctx.fillRect(x, y, ts, ts);
    // Flowing lava animation
    const flow = Math.sin(time * 1.5 + x * 0.2 + y * 0.15);
    ctx.fillStyle = C.f3lava;
    const lx = x + 2 + Math.floor(flow * 3);
    ctx.fillRect(lx, y + 2, ts - 6, ts - 4);
    // Bright center
    ctx.fillStyle = C.f3lavaLight;
    ctx.fillRect(lx + 2, y + 4, ts - 10, ts - 8);
    // Bubbles
    if (Math.sin(time * 4 + x * 7 + y * 3) > 0.85) {
        ctx.fillStyle = '#ffcc44';
        ctx.fillRect(x + (Math.floor(time * 3 + x) % 10) + 3, y + rng.nextInt(3, 10), 2, 2);
    }
    // Surface crust
    ctx.fillStyle = rgbStr(80, 30, 10, 0.3);
    if (rng.nextBool(0.3)) {
        ctx.fillRect(x + rng.nextInt(0, 10), y + rng.nextInt(0, 10), rng.nextInt(2, 5), rng.nextInt(1, 3));
    }
}

function renderDoor(ctx, x, y, theme, direction, locked, rng) {
    const ts = TILE_SIZE;
    // Draw wall base around door
    ctx.fillStyle = theme.wallBase;
    ctx.fillRect(x, y, ts, ts);

    // Door opening
    const doorColor = locked ? 'rgba(180,30,30,0.4)' : 'rgba(30,180,60,0.4)';
    const passageColor = '#0a0a10';

    if (theme.doorStyle === 'stone') {
        // Stone archway
        ctx.fillStyle = brighten(theme.wallBase, 15);
        ctx.fillRect(x + 2, y, 12, ts);
        ctx.fillStyle = passageColor;
        ctx.fillRect(x + 4, y + 2, 8, ts - 2);
        // Keystone
        ctx.fillStyle = brighten(theme.wallBase, 25);
        ctx.fillRect(x + 6, y, 4, 3);
        // Glow
        ctx.fillStyle = doorColor;
        ctx.fillRect(x + 4, y + 2, 8, ts - 2);
    } else if (theme.doorStyle === 'cave') {
        // Irregular cave opening
        ctx.fillStyle = passageColor;
        ctx.fillRect(x + 3, y + 1, 10, ts - 1);
        ctx.fillStyle = theme.wallBase;
        // Jagged edges
        ctx.fillRect(x + 3, y + 1, 1, rng.nextInt(2, 4));
        ctx.fillRect(x + 12, y + 1, 1, rng.nextInt(2, 4));
        ctx.fillRect(x + 3, y + ts - rng.nextInt(2, 4), 1, rng.nextInt(2, 4));
        ctx.fillRect(x + 12, y + ts - rng.nextInt(1, 3), 1, rng.nextInt(1, 3));
        ctx.fillStyle = doorColor;
        ctx.fillRect(x + 4, y + 2, 8, ts - 3);
    } else if (theme.doorStyle === 'metal') {
        // Metal frame with rivets
        ctx.fillStyle = C.f3metal;
        ctx.fillRect(x + 2, y, 12, ts);
        ctx.fillStyle = passageColor;
        ctx.fillRect(x + 4, y + 1, 8, ts - 1);
        // Rivets
        ctx.fillStyle = C.f3rivet;
        ctx.fillRect(x + 2, y + 1, 1, 1);
        ctx.fillRect(x + 13, y + 1, 1, 1);
        ctx.fillRect(x + 2, y + ts - 2, 1, 1);
        ctx.fillRect(x + 13, y + ts - 2, 1, 1);
        // Glow
        ctx.fillStyle = doorColor;
        ctx.fillRect(x + 4, y + 1, 8, ts - 1);
    }
}

// --- PROP RENDERING ---
function renderProp(ctx, type, x, y, rng, time, propObj) {
    const ts = TILE_SIZE;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x + ts/2, y + ts - 2, ts/3, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    switch(type) {
        case T.PROP_TORCH: {
            // Wall torch bracket
            ctx.fillStyle = '#6a5a4a';
            ctx.fillRect(x + 6, y + 4, 4, 8); // bracket
            ctx.fillStyle = '#8a7a6a';
            ctx.fillRect(x + 5, y + 3, 6, 2); // top
            // Flame
            const flicker = Math.sin(time * 10) * 0.5 + 0.5;
            ctx.fillStyle = '#ffaa22';
            ctx.fillRect(x + 6, y + 1, 4, 3);
            ctx.fillStyle = '#ffdd44';
            ctx.fillRect(x + 7, y, 2, 2);
            if (flicker > 0.5) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x + 7, y + 1, 1, 1);
            }
            break;
        }
        case T.PROP_BARREL: {
            ctx.fillStyle = '#6a4a2a';
            ctx.fillRect(x + 3, y + 3, 10, 10);
            ctx.fillStyle = '#7a5a3a';
            ctx.fillRect(x + 4, y + 4, 8, 8);
            // Metal bands
            ctx.fillStyle = '#888888';
            ctx.fillRect(x + 3, y + 5, 10, 1);
            ctx.fillRect(x + 3, y + 10, 10, 1);
            // Highlight
            ctx.fillStyle = '#8a6a4a';
            ctx.fillRect(x + 4, y + 4, 2, 6);
            break;
        }
        case T.PROP_CHEST: {
            if (propObj && propObj.opened) {
                // Open chest - empty
                ctx.fillStyle = '#5a4a1a';
                ctx.fillRect(x + 3, y + 5, 10, 7);
                ctx.fillStyle = '#6a5a2a';
                ctx.fillRect(x + 4, y + 6, 8, 5);
                // Open lid (tilted back)
                ctx.fillStyle = '#7a6a3a';
                ctx.fillRect(x + 3, y + 2, 10, 3);
                ctx.fillStyle = '#6a5a2a';
                ctx.fillRect(x + 4, y + 2, 8, 2);
            } else {
                ctx.fillStyle = '#7a5a2a';
                ctx.fillRect(x + 3, y + 5, 10, 7);
                ctx.fillStyle = '#8a6a3a';
                ctx.fillRect(x + 3, y + 5, 10, 3);
                // Lid
                ctx.fillStyle = '#9a7a4a';
                ctx.fillRect(x + 3, y + 4, 10, 2);
                // Lock
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(x + 7, y + 7, 2, 2);
                // Highlight
                ctx.fillStyle = '#aa8a5a';
                ctx.fillRect(x + 4, y + 5, 2, 1);
            }
            break;
        }
        case T.PROP_SKULL: {
            ctx.fillStyle = '#c8c0b0';
            ctx.fillRect(x + 5, y + 6, 6, 5);
            ctx.fillRect(x + 6, y + 5, 4, 1);
            // Eyes
            ctx.fillStyle = '#222';
            ctx.fillRect(x + 6, y + 7, 1, 2);
            ctx.fillRect(x + 9, y + 7, 1, 2);
            // Teeth
            ctx.fillStyle = '#aaa8a0';
            ctx.fillRect(x + 6, y + 10, 4, 1);
            break;
        }
        case T.PROP_MUSHROOM: {
            // Stem
            ctx.fillStyle = '#ccbb99';
            ctx.fillRect(x + 7, y + 9, 2, 4);
            // Cap
            ctx.fillStyle = '#cc6644';
            ctx.fillRect(x + 5, y + 6, 6, 3);
            ctx.fillRect(x + 6, y + 5, 4, 1);
            // Spots
            ctx.fillStyle = '#ffddaa';
            ctx.fillRect(x + 6, y + 6, 1, 1);
            ctx.fillRect(x + 9, y + 7, 1, 1);
            // Glow (cave mushroom)
            const glow = Math.sin(time * 2) * 0.1 + 0.15;
            ctx.fillStyle = rgbStr(64, 232, 208, glow);
            ctx.fillRect(x + 4, y + 5, 8, 5);
            break;
        }
        case T.PROP_ANVIL: {
            ctx.fillStyle = '#555566';
            ctx.fillRect(x + 3, y + 8, 10, 4);
            ctx.fillStyle = '#666677';
            ctx.fillRect(x + 2, y + 6, 12, 3);
            ctx.fillStyle = '#777788';
            ctx.fillRect(x + 5, y + 5, 6, 2);
            // Highlight
            ctx.fillStyle = '#8888aa';
            ctx.fillRect(x + 3, y + 6, 3, 1);
            break;
        }
        case T.PROP_CRYSTAL: {
            const pulse = Math.sin(time * 3) * 0.3 + 0.7;
            ctx.fillStyle = rgbStr(100, 60, 200, pulse);
            ctx.fillRect(x + 6, y + 3, 4, 9);
            ctx.fillRect(x + 5, y + 5, 6, 5);
            ctx.fillStyle = rgbStr(150, 100, 255, pulse * 0.8);
            ctx.fillRect(x + 7, y + 4, 2, 4);
            // Glow
            ctx.fillStyle = rgbStr(130, 80, 220, pulse * 0.2);
            ctx.fillRect(x + 3, y + 2, 10, 12);
            break;
        }
        case T.PROP_PILLAR: {
            ctx.fillStyle = '#666666';
            ctx.fillRect(x + 5, y + 2, 6, 12);
            ctx.fillStyle = '#777777';
            ctx.fillRect(x + 4, y + 1, 8, 2);
            ctx.fillRect(x + 4, y + 13, 8, 2);
            // Highlight
            ctx.fillStyle = '#888888';
            ctx.fillRect(x + 5, y + 2, 2, 11);
            break;
        }
        case T.PROP_CRATE: {
            ctx.fillStyle = '#7a6a4a';
            ctx.fillRect(x + 3, y + 3, 10, 10);
            ctx.fillStyle = '#8a7a5a';
            ctx.fillRect(x + 4, y + 4, 8, 8);
            // Cross planks
            ctx.fillStyle = '#6a5a3a';
            ctx.fillRect(x + 3, y + 7, 10, 2);
            ctx.fillRect(x + 7, y + 3, 2, 10);
            break;
        }
        case T.PROP_BONES: {
            ctx.fillStyle = '#c0b8a0';
            ctx.fillRect(x + 3, y + 9, 8, 1);
            ctx.fillRect(x + 5, y + 7, 1, 4);
            ctx.fillRect(x + 9, y + 7, 1, 4);
            ctx.fillRect(x + 4, y + 11, 6, 1);
            // Skull
            ctx.fillStyle = '#d0c8b0';
            ctx.fillRect(x + 6, y + 6, 4, 3);
            ctx.fillStyle = '#222';
            ctx.fillRect(x + 7, y + 7, 1, 1);
            ctx.fillRect(x + 9, y + 7, 1, 1);
            break;
        }
    }
}

// Pre-render sprite to small canvas
const spriteCache = {};

function renderSpriteData(data) {
    const key = JSON.stringify(data);
    if (spriteCache[key]) return spriteCache[key];
    const c = document.createElement('canvas');
    c.width = 16; c.height = 16;
    const x = c.getContext('2d');
    for (let row = 0; row < 16; row++) {
        for (let col = 0; col < 16; col++) {
            const v = data[row][col];
            if (v && HERO_COLORS[v]) {
                x.fillStyle = HERO_COLORS[v];
                x.fillRect(col, row, 1, 1);
            }
        }
    }
    spriteCache[key] = c;
    return c;
}

function flipSpriteH(data) {
    return data.map(row => [...row].reverse());
}

// Pre-build all sprite frames
const sprites = {
    down: { idle: [heroDown1, heroDown2], walk: heroWalkDown },
    up: { idle: [heroUp1, heroUp2], walk: [heroUp1, heroUp2, heroUp1, heroUp2] }, // simpler up walk
    right: { idle: [heroRight1, heroRight2], walk: [heroRight1, heroRight2, heroRight1, heroRight2] },
    left: { idle: null, walk: null }, // will be flipped
};

// Generate left sprites by flipping right
sprites.left.idle = [flipSpriteH(heroRight1), flipSpriteH(heroRight2)];
sprites.left.walk = sprites.right.walk.map(f => flipSpriteH(f));

const DIR_NAMES = ['down', 'up', 'left', 'right', 'down', 'down', 'up', 'up'];
// 0=down,1=up,2=left,3=right,4=down-left,5=down-right,6=up-left,7=up-right
// DIR_NAMES maps diagonals to nearest cardinal for sprite selection

// Convert 8-way dir to angle in radians (for sword arc, knockback, etc)
function dirToAngle(dir) {
    // down=PI/2, up=-PI/2, left=PI, right=0, diagonals between
    const angles = [
        Math.PI/2,      // 0: down
        -Math.PI/2,     // 1: up
        Math.PI,        // 2: left
        0,              // 3: right
        Math.PI*0.75,   // 4: down-left
        Math.PI*0.25,   // 5: down-right
        -Math.PI*0.75,  // 6: up-left
        -Math.PI*0.25,  // 7: up-right
    ];
    return angles[dir] || 0;
}

function getHeroSprite() {
    const dirName = DIR_NAMES[player.dir];
    const dirSprites = sprites[dirName];
    if (player.state === 'walk') {
        return dirSprites.walk[player.animFrame % dirSprites.walk.length];
    }
    return dirSprites.idle[player.animFrame % dirSprites.idle.length];
}

function drawHero(ctx) {
    if (!player.alive && player.deathTimer > 1.5) return;

    // Invincibility blink
    if (player.invincible > 0) {
        player.invincibleFlash += game.dt * 15;
        if (Math.floor(player.invincibleFlash) % 2 === 0) return;
    }

    const spriteData = getHeroSprite();
    const spriteCanvas = renderSpriteData(spriteData);

    const drawX = Math.round(player.x - 8);
    const drawY = Math.round(player.y - 8);

    // Death animation
    if (player.state === 'death') {
        const t = Math.min(1, player.deathTimer / 1.5);
        ctx.save();
        ctx.globalAlpha = 1 - t * 0.5;
        if (t < 0.33) {
            // Falling to knees
            const shrink = 1 - t * 0.9;
            ctx.drawImage(spriteCanvas, drawX, drawY + (1 - shrink) * 16, 16, 16 * shrink);
        } else if (t < 0.66) {
            // Collapse flat
            const flatness = (t - 0.33) / 0.33;
            ctx.drawImage(spriteCanvas, drawX, drawY + 12, 16, Math.max(2, 16 * (1 - flatness)));
        } else {
            // Just a line, particles scatter (handled in update)
            ctx.fillStyle = C.cloakBase;
            ctx.fillRect(drawX + 2, drawY + 14, 12, 2);
        }
        ctx.restore();
        return;
    }

    // Hit flash (all white)
    if (player.state === 'hit' && player.invincible > 0.4) {
        ctx.fillStyle = '#ffffff';
        // Draw white version
        for (let row = 0; row < 16; row++) {
            for (let col = 0; col < 16; col++) {
                if (spriteData[row][col]) {
                    ctx.fillRect(drawX + col, drawY + row, 1, 1);
                }
            }
        }
        return;
    }

    // Dash trail
    if (player.state === 'dash') {
        for (let i = 0; i < player.dashTrail.length; i++) {
            const trail = player.dashTrail[i];
            ctx.save();
            ctx.globalAlpha = trail.alpha;
            ctx.drawImage(spriteCanvas, Math.round(trail.x - 8), Math.round(trail.y - 8), 16, 16);
            ctx.restore();
        }
    }

    // Normal draw
    ctx.drawImage(spriteCanvas, drawX, drawY, 16, 16);

    // Sword arc effect
    if (player.swordArc && player.swordArc.life > 0) {
        const arc = player.swordArc;
        const alpha = arc.life / 0.2;
        const [r1,g1,b1] = hexToRgb('#ffffff');
        const [r2,g2,b2] = hexToRgb('#ffff44');
        const t = 1 - alpha;
        ctx.fillStyle = rgbStr(r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t, alpha);

        // Draw arc based on direction
        const cx = player.x;
        const cy = player.y;
        const r = 12;
        for (let i = -3; i <= 3; i++) {
            const baseAngle = dirToAngle(player.attackDir);
            const angle = baseAngle + i * 0.3;
            const px = cx + Math.cos(angle) * r;
            const py = cy + Math.sin(angle) * r;
            ctx.fillRect(Math.round(px), Math.round(py), 1, 1);
            // Thicker arc
            ctx.fillRect(Math.round(px + Math.cos(angle)), Math.round(py + Math.sin(angle)), 1, 1);
        }
    }
}

// --- PLAYER UPDATE ---
function updatePlayer(dt) {
    if (!player.alive) {
        player.deathTimer += dt;
        if (player.deathTimer > 0.66 && player.deathTimer - dt <= 0.66) {
            spawnBurst('bone_shatter', player.x, player.y, 8, { color: C.cloakBase });
            spawnBurst('bone_shatter', player.x, player.y, 3, { color: C.boots });
            spawnParticle('bone_shatter', player.x, player.y, { color: '#ffffff', size: 1 });
        }
        if (player.deathTimer > 3.0) {
            returnToTitle();
        }
        return;
    }

    // Invincibility timer
    if (player.invincible > 0) player.invincible -= dt;

    // Dash cooldown
    if (player.dashCooldown > 0) player.dashCooldown -= dt;

    // Attack (does NOT block movement — timer ticks alongside movement)
    if (player.state === 'attack') {
        player.attackTimer -= dt;
        if (player.swordArc) player.swordArc.life -= dt;
        if (player.attackTimer <= 0) {
            player.state = 'idle';
            player.swordArc = null;
        }
        // Fall through to movement code below (can move while attacking)
    }

    // Dash
    if (player.state === 'dash') {
        player.dashTimer -= dt;
        // Add trail
        if (player.dashTrail.length < 3) {
            player.dashTrail.push({ x: player.x, y: player.y, alpha: 0.5 - player.dashTrail.length * 0.15 });
        }
        player.x += player.dashDir[0] * 200 * dt;
        player.y += player.dashDir[1] * 200 * dt;
        clampPlayerPosition();
        // Fade trail
        for (const t of player.dashTrail) t.alpha -= dt * 3;
        // Whoosh particles
        spawnParticle('sword_trail', player.x + Math.random()*4-2, player.y + Math.random()*4-2);
        if (player.dashTimer <= 0) {
            player.state = 'idle';
            player.dashTrail = [];
        }
        return;
    }

    // Hit stun
    if (player.state === 'hit') {
        player.attackTimer -= dt;
        if (player.attackTimer <= 0) player.state = 'idle';
        return;
    }

    // Movement
    let mx = 0, my = 0;
    if (input.left) mx -= 1;
    if (input.right) mx += 1;
    if (input.up) my -= 1;
    if (input.down) my += 1;

    // Normalize diagonal
    if (mx !== 0 && my !== 0) {
        mx *= 0.707; my *= 0.707;
    }

    const moving = mx !== 0 || my !== 0;

    if (moving) {
        if (player.state !== 'attack') player.state = 'walk';
        // Check terrain effects on movement
        let speedMult = 1;
        let currentPushX = 0, currentPushY = 0;
        const ptx = Math.floor((player.x - PLAY_OFFSET_X) / TILE_SIZE);
        const pty = Math.floor((player.y - PLAY_OFFSET_Y) / TILE_SIZE);
        if (ptx >= 0 && ptx < GRID_COLS && pty >= 0 && pty < GRID_ROWS && currentRoomData) {
            const pt = currentRoomData.tileMap[pty][ptx];
            // Conveyor push
            if (pt >= T.CONVEYOR_E && pt <= T.CONVEYOR_S) {
                const convDirs = {[T.CONVEYOR_E]:[1,0],[T.CONVEYOR_W]:[-1,0],[T.CONVEYOR_N]:[0,-1],[T.CONVEYOR_S]:[0,1]};
                const cd = convDirs[pt];
                if (cd) { currentPushX += cd[0] * player.speed * 0.35; currentPushY += cd[1] * player.speed * 0.35; }
            }
            // Lava forge damage
            if (pt === T.LAVA_FORGE) {
                const lavaDmg = player.items.includes('lava_walker') ? 1 : 3;
                damagePlayer(lavaDmg, player.x, player.y);
                spawnParticle('ember', player.x, player.y-4);
            }
            // Geyser damage
            if (pt === T.GEYSER_TILE) {
                const cycle = 5.0;
                const phase = ((game.time + ptx*0.16+pty*0.16) % cycle) / cycle;
                if (phase > 0.8) damagePlayer(2, player.x, player.y);
            }
            if ((pt === T.SHALLOW || pt === T.CURRENT_S || pt === T.CURRENT_E) && !player.items.includes('aqua_boots')) {
                speedMult = 0.7;
                if (Math.random() < 0.1) spawnParticle('splash', player.x, player.y + 4, { color: '#4488aa', size: 1, life: 0.2 });
            }
            if (pt === T.CURRENT_S && !player.items.includes('aqua_boots')) currentPushY = player.speed * 0.4;
            if (pt === T.CURRENT_E && !player.items.includes('aqua_boots')) currentPushX = player.speed * 0.4;
            if (pt === T.DEEP_WATER) damagePlayer(1, player.x, player.y);
            if (pt === T.BOSS_WATER) {
                speedMult = 0.3;
                if (Math.random() < 0.15) spawnParticle('splash', player.x, player.y + 4, { color: '#1a3a6a', size: 1, life: 0.3 });
            }
        }
        player.x += (mx * player.speed * speedMult + currentPushX) * dt;
        player.y += (my * player.speed * speedMult + currentPushY) * dt;
        clampPlayerPosition();

        // Update facing direction (8-way)
        // 0=down, 1=up, 2=left, 3=right, 4=down-left, 5=down-right, 6=up-left, 7=up-right
        if (mx < 0 && my > 0) player.dir = 4;       // down-left
        else if (mx > 0 && my > 0) player.dir = 5;   // down-right
        else if (mx < 0 && my < 0) player.dir = 6;   // up-left
        else if (mx > 0 && my < 0) player.dir = 7;   // up-right
        else if (Math.abs(mx) > Math.abs(my)) player.dir = mx < 0 ? 2 : 3;
        else player.dir = my < 0 ? 1 : 0;

        // Walk animation
        player.animTimer += dt;
        if (player.animTimer > 0.15) {
            player.animTimer = 0;
            player.animFrame = (player.animFrame + 1) % 4;
        }

        // Dust particles
        player.walkDustTimer += dt;
        if (player.walkDustTimer > 0.25) {
            player.walkDustTimer = 0;
            spawnParticle('walk_dust', player.x - 2 + Math.random()*4, player.y + 6);
        }
    } else {
        if (player.state !== 'attack') player.state = 'idle';
        // Idle animation (slower)
        player.animTimer += dt;
        if (player.animTimer > 0.4) {
            player.animTimer = 0;
            player.animFrame = (player.animFrame + 1) % 2;
        }
    }

    // Attack input
    if (input.attack && player.state !== 'attack') {
        input.attack = false;
        player.state = 'attack';
        player.attackTimer = 0.25;
        player.attackDir = player.dir;
        player.swordArc = { life: 0.2 };
        _attackHitDone = false;
        triggerHitFreeze(2);
        triggerShake(2, 3);
        // Spawn sword trail particles — 8 direction angles
        const baseAngle = dirToAngle(player.dir);
        for (let i = 0; i < 5; i++) {
            const a = baseAngle + (i - 2) * 0.4;
            spawnParticle('sword_trail', player.x + Math.cos(a) * 10, player.y + Math.sin(a) * 10);
        }
    }

    // Dash input
    if (input.dash && player.dashCooldown <= 0) {
        input.dash = false;
        player.state = 'dash';
        player.dashTimer = 0.2;
        player.dashCooldown = 0.8;
        player.dashTrail = [];
        const dirs = [[0,1],[0,-1],[-1,0],[1,0]];
        player.dashDir = dirs[player.dir];
        if (moving) {
            const len = Math.sqrt(mx*mx+my*my) || 1;
            player.dashDir = [mx/len, my/len];
        }
    }

    // Interact (E key) - open chests
    if (input.interact) {
        input.interact = false;
        tryInteract();
    }

    // Check door transitions
    checkDoorTransition();
}

// --- CHEST INTERACTION ---
const openedChests = new Set();

function tryInteract() {
    if (!currentRoomData) return;

    // Check proximity to chest props
    for (let i = 0; i < currentRoomData.props.length; i++) {
        const prop = currentRoomData.props[i];
        if (prop.type !== T.PROP_CHEST) continue;
        if (prop.opened) continue;

        const px = PLAY_OFFSET_X + prop.x * TILE_SIZE + 8;
        const py = PLAY_OFFSET_Y + prop.y * TILE_SIZE + 8;
        const dx = player.x - px, dy = player.y - py;
        if (dx * dx + dy * dy < 20 * 20) {
            openChest(prop, px, py);
            return;
        }
    }

    // Also check room-level chests definition
    if (currentRoomData.chests) {
        for (const chest of currentRoomData.chests) {
            const key = currentRoomData.id + '_' + chest.x + '_' + chest.y;
            if (openedChests.has(key)) continue;

            const px = PLAY_OFFSET_X + chest.x * TILE_SIZE + 8;
            const py = PLAY_OFFSET_Y + chest.y * TILE_SIZE + 8;
            const dx = player.x - px, dy = player.y - py;
            if (dx * dx + dy * dy < 20 * 20) {
                openedChests.add(key);
                // Pick random loot
                const loot = chest.lootTable[Math.floor(Math.random() * chest.lootTable.length)];
                if (loot === 'gold15') {
                    for (let g = 0; g < 15; g++) {
                        spawnPickup(px + Math.random() * 20 - 10, py + Math.random() * 20 - 10, 'gold', 1);
                    }
                } else if (loot === 'heart') {
                    spawnPickup(px, py - 5, 'heart');
                } else if (loot === 'key') {
                    spawnPickup(px, py - 5, 'key');
                } else if (ITEMS[loot]) {
                    // Power-up item
                    const avail = chest.lootTable.filter(l => ITEMS[l] && !player.items.includes(l));
                    const pick = avail.length > 0 ? avail[Math.floor(Math.random()*avail.length)] : loot;
                    spawnPickup(px, py - 8, 'item', 0);
                    pickups[pickups.length-1]._itemId = pick;
                }
                spawnBurst('gold_sparkle', px, py, 10);
                playSound('chest_open');
                // Mark matching prop as opened
                for (const p of currentRoomData.props) {
                    if (p.type === T.PROP_CHEST && p.x === chest.x && p.y === chest.y) p.opened = true;
                }
                return;
            }
        }
    }
}

function openChest(prop, px, py) {
    prop.opened = true;
    // Default drops for chests without lootTable
    const roll = Math.random();
    if (roll < 0.4) {
        for (let g = 0; g < 5; g++) {
            spawnPickup(px + Math.random() * 16 - 8, py + Math.random() * 16 - 8, 'gold', 1);
        }
    } else if (roll < 0.7) {
        spawnPickup(px, py - 5, 'heart');
    } else {
        for (let g = 0; g < 8; g++) {
            spawnPickup(px + Math.random() * 16 - 8, py + Math.random() * 16 - 8, 'gold', 1);
        }
    }
    spawnBurst('gold_sparkle', px, py, 8);
    playSound('chest_open');
}

function clampPlayerPosition() {
    const margin = 6;
    const minX = PLAY_OFFSET_X + margin;
    const maxX = PLAY_OFFSET_X + PLAY_W - margin;
    const minY = PLAY_OFFSET_Y + margin;
    const maxY = PLAY_OFFSET_Y + PLAY_H - margin;

    // Wall collision
    const room = currentRoomData;
    if (room) {
        const tileX = Math.floor((player.x - PLAY_OFFSET_X) / TILE_SIZE);
        const tileY = Math.floor((player.y - PLAY_OFFSET_Y) / TILE_SIZE);
        // Check surrounding tiles
        for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
                const tx = tileX + dx;
                const ty = tileY + dy;
                if (tx >= 0 && tx < GRID_COLS && ty >= 0 && ty < GRID_ROWS) {
                    const tile = room.tileMap[ty][tx];
                    if (tile === T.WALL || tile === T.PIT) {
                        const wx = PLAY_OFFSET_X + tx * TILE_SIZE;
                        const wy = PLAY_OFFSET_Y + ty * TILE_SIZE;
                        // Simple AABB collision
                        const px = player.x, py = player.y;
                        const overlap = 5;
                        if (px + overlap > wx && px - overlap < wx + TILE_SIZE &&
                            py + overlap > wy && py - overlap < wy + TILE_SIZE) {
                            // Push out
                            const overlapL = (px + overlap) - wx;
                            const overlapR = (wx + TILE_SIZE) - (px - overlap);
                            const overlapT = (py + overlap) - wy;
                            const overlapB = (wy + TILE_SIZE) - (py - overlap);
                            const minOverlap = Math.min(overlapL, overlapR, overlapT, overlapB);
                            if (minOverlap === overlapL) player.x = wx - overlap;
                            else if (minOverlap === overlapR) player.x = wx + TILE_SIZE + overlap;
                            else if (minOverlap === overlapT) player.y = wy - overlap;
                            else player.y = wy + TILE_SIZE + overlap;
                        }
                    }
                }
            }
        }
    }

    player.x = Math.max(minX, Math.min(maxX, player.x));
    player.y = Math.max(minY, Math.min(maxY, player.y));
}

function damagePlayer(amount, fromX, fromY) {
    if (player.invincible > 0 || !player.alive) return;
    // Shield amulet
    if (player.shieldAmulet && player.shieldActive) {
        player.shieldActive = false;
        player.shieldTimer = 25;
        spawnBurst('gold_sparkle', player.x, player.y, 8, { color: '#ffcc44' });
        triggerShake(2, 3);
        playSound('shield');
        return;
    }
    player.health -= amount;
    player.invincible = 1.0;
    player.invincibleFlash = 0;
    player.state = 'hit';
    player.attackTimer = 0.25;
    // Knockback (3 tiles = ~48px)
    const dx = player.x - fromX;
    const dy = player.y - fromY;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    player.x += (dx/len) * 12;
    player.y += (dy/len) * 12;
    clampPlayerPosition();
    // Effects
    spawnBurst('blood', player.x, player.y, 6);
    spawnDamageNumber(player.x, player.y - 8, amount, 'player');
    triggerShake(4, 6);
    triggerHitFreeze(4);
    triggerRedFlash();
    playSound('player_hurt');
    // Heart bounce
    const heartIdx = Math.floor(player.health / 2);
    if (heartIdx >= 0 && heartIdx < game.heartBounce.length) game.heartBounce[heartIdx] = 0.2;

    if (player.health <= 0) {
        player.health = 0;
        player.alive = false;
        player.state = 'death';
        player.deathTimer = 0;
    }
}

function checkDoorTransition() {
    const room = currentRoomData;
    if (!room || game.transition) return;
    if (game._doorCooldown > 0) { game._doorCooldown -= game.dt; return; }

    const tx = Math.floor((player.x - PLAY_OFFSET_X) / TILE_SIZE);
    const ty = Math.floor((player.y - PLAY_OFFSET_Y) / TILE_SIZE);

    if (tx < 0 || tx >= GRID_COLS || ty < 0 || ty >= GRID_ROWS) return;
    const tile = room.tileMap[ty][tx];

    let nextRoom = null;
    let direction = null;

    if (tile === T.DOOR_N && room.doors.north !== false) { direction = 'north'; nextRoom = room.doors.north; }
    if (tile === T.DOOR_S && room.doors.south !== false) { direction = 'south'; nextRoom = room.doors.south; }
    if (tile === T.DOOR_E && room.doors.east !== false) { direction = 'east'; nextRoom = room.doors.east; }
    if (tile === T.DOOR_W && room.doors.west !== false) { direction = 'west'; nextRoom = room.doors.west; }

    if (nextRoom === null) return;

    // Debug: log every attempted transition
    console.log(`[DOOR] Room ${room.id} -> ${nextRoom} (dir=${direction}, locked=${room.lockedUntilClear}, tile=${tile} at ${tx},${ty})`);

    if (room.lockedUntilClear) {
        console.log(`[DOOR] BLOCKED - room is locked. Enemies alive: ${enemies.filter(e=>e.alive).length}`);
        return;
    }

    // Key-locked doors: entering Room 10 requires a key
    const targetRoom = rooms[nextRoom];
    if (targetRoom && targetRoom.type === 'boss' && player.keys <= 0) {
        if (!game._keyMsgTimer || game._keyMsgTimer <= 0) {
            game._keyMsgTimer = 1.5;
            game._keyMsg = 'A key is needed...';
            playSound('shield');
        }
        return;
    }
    if (targetRoom && targetRoom.type === 'boss' && player.keys > 0) {
        player.keys--;
    }

    console.log(`[DOOR] TRANSITIONING Room ${room.id} -> ${nextRoom}`);
    game.transition = {
        type: 'wipe', progress: 0, duration: 0.5,
        direction, nextRoom
    };
}

// --- LIGHTING ---
function renderLighting(ctx, room, time) {
    const theme = floorThemes[room.floor];

    lctx.clearRect(0, 0, INTERNAL_W, INTERNAL_H);

    // Base darkness
    lctx.fillStyle = `rgba(0,0,0,${1 - theme.ambientLight})`;
    lctx.fillRect(0, 0, INTERNAL_W, INTERNAL_H);

    // Cut out light sources
    lctx.globalCompositeOperation = 'destination-out';
    for (const light of room.lightSources) {
        const lx = PLAY_OFFSET_X + light.x * TILE_SIZE + TILE_SIZE/2;
        const ly = PLAY_OFFSET_Y + light.y * TILE_SIZE + TILE_SIZE/2;
        const r = light.radius * TILE_SIZE;

        // Flickering
        const flicker = 1 + Math.sin(time * 5 + light.x * 3) * 0.08;

        const grad = lctx.createRadialGradient(lx, ly, 0, lx, ly, r * flicker);
        grad.addColorStop(0, 'rgba(0,0,0,1)');
        grad.addColorStop(0.4, 'rgba(0,0,0,0.7)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        lctx.fillStyle = grad;
        lctx.fillRect(lx - r * flicker, ly - r * flicker, r * 2 * flicker, r * 2 * flicker);
    }

    // Player emits a small light
    const grad = lctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, 30);
    grad.addColorStop(0, 'rgba(0,0,0,0.6)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    lctx.fillStyle = grad;
    lctx.fillRect(player.x - 30, player.y - 30, 60, 60);

    lctx.globalCompositeOperation = 'source-over';

    // Colored light tints
    lctx.globalCompositeOperation = 'source-atop';
    for (const light of room.lightSources) {
        if (light.color) {
            const lx = PLAY_OFFSET_X + light.x * TILE_SIZE + TILE_SIZE/2;
            const ly = PLAY_OFFSET_Y + light.y * TILE_SIZE + TILE_SIZE/2;
            const r = light.radius * TILE_SIZE;
            const [cr,cg,cb] = hexToRgb(light.color);
            const grad2 = lctx.createRadialGradient(lx, ly, 0, lx, ly, r);
            grad2.addColorStop(0, rgbStr(cr,cg,cb,0.2));
            grad2.addColorStop(1, 'rgba(0,0,0,0)');
            lctx.fillStyle = grad2;
            lctx.fillRect(lx - r, ly - r, r * 2, r * 2);
        }
    }
    lctx.globalCompositeOperation = 'source-over';

    // Vignette
    const vigGrad = lctx.createRadialGradient(INTERNAL_W/2, INTERNAL_H/2, INTERNAL_W * 0.35,
        INTERNAL_W/2, INTERNAL_H/2, INTERNAL_W * 0.7);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
    lctx.fillStyle = vigGrad;
    lctx.fillRect(0, 0, INTERNAL_W, INTERNAL_H);

    // Draw light overlay
    ctx.drawImage(lightBuf, 0, 0);
}

// --- PICKUP SYSTEM ---
const pickups = [];
function spawnPickup(x, y, type, value) {
    pickups.push({ x, y, type, value: value || 1, life: 30, bobTimer: Math.random() * 6.28 });
}
function updatePickups(dt) {
    for (let i = pickups.length - 1; i >= 0; i--) {
        const p = pickups[i];
        p.bobTimer += dt * 3;
        p.life -= dt;
        if (p.life <= 0) { pickups.splice(i, 1); continue; }
        const dx = player.x - p.x, dy = player.y - p.y;
        if (dx*dx + dy*dy < 100) {
            if (p.type === 'gold') { player.gold += p.value; spawnBurst('gold_sparkle', p.x, p.y, 4); playSound('coin'); }
            else if (p.type === 'heart') { player.health = Math.min(player.maxHealth, player.health + 2); spawnBurst('blood', p.x, p.y, 3, {color:'#ff4444'}); playSound('heal'); }
            else if (p.type === 'key') { player.keys++; spawnBurst('gold_sparkle', p.x, p.y, 6, {color:'#c0c0c0'}); playSound('coin'); }
            else if (p.type === 'item' && p._itemId) { giveItem(p._itemId); spawnBurst('gold_sparkle', p.x, p.y, 10); }
            pickups.splice(i, 1);
        }
    }
}
function drawPickups(ctx, time) {
    for (const p of pickups) {
        const bob = Math.sin(p.bobTimer) * 1.5;
        const py = p.y + bob;
        const alpha = p.life < 3 ? (p.life / 3) : 1;
        ctx.globalAlpha = alpha;
        if (p.type === 'gold') {
            ctx.fillStyle = '#ffd700'; ctx.fillRect(Math.round(p.x-2), Math.round(py-2), 4, 4);
            ctx.fillStyle = '#ffee66'; ctx.fillRect(Math.round(p.x-1), Math.round(py-2), 2, 1);
        } else if (p.type === 'heart') {
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(Math.round(p.x-2), Math.round(py-1), 2, 2);
            ctx.fillRect(Math.round(p.x), Math.round(py-1), 2, 2);
            ctx.fillRect(Math.round(p.x-1), Math.round(py), 2, 2);
            ctx.fillRect(Math.round(p.x-1), Math.round(py+1), 2, 1);
        } else if (p.type === 'key') {
            ctx.fillStyle = '#c0c0c0'; ctx.fillRect(Math.round(p.x-1), Math.round(py-3), 2, 5);
            ctx.fillStyle = '#dddddd'; ctx.fillRect(Math.round(p.x), Math.round(py-3), 2, 2);
            ctx.fillRect(Math.round(p.x), Math.round(py), 1, 1);
        } else if (p.type === 'item') {
            const col = p._itemId && ITEMS[p._itemId] ? ITEMS[p._itemId].color : '#ffcc44';
            ctx.fillStyle = col;
            ctx.fillRect(Math.round(p.x-3), Math.round(py-3), 6, 6);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(Math.round(p.x-1), Math.round(py-1), 2, 2);
            // Glow
            ctx.fillStyle = rgbStr(...hexToRgb(col), 0.2 + Math.sin(game.time * 5) * 0.1);
            ctx.fillRect(Math.round(p.x-5), Math.round(py-5), 10, 10);
        }
        ctx.globalAlpha = 1;
    }
}

// --- PROJECTILE SYSTEM ---
const projectiles = [];
function spawnProjectile(x, y, vx, vy, damage, fromEnemy, color) {
    projectiles.push({ x, y, vx, vy, damage, fromEnemy, color: color || '#ccbbaa', life: 4 });
}
function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
        if (p.life <= 0) { projectiles.splice(i, 1); continue; }
        // Wall collision
        const tx = Math.floor((p.x - PLAY_OFFSET_X) / TILE_SIZE);
        const ty = Math.floor((p.y - PLAY_OFFSET_Y) / TILE_SIZE);
        if (tx < 0 || tx >= GRID_COLS || ty < 0 || ty >= GRID_ROWS ||
            (currentRoomData && currentRoomData.tileMap[ty] && currentRoomData.tileMap[ty][tx] === T.WALL)) {
            projectiles.splice(i, 1); continue;
        }
        // Hit player
        if (p.fromEnemy) {
            const dx = player.x - p.x, dy = player.y - p.y;
            if (dx*dx + dy*dy < 64) { damagePlayer(p.damage, p.x, p.y); projectiles.splice(i, 1); }
        }
    }
}
function drawProjectiles(ctx) {
    for (const p of projectiles) {
        const len = 4;
        const angle = Math.atan2(p.vy, p.vx);
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), 2, 1);
        ctx.fillRect(Math.round(p.x - Math.cos(angle)*2), Math.round(p.y - Math.sin(angle)*2), 1, 1);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(Math.round(p.x + Math.cos(angle)*1), Math.round(p.y + Math.sin(angle)*1), 1, 1);
    }
}

// --- SLIME TRAIL DECALS ---
const decals = [];
function addDecal(x, y, color, size) {
    if (decals.length > 100) decals.shift();
    decals.push({ x, y, color, size: size || 1, life: 8, maxLife: 8 });
}
function updateDecals(dt) {
    for (let i = decals.length - 1; i >= 0; i--) {
        decals[i].life -= dt;
        if (decals[i].life <= 0) decals.splice(i, 1);
    }
}
function drawDecals(ctx) {
    for (const d of decals) {
        const a = Math.min(1, d.life / d.maxLife) * 0.4;
        const [r,g,b] = hexToRgb(d.color);
        ctx.fillStyle = rgbStr(r, g, b, a);
        ctx.fillRect(Math.round(d.x), Math.round(d.y), d.size, d.size);
    }
}

// --- ENEMY SYSTEM ---
const enemies = [];
const ENEMY_TYPES = {
    slime: { hp: 2, speed: 18, size: 4, damage: 1, xp: 1, color: '#44cc44', colorDark: '#228822' },
    slime_large: { hp: 4, speed: 14, size: 6, damage: 1, xp: 3, color: '#44cc44', colorDark: '#228822' },
    slime_mini: { hp: 1, speed: 22, size: 3, damage: 1, xp: 1, color: '#55dd55', colorDark: '#33aa33' },
    skeleton_warrior: { hp: 4, speed: 25, size: 7, damage: 1, xp: 3, color: '#ddddcc', colorDark: '#aaaaaa' },
    skeleton_archer: { hp: 2, speed: 20, size: 7, damage: 1, xp: 3, color: '#ddddcc', colorDark: '#aaaaaa' },
    goblin: { hp: 1, speed: 50, size: 5, damage: 1, xp: 1, color: '#55aa44', colorDark: '#337733' },
    cave_crawler: { hp: 2, speed: 55, size: 4, damage: 1, xp: 2, color: '#3a2a1a', colorDark: '#2a1a0a' },
    mushroom_spore: { hp: 4, speed: 0, size: 6, damage: 0, xp: 3, color: '#7a3a9a', colorDark: '#5a2a7a' },
    ghost: { hp: 3, speed: 30, size: 5, damage: 1, xp: 4, color: '#aabbdd', colorDark: '#8899bb' },
    mimic: { hp: 5, speed: 40, size: 6, damage: 2, xp: 5, color: '#8a6a3a', colorDark: '#5a4a2a' },
    necromancer: { hp: 8, speed: 0, size: 7, damage: 2, xp: 8, color: '#2a1a3a', colorDark: '#1a0a2a' },
    flame_imp: { hp: 2, speed: 40, size: 4, damage: 2, xp: 3, color: '#ee4422', colorDark: '#aa2211' },
    golem: { hp: 12, speed: 18, size: 9, damage: 3, xp: 10, color: '#3a3a3a', colorDark: '#1a1a1a' },
};

function spawnEnemy(type, x, y, delay) {
    const def = ENEMY_TYPES[type];
    enemies.push({
        type, x, y, hp: def.hp, maxHp: def.hp,
        speed: def.speed, size: def.size, damage: def.damage,
        vx: 0, vy: 0, dir: 0,
        state: delay ? 'spawning' : 'idle',
        spawnDelay: delay || 0,
        animTimer: Math.random() * 2, animFrame: 0,
        attackTimer: 0, attackCooldown: 0,
        hitTimer: 0, alive: true,
        aiTimer: Math.random() * 0.5,
        patrolDir: Math.random() > 0.5 ? 1 : -1,
        patrolTimer: 0,
        // Skeleton specific
        shieldActive: false,
        comboStage: 0,
        // Archer specific
        aimTimer: 0, aimTarget: null, fleeing: false,
        // Slime specific
        hopTimer: 0, hopping: false, hopVx: 0, hopVy: 0,
        squish: 0,
        // Goblin flanking
        flankAngle: Math.random() * 6.28,
        // Cave crawler erratic
        erraticTimer: 0, erraticAngle: 0,
        // Ghost phase
        ghostPhase: 'visible', ghostPhaseTimer: 2,
        ghostOpacity: 0.7,
        // Mimic
        mimicActive: false,
        // Necromancer
        necroShield: type === 'necromancer' ? 2 : 0,
        necroSummonTimer: type === 'necromancer' ? 3 : 0,
        // Mushroom spore
        sporeTimer: type === 'mushroom_spore' ? 2 : 0,
        sporeCharging: false,
    });
}

function distToPlayer(e) {
    const dx = player.x - e.x, dy = player.y - e.y;
    return Math.sqrt(dx*dx + dy*dy);
}

function angleTo(from, to) {
    return Math.atan2(to.y - from.y, to.x - from.x);
}

function tileBlocked(tx, ty) {
    if (tx < 0 || tx >= GRID_COLS || ty < 0 || ty >= GRID_ROWS) return true;
    const t = currentRoomData.tileMap[ty][tx];
    return t === T.WALL || t === T.PIT || t === T.LAVA || t === T.WATER || t === T.DEEP_WATER || t === T.LAVA_FORGE;
}

function moveEnemy(e, dx, dy, dt) {
    // Conveyor push on enemies (except flying types)
    if (e.type !== 'flame_imp' && e.type !== 'ghost' && currentRoomData) {
        const etx = Math.floor((e.x - PLAY_OFFSET_X) / TILE_SIZE);
        const ety = Math.floor((e.y - PLAY_OFFSET_Y) / TILE_SIZE);
        if (etx >= 0 && etx < GRID_COLS && ety >= 0 && ety < GRID_ROWS) {
            const et = currentRoomData.tileMap[ety][etx];
            const convDirs = {[T.CONVEYOR_E]:[1,0],[T.CONVEYOR_W]:[-1,0],[T.CONVEYOR_N]:[0,-1],[T.CONVEYOR_S]:[0,1]};
            if (convDirs[et]) { dx += convDirs[et][0] * 20; dy += convDirs[et][1] * 20; }
        }
    }
    const nx = e.x + dx * dt;
    const ny = e.y + dy * dt;
    const tx = Math.floor((nx - PLAY_OFFSET_X) / TILE_SIZE);
    const ty = Math.floor((ny - PLAY_OFFSET_Y) / TILE_SIZE);
    if (!tileBlocked(tx, ty)) {
        e.x = nx; e.y = ny;
    }
    e.x = Math.max(PLAY_OFFSET_X + e.size, Math.min(PLAY_OFFSET_X + PLAY_W - e.size, e.x));
    e.y = Math.max(PLAY_OFFSET_Y + e.size, Math.min(PLAY_OFFSET_Y + PLAY_H - e.size, e.y));
}

function updateEnemies(dt) {
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (!e.alive) continue;

        // Spawn delay
        if (e.state === 'spawning') {
            e.spawnDelay -= dt;
            if (e.spawnDelay <= 0) e.state = 'idle';
            continue;
        }

        // Hit stun
        if (e.hitTimer > 0) {
            e.hitTimer -= dt;
            continue;
        }

        e.animTimer += dt;
        e.attackCooldown -= dt;
        const dist = distToPlayer(e);
        const angle = angleTo(e, player);

        // AI per type
        switch (e.type) {
            case 'slime': case 'slime_large': case 'slime_mini':
                updateSlimeAI(e, dt, dist, angle);
                break;
            case 'skeleton_warrior':
                updateSkeletonWarriorAI(e, dt, dist, angle);
                break;
            case 'skeleton_archer':
                updateSkeletonArcherAI(e, dt, dist, angle);
                break;
            case 'goblin':
                updateGoblinAI(e, dt, dist, angle, i);
                break;
            case 'cave_crawler':
                updateCaveCrawlerAI(e, dt, dist, angle);
                break;
            case 'mushroom_spore':
                updateMushroomSporeAI(e, dt, dist, angle);
                break;
            case 'ghost':
                updateGhostAI(e, dt, dist, angle);
                break;
            case 'mimic':
                updateMimicAI(e, dt, dist, angle);
                break;
            case 'necromancer':
                updateNecromancerAI(e, dt, dist, angle);
                break;
            case 'flame_imp':
                updateFlameImpAI(e, dt, dist, angle);
                break;
            case 'golem':
                updateGolemAI(e, dt, dist, angle);
                break;
        }

        // Contact damage to player
        if (e.state === 'attack' || e.type === 'goblin' || e.type.startsWith('slime')) {
            if (dist < e.size + 6 && e.attackCooldown <= 0) {
                // Skeleton shield check is in attack
                if (e.type.startsWith('slime') && e.hopping) {
                    damagePlayer(e.damage, e.x, e.y);
                    e.attackCooldown = 1.5;
                }
            }
        }
    }
}

function updateSlimeAI(e, dt, dist, angle) {
    e.hopTimer -= dt;
    e.squish = Math.sin(e.animTimer * 3) * 0.15; // idle jiggle

    if (e.hopping) {
        e.x += e.hopVx * dt;
        e.y += e.hopVy * dt;
        e.hopTimer -= dt;
        // Slime trail
        if (Math.random() < 0.3) addDecal(e.x + Math.random()*4-2, e.y + 2, e.type === 'slime_mini' ? '#55dd55' : '#44cc44', e.type === 'slime_large' ? 2 : 1);
        if (e.hopTimer <= 0) {
            e.hopping = false;
            e.hopTimer = 1.0 + Math.random() * 0.5;
            e.hopVx = 0; e.hopVy = 0;
        }
        return;
    }

    if (e.hopTimer <= 0) {
        e.hopping = true;
        e.hopTimer = 0.35;
        e.squish = -0.3; // squish down before hop
        if (dist < 80 && player.alive) {
            // Hop toward player
            e.hopVx = Math.cos(angle) * e.speed * 2;
            e.hopVy = Math.sin(angle) * e.speed * 2;
        } else {
            // Random hop
            const ra = Math.random() * 6.28;
            e.hopVx = Math.cos(ra) * e.speed;
            e.hopVy = Math.sin(ra) * e.speed;
        }
    }
}

function updateSkeletonWarriorAI(e, dt, dist, angle) {
    e.dir = angle; // Face player when close

    if (e.state === 'attack') {
        e.attackTimer -= dt;
        // Combo attack
        if (e.comboStage === 0 && e.attackTimer <= 0.7) {
            e.comboStage = 1; // swing 1
            checkEnemyMeleeHit(e, 14);
        }
        if (e.comboStage === 1 && e.attackTimer <= 0.3) {
            e.comboStage = 2; // swing 2
            checkEnemyMeleeHit(e, 14);
        }
        if (e.attackTimer <= 0) {
            e.state = 'idle';
            e.attackCooldown = 1.0;
            e.comboStage = 0;
        }
        return;
    }

    if (dist < 96 && player.alive) {
        // Walk toward player
        e.state = 'walk';
        const faceAngle = angle;
        moveEnemy(e, Math.cos(faceAngle) * e.speed, Math.sin(faceAngle) * e.speed, dt);

        if (dist < 20 && e.attackCooldown <= 0) {
            e.state = 'attack';
            e.attackTimer = 1.0;
            e.comboStage = 0;
        }
    } else {
        // Patrol
        e.state = 'idle';
        e.patrolTimer += dt;
        if (e.patrolTimer > 2) { e.patrolDir *= -1; e.patrolTimer = 0; }
        moveEnemy(e, e.patrolDir * e.speed * 0.3, 0, dt);
    }
}

function updateSkeletonArcherAI(e, dt, dist, angle) {
    e.dir = angle;

    // Flee if player too close
    if (dist < 48 && player.alive) {
        e.fleeing = true;
        e.aimTimer = 0;
        e.aimTarget = null;
        const fleeAngle = angle + Math.PI;
        moveEnemy(e, Math.cos(fleeAngle) * e.speed * 1.5, Math.sin(fleeAngle) * e.speed * 1.5, dt);
        return;
    }
    e.fleeing = false;

    // Aim and shoot
    if (dist < 128 && player.alive) {
        if (e.aimTimer <= 0 && e.attackCooldown <= 0) {
            e.aimTimer = 0.8;
            e.aimTarget = { x: player.x, y: player.y };
        }
        if (e.aimTimer > 0) {
            e.aimTimer -= dt;
            if (e.aimTimer <= 0 && e.aimTarget) {
                // Fire!
                const shootAngle = angleTo(e, e.aimTarget);
                spawnProjectile(e.x, e.y, Math.cos(shootAngle) * 80, Math.sin(shootAngle) * 80, 1, true, '#ccbbaa');
                playSound('arrow');
                e.attackCooldown = 2.0;
                e.aimTarget = null;
            }
        }
    } else {
        // Slow patrol
        e.patrolTimer += dt;
        if (e.patrolTimer > 3) { e.patrolDir *= -1; e.patrolTimer = 0; }
        moveEnemy(e, e.patrolDir * e.speed * 0.2, 0, dt);
    }
}

function updateGoblinAI(e, dt, dist, angle, idx) {
    e.dir = angle;

    if (dist < 16 && e.attackCooldown <= 0 && player.alive) {
        // Quick stab
        damagePlayer(e.damage, e.x, e.y);
        e.attackCooldown = 0.5;
        e.state = 'attack';
        e.attackTimer = 0.15;
        triggerShake(1, 2);
    } else if (e.state === 'attack') {
        e.attackTimer -= dt;
        if (e.attackTimer <= 0) e.state = 'idle';
    } else if (player.alive && dist < 120) {
        // Flanking AI: try to be on opposite side from other goblins
        let targetX = player.x;
        let targetY = player.y;
        const otherGoblins = enemies.filter((o, oi) => oi !== idx && o.type === 'goblin' && o.alive);
        if (otherGoblins.length > 0) {
            // Find average position of other goblins relative to player
            let avgAngle = 0;
            for (const o of otherGoblins) avgAngle += angleTo(player, o);
            avgAngle /= otherGoblins.length;
            // Go opposite side
            const flankDist = 15;
            targetX = player.x + Math.cos(avgAngle + Math.PI + e.flankAngle * 0.3) * flankDist;
            targetY = player.y + Math.sin(avgAngle + Math.PI + e.flankAngle * 0.3) * flankDist;
        }
        const moveAngle = angleTo(e, { x: targetX, y: targetY });
        moveEnemy(e, Math.cos(moveAngle) * e.speed, Math.sin(moveAngle) * e.speed, dt);
        e.state = 'walk';
    } else {
        e.state = 'idle';
    }

    // Jittery animation
    e.animFrame = Math.floor(e.animTimer * 8) % 6;
}

// --- FLOOR 2 ENEMY AI ---
function updateCaveCrawlerAI(e, dt, dist, angle) {
    e.erraticTimer -= dt;
    if (e.erraticTimer <= 0) {
        e.erraticAngle = angle + (Math.random() - 0.5) * 2.5;
        e.erraticTimer = 0.3 + Math.random() * 0.5;
    }
    const moveAngle = dist < 48 ? angle : e.erraticAngle; // commit to charge when close
    moveEnemy(e, Math.cos(moveAngle) * e.speed, Math.sin(moveAngle) * e.speed, dt);
    e.state = 'walk';
    // Contact damage
    if (dist < 10 && e.attackCooldown <= 0 && player.alive) {
        damagePlayer(e.damage, e.x, e.y);
        e.attackCooldown = 0.4;
    }
}

function updateMushroomSporeAI(e, dt, dist, angle) {
    // Stationary — poison cloud on timer
    e.sporeTimer -= dt;
    if (e.sporeTimer <= 0 && !e.sporeCharging) {
        e.sporeCharging = true;
        e.sporeTimer = 1.0; // charge time
    }
    if (e.sporeCharging && e.sporeTimer <= 0) {
        e.sporeCharging = false;
        e.sporeTimer = 4 + Math.random();
        // Release poison cloud
        for (let i = 0; i < 12; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = Math.random() * 40;
            spawnParticle('poison_cloud', e.x + Math.cos(a) * r, e.y + Math.sin(a) * r, {
                color: '#44cc33', life: 3, size: 2
            });
        }
        // Damage player if in range
        if (dist < 48) damagePlayer(1, e.x, e.y);
        playSound('slime_pop');
    }
}

function updateGhostAI(e, dt, dist, angle) {
    e.ghostPhaseTimer -= dt;
    if (e.ghostPhaseTimer <= 0) {
        if (e.ghostPhase === 'visible') {
            e.ghostPhase = 'fading_out'; e.ghostPhaseTimer = 0.5;
        } else if (e.ghostPhase === 'fading_out') {
            e.ghostPhase = 'invisible'; e.ghostPhaseTimer = 2 + Math.random();
        } else if (e.ghostPhase === 'invisible') {
            e.ghostPhase = 'fading_in'; e.ghostPhaseTimer = 0.5;
        } else {
            e.ghostPhase = 'visible'; e.ghostPhaseTimer = 2;
        }
    }
    // Update opacity
    if (e.ghostPhase === 'visible') e.ghostOpacity = 0.7;
    else if (e.ghostPhase === 'fading_out') e.ghostOpacity = 0.1 + (e.ghostPhaseTimer / 0.5) * 0.6;
    else if (e.ghostPhase === 'invisible') e.ghostOpacity = 0.1;
    else e.ghostOpacity = 0.7 - (e.ghostPhaseTimer / 0.5) * 0.6;

    // Move toward player (ignores walls)
    e.x += Math.cos(angle) * e.speed * dt;
    e.y += Math.sin(angle) * e.speed * dt;
    e.x = Math.max(PLAY_OFFSET_X + 4, Math.min(PLAY_OFFSET_X + PLAY_W - 4, e.x));
    e.y = Math.max(PLAY_OFFSET_Y + 4, Math.min(PLAY_OFFSET_Y + PLAY_H - 4, e.y));

    // Contact damage
    if (dist < 12 && e.attackCooldown <= 0 && player.alive) {
        damagePlayer(e.damage, e.x, e.y);
        e.attackCooldown = 1.0;
    }
}

function updateMimicAI(e, dt, dist, angle) {
    if (!e.mimicActive) {
        // Dormant — check if player is close
        if (dist < 24 && player.alive) {
            e.mimicActive = true;
            e.state = 'idle';
            triggerShake(3, 4);
            playSound('door_lock');
            spawnDamageNumber(e.x, e.y - 10, '!', 'crit');
        }
        return;
    }
    // Active — hop toward player
    if (e.hopTimer <= 0) {
        e.hopTimer = 0.6;
        e.hopping = true;
        const hopAngle = angle;
        e.hopVx = Math.cos(hopAngle) * 60;
        e.hopVy = Math.sin(hopAngle) * 60;
    }
    e.hopTimer -= dt;
    if (e.hopping) {
        moveEnemy(e, e.hopVx, e.hopVy, dt);
        if (e.hopTimer < 0.35) { e.hopping = false; e.hopVx = 0; e.hopVy = 0; }
    }
    // Bite attack
